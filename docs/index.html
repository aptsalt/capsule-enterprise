  try {
    var fm = _capData().factoryModules;
    if (fm && fm[key] && Array.isArray(fm[key].stats)) return fm[key].stats;
  } catch (e) {}
  return fallback;
}

/* ============================================================================
   KNOWLEDGE GRAPH MODULE  — where CAPSULE lives
   ============================================================================ */

function renderKnowledgeGraph(root) {
  if (!root) return;

  var SUB = {
    "Graph":          "renderGraph",
    "Capsules":       "renderCapsules",
    "Skills & Agents": "renderSkills",
    "Selection":      "renderSelection",
    "Value":          "renderValue"
  };
  var order = ["Graph", "Capsules", "Skills & Agents", "Selection", "Value"];

  root.innerHTML =
    _capHeader(
      "Knowledge Graph",
      "Every Requirement, Work Order, Skill, Agent, Capsule and Model — wired together. A change with no Requirement behind it has nowhere to land.",
      '<span class="tag memory">memory: Backboard</span>'
    ) +
    '<div class="kg-caption">CAPSULE — the capture + feedback (RL) layer on 8090’s Knowledge Graph.</div>' +
    '<div class="subtabs" role="tablist"></div>' +
    '<div id="kg-sub"></div>';

  var bar = root.querySelector(".subtabs");
  var sub = root.querySelector("#kg-sub");

  function show(label, btn) {
    Array.prototype.forEach.call(bar.children, function (b) {
      b.classList.toggle("active", b === btn);
    });
    sub.innerHTML = "";
    var fn = window[SUB[label]];
    if (typeof fn === "function") {
      fn(sub);
    } else {
      sub.innerHTML =
        '<div class="card"><p class="muted">' + _capEsc(label) +
        " is not available yet.</p></div>";
    }
    sub.scrollTop = 0;
  }

  order.forEach(function (label, i) {
    var b = document.createElement("button");
    b.className = "subtab" + (i === 0 ? " active" : "");
    b.type = "button";
    b.setAttribute("role", "tab");
    b.textContent = label;
    b.addEventListener("click", function () { show(label, b); });
    bar.appendChild(b);
  });

  // Default to the Graph sub-tab.
  show(order[0], bar.children[0]);
}

/* ============================================================================
   NATIVE FACTORY MODULE RENDERERS  (compact — the Knowledge Graph is the star)
   ============================================================================ */

/* --- Refinery : Requirements (business intent) --- */
function renderRefinery(root) {
  if (!root) return;
  var D = _capData();
  var reqs = D.requirements || [];
  var active = reqs.filter(function (r) { return r.status === "active"; }).length;
  var review = reqs.filter(function (r) { return r.status === "in_review"; }).length;

  var stats = _capModuleStats("refinery", [
    { v: reqs.length, l: "Requirements" },
    { v: active, l: "Active" },
    { v: review, l: "In review" },
    { v: (D.workOrders || []).length, l: "Linked work" }
  ]);

  var rows = reqs.map(function (r) {
    return _capRow(
      r.id, r.title, r.plainEnglish,
      _capPill(r.status)
    );
  }).join("");

  root.innerHTML =
    _capHeader(
      "Refinery",
      "Requirements — the business intent every change must trace back to. A change with no Requirement behind it has nowhere to land.",
      '<button class="btn ghost">Import intent</button><button class="btn">New requirement</button>'
    ) +
    _capStats(stats) +
    _capSectionLabel("Requirements") +
    rows;
}

/* --- Foundry : Blueprints (architecture each requirement compiles into) --- */
function renderFoundry(root) {
  if (!root) return;
  var D = _capData();
  var skills = D.skills || [];
  var versions = skills.reduce(function (n, s) { return n + (s.versions || []).length; }, 0);
  var components = skills.reduce(function (set, s) {
    (s.versions || []).forEach(function () {});
    return set;
  }, 0);

  var stats = _capModuleStats("foundry", [
    { v: skills.length, l: "Blueprints" },
    { v: versions, l: "Versions" },
    { v: (D.agents || []).length, l: "Agents" },
    { v: (D.mcps || []).length, l: "Connectors" }
  ]);

  var rows = skills.map(function (s) {
    var users = (s.usedByAgents || []).length;
    return _capRow(
      "v" + (s.currentVersion || "—"),
      s.name,
      s.description,
      _capTrace(s.repoPath || s.id) +
      _capPill("published") +
      '<span class="m-count" title="agents using">' + users + "</span>"
    );
  }).join("");

  root.innerHTML =
    _capHeader(
      "Foundry",
      "Blueprints — the architecture each requirement compiles into, versioned and reusable across the project.",
      '<button class="btn ghost">Compare versions</button><button class="btn">New blueprint</button>'
    ) +
    _capStats(stats) +
    _capSectionLabel("Blueprints") +
    rows;
}

/* --- Planner : Work Orders (each implements exactly one Requirement) --- */
function renderPlanner(root) {
  if (!root) return;
  var D = _capData();
  var wos = D.workOrders || [];
  var reqById = {};
  (D.requirements || []).forEach(function (r) { reqById[r.id] = r; });

  var done = wos.filter(function (w) { return w.status === "done"; }).length;
  var prog = wos.filter(function (w) { return w.status === "in_progress"; }).length;
  var queued = wos.filter(function (w) { return w.status === "queued"; }).length;

  var stats = _capModuleStats("planner", [
    { v: wos.length, l: "Work orders" },
    { v: done, l: "Done" },
    { v: prog, l: "In progress" },
    { v: queued, l: "Queued" }
  ]);

  var rows = wos.map(function (w) {
    var req = reqById[w.requirementId];
    var sub = "implements " + w.requirementId +
      (req ? " · " + req.title : "") +
      "  ·  " + (w.agentId || "");
    return _capRow(
      w.id, w.title, sub,
      _capTrace(w.requirementId) + _capPill(w.status)
    );
  }).join("");

  root.innerHTML =
    _capHeader(
      "Planner",
      "Work Orders — discrete units of agent work. Each one implements exactly one Requirement, so nothing happens off-book.",
      '<button class="btn ghost">Board view</button><button class="btn">New work order</button>'
    ) +
    _capStats(stats) +
    _capSectionLabel("Work orders") +
    rows;
}

/* --- Assembler : wires MCP tools + skills onto work orders --- */
function renderAssembler(root) {
  if (!root) return;
  var D = _capData();
  var mcps = D.mcps || [];
  var wos = D.workOrders || [];
  var connected = mcps.filter(function (m) { return m.status === "connected"; }).length;
  var assembled = wos.filter(function (w) { return w.status === "done" || w.status === "in_progress"; }).length;

  var stats = _capModuleStats("assembler", [
    { v: mcps.length, l: "Connectors" },
    { v: connected, l: "Connected" },
    { v: assembled, l: "Assembling" },
    { v: (D.skills || []).length, l: "Skills wired" }
  ]);

  var mcpRows = mcps.map(function (m) {
    return _capRow(
      m.id, m.name, "kind: " + (m.kind || "—"),
      _capPill(m.status)
    );
  }).join("");

  var asmRows = wos.filter(function (w) {
    return w.status === "done" || w.status === "in_progress";
  }).map(function (w) {
    return _capRow(
      w.id, w.title, "assembled by " + (w.agentId || "—"),
      _capPill(w.status)
    );
  }).join("");

  root.innerHTML =
    _capHeader(
      "Assembler",
      "Assembler — wires MCP connectors and published skills onto work orders to produce running, deployable software.",
      '<button class="btn ghost">Connection log</button><button class="btn">Add connector</button>'
    ) +
    _capStats(stats) +
    _capSectionLabel("MCP connectors") +
    mcpRows +
    _capSectionLabel("In assembly") +
    asmRows;
}

/* --- Tests : verification that each work order satisfies its requirement --- */
function renderTests(root) {
  if (!root) return;
  var D = _capData();
  var wos = D.workOrders || [];
  var reqById = {};
  (D.requirements || []).forEach(function (r) { reqById[r.id] = r; });

  var suites = wos.map(function (w) {
    var status =
      w.status === "done" ? "passing" :
      w.status === "in_progress" ? "running" : "queued";
    return { wo: w, status: status };
  });
  var passing = suites.filter(function (s) { return s.status === "passing"; }).length;
  var running = suites.filter(function (s) { return s.status === "running"; }).length;
  var pending = suites.filter(function (s) { return s.status === "queued"; }).length;

  var stats = _capModuleStats("tests", [
    { v: suites.length, l: "Suites" },
    { v: passing, l: "Passing" },
    { v: running, l: "Running" },
    { v: pending, l: "Pending" }
  ]);

  var rows = suites.map(function (s) {
    var req = reqById[s.wo.requirementId];
    return _capRow(
      s.wo.id,
      s.wo.title + " — regression suite",
      "verifies " + s.wo.requirementId + (req ? " · " + req.title : ""),
      _capTrace(s.wo.requirementId) + _capPill(s.status)
    );
  }).join("");

  root.innerHTML =
    _capHeader(
      "Tests",
      "Tests — automated verification that every work order actually satisfies the requirement it claims to implement.",
      '<button class="btn ghost">Coverage</button><button class="btn">Run all</button>'
    ) +
    _capStats(stats) +
    _capSectionLabel("Test suites") +
    rows;
}

/* --- Validator : human + signal feedback inbox before changes land --- */
function renderValidator(root) {
  if (!root) return;
  var D = _capData();
  var inbox = [];

  (D.skills || []).forEach(function (sk) {
    (sk.versions || []).forEach(function (v) {
      if (v.status === "proposed") {
        inbox.push({
          id: sk.name + " " + v.version,
          title: "Proposed skill update — " + sk.name + " " + v.version,
          sub: v.changelog,
          status: "proposed",
          trace: "from " + (v.derivedFromCapsule || "—")
        });
      }
    });
  });

  (D.requirements || []).forEach(function (r) {
    if (r.status === "in_review") {
      inbox.push({
        id: r.id,
        title: "Requirement under review — " + r.title,
        sub: r.plainEnglish,
        status: "in_review",
        trace: "requirement sign-off"
      });
    }
  });

  (D.capsules || []).forEach(function (c) {
    if (c.reuses === 0) {
      inbox.push({
        id: c.id,
        title: "Unproven capsule awaiting adoption — " + c.id,
        sub: c.summary,
        status: "queued",
        trace: "awaiting first reuse"
      });
    }
  });

  var proposed = inbox.filter(function (i) { return i.status === "proposed"; }).length;
  var review = inbox.filter(function (i) { return i.status === "in_review"; }).length;

  var stats = _capModuleStats("validator", [
    { v: inbox.length, l: "Open items" },
    { v: proposed, l: "Proposed" },
    { v: review, l: "In review" },
    { v: (D.metrics && D.metrics.adoptionRate != null) ? D.metrics.adoptionRate + "%" : "—", l: "Adoption" }
  ]);

  var rows = inbox.length
    ? inbox.map(function (i) {
        return _capRow(i.id, i.title, i.sub, _capTrace(i.trace) + _capPill(i.status));
      }).join("")
    : '<div class="panel"><p class="muted">Inbox clear — every proposed change has been reviewed.</p></div>';

  root.innerHTML =
    _capHeader(
      "Validator",
      "Validator — human and signal feedback on proposed changes. Nothing is published until it clears review.",
      '<button class="btn ghost">Filter</button><button class="btn">Bulk approve</button>'
    ) +
    _capStats(stats) +
    _capSectionLabel("Feedback inbox") +
    rows;
}
