  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 8px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  min-width: 96px;
}
.skills-stat b {
  font-size: var(--fs-lg);
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.skills-stat span {
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--dim);
}

/* --- section label -------------------------------------------------------- */
.skills-section {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin: var(--s-6) 0 var(--s-4);
}
.skills-section .skills-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.skills-section .badge { background: var(--surface-2); }

/* --- skill registry list -------------------------------------------------- */
.skills-list { display: grid; gap: var(--s-4); }

.skills-card { padding: 0; overflow: hidden; }

.skills-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-4);
  padding: var(--s-5) var(--s-5) var(--s-4);
  border-bottom: 1px solid var(--border-soft);
  background: linear-gradient(180deg, rgba(167,139,250,.05), transparent 70%);
  flex-wrap: wrap;
}
.skills-id-row {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.skills-name {
  font-size: var(--fs-md);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
}
.skills-desc {
  max-width: 78ch;
  color: var(--muted);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
}
.skills-headmeta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  text-align: right;
  flex: none;
}
.skills-curver {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  font-weight: 600;
  color: var(--text);
  padding: 4px 10px;
  border-radius: var(--r-sm);
  background: color-mix(in srgb, var(--c-skill) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-skill) 36%, transparent);
}
.skills-curver .skills-curlbl {
  font-family: var(--font-sans);
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--c-skill);
}
.skills-repo {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--dim);
}
.skills-usedby {
  font-size: var(--fs-sm);
  color: var(--dim);
}

/* --- version timeline ----------------------------------------------------- */
.skills-timeline {
  position: relative;
  padding: var(--s-4) var(--s-5) var(--s-5);
}
.skills-tl-title {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  margin-bottom: var(--s-4);
}

.skills-ver {
  position: relative;
  padding: 0 0 var(--s-4) calc(var(--s-5) + 4px);
}
.skills-ver:last-child { padding-bottom: 0; }
/* connector spine */
.skills-ver::before {
  content: "";
  position: absolute;
  left: 7px;
  top: 18px;
  bottom: -4px;
  width: 2px;
  background: var(--border);
}
.skills-ver:last-child::before { display: none; }
/* node dot */
.skills-ver::after {
  content: "";
  position: absolute;
  left: 2px;
  top: 6px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--bump, var(--c-skill));
  box-shadow: 0 0 10px color-mix(in srgb, var(--bump, var(--c-skill)) 55%, transparent);
}
.skills-ver.is-proposed::after {
  background: color-mix(in srgb, var(--bump, var(--c-skill)) 22%, var(--surface));
  animation: skills-pulse 1.8s var(--ease) infinite;
}
@keyframes skills-pulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--bump) 50%, transparent); }
  50%      { box-shadow: 0 0 0 5px color-mix(in srgb, var(--bump) 0%, transparent); }
}

.skills-ver-top {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  flex-wrap: wrap;
  margin-bottom: 6px;
}

/* semver pill — bump colored */
.skills-semver {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  font-weight: 700;
  letter-spacing: -0.01em;
  padding: 3px 10px;
  border-radius: var(--r-pill);
  color: var(--bump, var(--c-skill));
  background: color-mix(in srgb, var(--bump, var(--c-skill)) 13%, transparent);
  border: 1px solid color-mix(in srgb, var(--bump, var(--c-skill)) 40%, transparent);
}
.skills-semver .skills-bump {
  font-family: var(--font-sans);
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  opacity: .85;
}
.skills-semver.major { --bump: var(--c-requirement); }
.skills-semver.minor { --bump: var(--c-capsule); }
.skills-semver.patch { --bump: var(--c-skill); }

.skills-current-tag {
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--accent);
}

.skills-changelog {
  color: var(--text);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  margin-bottom: 8px;
}

/* meta chips row */
.skills-vermeta {
  display: flex;
  align-items: center;
  gap: var(--s-2) var(--s-4);
  flex-wrap: wrap;
  font-size: var(--fs-sm);
  margin-bottom: 10px;
}
.skills-mchip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
}
.skills-mchip .skills-mk {
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--dim);
}
.skills-derived {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--c-capsule);
}
.skills-save { color: var(--ok); font-weight: 600; font-variant-numeric: tabular-nums; }
.skills-cost { color: var(--warn); font-weight: 600; font-variant-numeric: tabular-nums; }
.skills-score { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
.skills-teams { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

/* actions */
.skills-actions {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
}

/* pin / diff reveal — grid-rows technique sizes to content (no clip ceiling) */
.skills-reveal {
  display: grid;
  grid-template-rows: 0fr;
  opacity: 0;
  transition: grid-template-rows .26s var(--ease), opacity .22s var(--ease), margin .22s var(--ease);
}
.skills-reveal > * { overflow: hidden; min-height: 0; }
.skills-reveal.open {
  grid-template-rows: 1fr;
  opacity: 1;
  margin-top: 10px;
}

.skills-pinbox {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  padding: 8px 10px 8px 14px;
  background: var(--inset);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.skills-pinbox .skills-prompt { color: var(--accent); font-weight: 700; }
.skills-pincmd {
  flex: 1;
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  color: var(--text);
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow-x: auto;
}
.skills-copy {
  flex: none;
  padding: 5px 11px;
  font-size: var(--fs-xs);
}

/* diff reveal */
.skills-diff { display: grid; gap: var(--s-3); grid-template-columns: 1fr 1fr; }
.skills-diffcol {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--s-3) var(--s-4);
}
.skills-diffcol.before { border-left: 2px solid var(--err); }
.skills-diffcol.after  { border-left: 2px solid var(--ok); }
.skills-diffcol h5 {
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 6px;
}
.skills-diffcol.before h5 { color: var(--err); }
.skills-diffcol.after  h5 { color: var(--ok); }
.skills-diffcol p { color: var(--muted); font-size: var(--fs-sm); line-height: var(--lh-base); }
.skills-diffcol .skills-diff-rationale {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border-soft);
  color: var(--text);
  font-size: var(--fs-sm);
}

@media (max-width: 720px) {
  .skills-diff { grid-template-columns: minmax(0, 1fr); }
}

/* --- agents (compact) ----------------------------------------------------- */
.skills-agent {
  padding: var(--s-4);
}
.skills-agent-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
}
.skills-agent-name { font-size: var(--fs-md); font-weight: 700; color: var(--text); }
.skills-agent-ver {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--c-agent);
}
.skills-agent-skills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: var(--s-3) 0;
}
.skills-agent-tl { display: grid; gap: 10px; margin-top: var(--s-2); }
.skills-arow {
  display: flex;
  align-items: baseline;
  gap: var(--s-3);
  font-size: var(--fs-sm);
}
.skills-arow .skills-changelog { font-size: var(--fs-sm); margin: 0; color: var(--muted); }

/* ============================================================================
   CAPSULE — view-selection.css
   MODEL + MCP selection ("the decision moment"). View-scoped classes only,
   every custom class prefixed "selection-". Shared classes (.card,.panel,.k,
   .btn,.tag,.pill,.mono,.muted,.grid,.g2,.bar,.kv,.badge) come from tokens.
   ============================================================================ */

/* --- View header ---------------------------------------------------------- */
.selection-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-5);
  flex-wrap: wrap;
  margin-bottom: var(--s-5);
}
.selection-title {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.selection-title h1 { font-size: var(--fs-2xl); }
.selection-sub {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
  color: var(--muted);
  font-size: var(--fs-base);
}
.selection-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--faint); flex: none;
}

/* --- Step label above each picker ----------------------------------------- */
.selection-step {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  margin-bottom: var(--s-3);
}
.selection-step .selection-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px; height: 20px;
  border-radius: 50%;
  font-size: var(--fs-xs);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--accent-line);
  flex: none;
}

/* --- Task selector strip -------------------------------------------------- */
.selection-task {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  flex-wrap: wrap;
  margin-bottom: var(--s-5);
}
.selection-chips {
  display: flex;
  gap: var(--s-2);
  flex-wrap: wrap;
}
.selection-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 7px 12px;
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--muted);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--dur) var(--ease),
              border-color var(--dur) var(--ease),
              background var(--dur) var(--ease);
}
.selection-chip:hover { color: var(--text); border-color: var(--border-strong); }
.selection-chip .selection-chip-id {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  color: var(--dim);
}
.selection-chip.is-sel {
  color: var(--text);
  background: color-mix(in srgb, var(--c-workorder) 12%, transparent);
  border-color: color-mix(in srgb, var(--c-workorder) 45%, transparent);
}
.selection-chip.is-sel .selection-chip-id { color: var(--c-workorder); }

/* --- Option rows (model + mcp pickers share the structure) ---------------- */
.selection-list {
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}
.selection-opt {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: 12px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: border-color var(--dur) var(--ease),
              background var(--dur) var(--ease),
              box-shadow var(--dur) var(--ease);
}
.selection-opt:hover { border-color: var(--border-strong); background: var(--surface-3); }
.selection-opt.is-sel {
  border-color: var(--accent-line);
  background: linear-gradient(90deg, var(--accent-glow), rgba(56,189,248,.03));
  box-shadow: inset 2px 0 0 var(--accent), var(--shadow-1);
}
.selection-opt.is-disabled {
  opacity: .5;
  cursor: not-allowed;
}

/* selection indicator: radio for model, checkbox for mcp */
.selection-mark {
  flex: none;
  width: 18px; height: 18px;
  border: 1px solid var(--border-strong);
  background: var(--inset);
  position: relative;
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
}
.selection-mark.radio { border-radius: 50%; }
.selection-mark.check { border-radius: 5px; }
.selection-opt.is-sel .selection-mark {
  border-color: var(--accent);
  background: var(--accent);
}
.selection-mark.radio::after {
  content: ""; position: absolute; inset: 4px;
  border-radius: 50%;
  background: var(--accent-ink);
  opacity: 0; transition: opacity var(--dur) var(--ease);
}
.selection-mark.check::after {
  content: ""; position: absolute;
  left: 5px; top: 1px; width: 5px; height: 10px;
  border: solid var(--accent-ink);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) scale(.4);
  opacity: 0; transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.selection-opt.is-sel .selection-mark.radio::after { opacity: 1; }
.selection-opt.is-sel .selection-mark.check::after { opacity: 1; transform: rotate(45deg) scale(1); }

.selection-opt-body { flex: 1 1 auto; min-width: 0; }
.selection-opt-row {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
}
.selection-opt-name {
  font-weight: 600;
  color: var(--text);
  font-size: var(--fs-md);
  letter-spacing: -0.01em;
}
.selection-opt-meta {
  margin-top: 2px;
  color: var(--dim);
  font-size: var(--fs-sm);
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
}
.selection-opt-ctx {
  margin-left: auto;
  flex: none;
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  color: var(--muted);
}

/* --- Recommendation card -------------------------------------------------- */
.selection-rec {
  position: relative;
  overflow: hidden;
  border-color: color-mix(in srgb, var(--c-capsule) 32%, var(--border));
}
.selection-rec::before {
  content: "";
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--c-capsule), var(--accent-2));
}
.selection-rec-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-4);
  flex-wrap: wrap;
}
.selection-rec-title {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  flex-wrap: wrap;
}
.selection-rec-title .selection-skill-name {
  font-size: var(--fs-lg);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.selection-ver {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--c-capsule);
  padding: 2px 8px;
  border-radius: var(--r-sm);
  background: color-mix(in srgb, var(--c-capsule) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-capsule) 32%, transparent);
}
.selection-bump {
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  padding: 2px 7px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-strong);
  color: var(--muted);
  background: var(--surface-3);
}
.selection-bump.major { color: var(--err);  border-color: color-mix(in srgb, var(--err) 40%, transparent);  background: color-mix(in srgb, var(--err) 12%, transparent); }
.selection-bump.minor { color: var(--info); border-color: color-mix(in srgb, var(--info) 40%, transparent); background: color-mix(in srgb, var(--info) 12%, transparent); }
.selection-bump.patch { color: var(--ok);   border-color: color-mix(in srgb, var(--ok) 40%, transparent);   background: color-mix(in srgb, var(--ok) 12%, transparent); }

.selection-summary {
  margin: var(--s-3) 0 var(--s-4);
  color: var(--muted);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
}

/* value metrics row inside recommendation */
.selection-metrics {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--s-3);
  margin-bottom: var(--s-4);
}
.selection-metric {
  background: var(--inset);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 12px 14px;
}
.selection-metric .selection-metric-k {
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--dim);
}
.selection-metric .selection-metric-v {
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: var(--fs-lg);
  font-weight: 600;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.selection-metric.good .selection-metric-v { color: var(--ok); }
.selection-metric .selection-metric-sub {
  margin-top: 2px;
  font-size: var(--fs-xs);
  color: var(--dim);
}

/* --- Adopt / Pin segmented toggle ----------------------------------------- */
.selection-seg {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 4px;
  background: var(--inset);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.selection-seg-btn {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: flex-start;
  text-align: left;
  padding: 10px 14px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease);
}
.selection-seg-btn:hover { color: var(--text); background: var(--surface-2); }
.selection-seg-btn .selection-seg-top {
  display: flex; align-items: center; gap: var(--s-2);
  font-weight: 600; font-size: var(--fs-base);
}
.selection-seg-btn .selection-seg-note {
  font-size: var(--fs-xs);
  color: var(--dim);
  font-weight: 500;
}
.selection-seg-btn.is-on {
  color: var(--text);
  background: linear-gradient(180deg, var(--accent-glow), rgba(56,189,248,.04));
  border-color: var(--accent-line);
}
.selection-seg-btn.is-on .selection-seg-note { color: var(--muted); }
.selection-seg-btn:disabled { opacity: .5; cursor: not-allowed; }
.selection-seg-led {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--faint); flex: none;
  box-shadow: none;
  transition: background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.selection-seg-btn.is-on .selection-seg-led {
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

.selection-proposed {
  margin-top: var(--s-3);
  display: flex;
  align-items: flex-start;
  gap: var(--s-2);
  font-size: var(--fs-sm);
  color: var(--muted);
}

/* --- Memory note panel ---------------------------------------------------- */
.selection-mem {
  position: relative;
  border-color: color-mix(in srgb, var(--c-memory) 30%, var(--border));
  background: color-mix(in srgb, var(--c-memory) 5%, var(--surface-2));
}
.selection-mem-head {
  display: flex; align-items: center; gap: var(--s-2);
  margin-bottom: var(--s-2);
}
.selection-mem-head .selection-mem-title {
  font-weight: 600; color: var(--text); font-size: var(--fs-base);
}
.selection-mem p { font-size: var(--fs-base); line-height: var(--lh-base); }
.selection-mem-flow {
  margin-top: var(--s-3);
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  color: var(--muted);
}
.selection-mem-arrow { color: var(--c-memory); }
.selection-mem-node {
  padding: 3px 9px;
  border-radius: var(--r-pill);
  background: var(--surface-3);
  border: 1px solid var(--border);
}
.selection-mem-node.hub {
  color: var(--c-memory);
  border-color: color-mix(in srgb, var(--c-memory) 40%, transparent);
  background: color-mix(in srgb, var(--c-memory) 12%, transparent);
}

/* --- Token estimate ------------------------------------------------------- */
.selection-est-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: stretch;
  gap: var(--s-4);
}
.selection-est-col {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: var(--s-4);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--inset);
}
.selection-est-col.with {
  border-color: color-mix(in srgb, var(--ok) 36%, transparent);
  background: color-mix(in srgb, var(--ok) 7%, var(--inset));
}
.selection-est-num {
  font-family: var(--font-mono);
  font-size: var(--fs-2xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;

  line-height: 1.1;

.selection-est-unit { font-size: var(--fs-sm); color: var(--dim); font-weight: 500; }
.selection-est-vs {

  align-items: center;
  justify-content: center;
  gap: 4px;
  color: var(--dim);
  font-size: var(--fs-xs);

  letter-spacing: .1em;
}
.selection-est-vs .selection-save {

  font-size: var(--fs-lg);
  font-weight: 700;

  letter-spacing: -0.01em;
}
.selection-est-bar { margin-top: var(--s-4); }
.selection-est-bar .selection-bar-labels {
  display: flex;
  justify-content: space-between;

  font-size: var(--fs-xs);
  color: var(--dim);
}
.selection-reward {
  margin-top: var(--s-3);
  font-size: var(--fs-sm);

}
.selection-reward strong { color: var(--ok); font-variant-numeric: tabular-nums; }

/* --- Footer / start bar --------------------------------------------------- */

  display: flex;
  align-items: center;
  gap: var(--s-4);
  flex-wrap: wrap;

}
.selection-foot-sum {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
  font-size: var(--fs-sm);
  color: var(--muted);

.selection-foot-sum .mono { color: var(--text); }
.selection-foot-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: var(--s-3);

.selection-foot .btn { padding: 10px 20px; }

.selection-confirm {

  align-items: center;
  gap: var(--s-3);
  flex-wrap: wrap;
  width: 100%;
  color: var(--ok);

}
.selection-confirm .selection-confirm-detail {

/* ============================================================================
   CAPSULE — view-value.css
   Enterprise value dashboard. View-specific styles only; every class is
   prefixed "value-". Shared classes (.card,.k,.tag,.pill,.mono,.grid,.g3 …)
   come from 00-tokens.css and are reused, not restated.
   ============================================================================ */

/* --- View intro / frame copy --------------------------------------------- */
.value-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--s-5);
  flex-wrap: wrap;
  margin-bottom: var(--s-5);
}
.value-head .value-title {
  font-size: var(--fs-2xl);
  letter-spacing: -0.02em;
  margin: 6px 0 8px;
}
.value-head .value-sub {
  max-width: 56ch;
  color: var(--muted);
  font-size: var(--fs-md);
  line-height: 1.5;
}
.value-head .value-sub em {
  color: var(--text);
  font-style: normal;
  font-weight: 600;
}
.value-loop {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 7px 12px;
  border-radius: var(--r-pill);
  background: var(--surface-2);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.value-loop .value-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent-line);
  animation: value-pulse 2.4s var(--ease) infinite;
}
@keyframes value-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .35; transform: scale(.7); }
}

/* --- KPI grid ------------------------------------------------------------- */
.value-kpis {
  display: grid;
  grid-template-columns: 1.6fr repeat(2, 1fr);
  gap: var(--s-4);
  margin-bottom: var(--s-5);
}
@media (max-width: 1100px) { .value-kpis { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (max-width: 720px)  { .value-kpis { grid-template-columns: minmax(0,1fr); } }

.value-kpi {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow: hidden;
}
.value-kpi .value-num {
  font-size: var(--fs-2xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.05;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
.value-kpi .value-num .value-unit {
  font-size: var(--fs-md);
  font-weight: 600;
  color: var(--dim);
  margin-left: 4px;
  letter-spacing: 0;
}
.value-kpi .value-foot {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  font-size: var(--fs-sm);
  color: var(--dim);
}

/* hero (tokens saved) */
.value-kpi.value-hero {
  background:
    radial-gradient(520px 220px at 88% -30%, var(--accent-glow), transparent 70%),
    var(--surface);
  border-color: var(--accent-line);
}
.value-kpi.value-hero .value-num {
  font-size: clamp(40px, 6vw, 58px);
  background: linear-gradient(180deg, #eaf6ff, var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.value-kpi.value-hero .value-spark {
  position: absolute;
  right: 0; bottom: 0;
  width: 60%;
  height: 46px;
  opacity: .55;
  pointer-events: none;
}
.value-reward {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 9px;
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: .04em;
  border-radius: var(--r-sm);
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border: 1px solid var(--accent-line);
}

/* mini ring for percentage KPIs */
.value-ring {
  --p: 0;
  position: absolute;
  top: var(--s-5); right: var(--s-5);
  width: 44px; height: 44px;
  border-radius: 50%;
  background:
    conic-gradient(var(--accent) calc(var(--p) * 1%), var(--inset) 0);
  -webkit-mask: radial-gradient(circle 14px at center, transparent 98%, #000 100%);
          mask: radial-gradient(circle 14px at center, transparent 98%, #000 100%);
  transition: background .8s var(--ease);
}

/* --- Layout: chart + leaderboard ----------------------------------------- */
.value-main {
  display: grid;
  grid-template-columns: 1.55fr 1fr;
  gap: var(--s-4);
  align-items: stretch;
}
@media (max-width: 980px) { .value-main { grid-template-columns: minmax(0,1fr); } }

.value-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-4);
  margin-bottom: var(--s-4);
}
.value-card-head .value-cardtitle {
  font-size: var(--fs-lg);
  font-weight: 600;
  letter-spacing: -0.01em;
}
.value-card-head .value-cardnote { font-size: var(--fs-sm); color: var(--dim); margin-top: 2px; }

/* --- Compounding SVG chart ------------------------------------------------ */
.value-chart { width: 100%; height: auto; display: block; }
.value-chart .value-grid-l { stroke: var(--border-soft); stroke-width: 1; }
.value-chart .value-axis-t {
  fill: #6b7689;
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
}
.value-chart .value-area { fill: url(#valueAreaGrad); opacity: 0; transition: opacity .9s var(--ease) .25s; }
.value-chart.value-in .value-area { opacity: 1; }
.value-chart .value-line {
  fill: none;
  stroke: url(#valueLineGrad);
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 4px 12px var(--accent-glow));
}
.value-chart .value-pt {
  fill: var(--bg);
  stroke: var(--accent);
  stroke-width: 2;
  opacity: 0;
  transition: opacity .3s var(--ease);
}
.value-chart.value-in .value-pt { opacity: 1; }
.value-chart .value-pt-hit { fill: transparent; cursor: pointer; }
.value-chart .value-pt-hit:hover + .value-pt,
.value-chart .value-pt.value-on { r: 6; fill: var(--accent); }

/* floating tooltip */
.value-tip {
  position: absolute;
  transform: translate(-50%, -120%);
  padding: 7px 10px;
  border-radius: var(--r-sm);
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow-pop);
  font-size: var(--fs-sm);
  color: var(--text);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--dur) var(--ease);
  z-index: 5;
}
.value-tip.value-show { opacity: 1; }
.value-tip .value-tip-k { color: var(--dim); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: .08em; }
.value-tip .value-tip-v { font-family: var(--font-mono); color: var(--accent); font-weight: 700; }
.value-chartwrap { position: relative; }

.value-legend {
  display: flex;
  align-items: center;
  gap: var(--s-4);
  margin-top: var(--s-3);
  flex-wrap: wrap;
  font-size: var(--fs-sm);
  color: var(--muted);
}
.value-legend .value-lg { display: inline-flex; align-items: center; gap: 7px; }
.value-legend .value-swatch { width: 18px; height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--accent-2), var(--accent)); }
.value-legend .value-mono { font-family: var(--font-mono); color: var(--text); font-weight: 600; }

/* --- Leaderboard ---------------------------------------------------------- */
.value-board { display: flex; flex-direction: column; gap: 2px; }
.value-row {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  align-items: center;
  gap: var(--s-3);
  padding: 11px 10px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.value-row + .value-row { border-top: 1px solid var(--border-soft); border-radius: 0; }
.value-row:first-child { border-top: 0; }
.value-row:hover { background: var(--surface-2); border-color: var(--border); border-radius: var(--r-sm); }
.value-rank {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--dim);
  text-align: center;
}
.value-row:nth-child(1) .value-rank { color: var(--accent); }
.value-rmeta { min-width: 0; }
.value-rname {
  font-weight: 600;
  font-size: var(--fs-base);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: var(--s-2);
}
.value-rname .value-ver {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  color: var(--dim);
  font-weight: 500;
}
.value-rsub {
  font-size: var(--fs-xs);
  color: var(--dim);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.value-rbar {
  height: 4px;
  margin-top: 7px;
  background: var(--inset);
  border-radius: var(--r-pill);
  overflow: hidden;
}
.value-rbar > i {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  box-shadow: 0 0 10px var(--accent-glow);
  transition: width .8s var(--ease);
}
.value-rval { text-align: right; white-space: nowrap; }
.value-rval .value-big {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: var(--fs-md);
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.value-rval .value-small { font-size: var(--fs-xs); color: var(--dim); }

/* --- Footer strip --------------------------------------------------------- */
.value-strip {
  display: flex;
  align-items: center;
  gap: var(--s-4);
  flex-wrap: wrap;
  margin-top: var(--s-4);
  padding: var(--s-4) var(--s-5);

.value-strip .value-vsep { width: 1px; height: 16px; background: var(--border); }

// Enterprise RL-loop workspace on the 8090 Software Factory.

  // ------------------------------------------------------------------

    {

/* ============================================================================
   CAPSULE — 20-view-overview.js
   View: OVERVIEW — the 8090 Factory PROJECT landing for "Payments Copilot".
   Compact project header -> native module strip (Refinery..Validator) with the
   Knowledge Graph highlighted as CAPSULE's capture + feedback (RL) layer ->
   the 6-stage RL loop -> headline metric cards. Primary CTA opens the
   Knowledge Graph module.
   Exactly one top-level render function: renderOverview(root).
   All helpers are prefixed "overview_". Dataset read from global DATA.
   ============================================================================ */

function renderOverview(root) {
  const m  = DATA.metrics;
  const ws = DATA.workspace;

  // ---- headline metric cards ------------------------------------------
  const cards = [
    {
      label: "Tokens saved",
      val: overview_fmt(m.tokensSavedTotal),
      unit: "",
      sub: "reused downstream across the tenant",
      mc: "var(--c-capsule)",
      spark: (m.compounding || []).map((p) => p.tokensSaved)
    },
    {
      label: "Sessions captured",
      val: String(m.sessionsCaptured),
      unit: "",
      sub: m.capsules + " capsules distilled into memory",
      mc: "var(--c-model)"
    },
    {
      label: "Skills evolved",
      val: String(m.skillsEvolved),
      unit: "",
      sub: m.adoptionRate + "% adoption at selection time",
      mc: "var(--c-skill)"
    },
    {
      label: "Avg transfer",
      val: String(m.avgTransfer),
      unit: "/100",
      sub: "how well learnings carry across projects",
      mc: "var(--c-agent)"
    }
  ];

  const metricCards = cards
    .map(
      (c) => `
      <article class="card overview-metric" style="--mc:${c.mc}">
        <div class="overview-metric-top">
          <span class="k">${c.label}</span>
        </div>
        <div class="overview-metric-val">${c.val}<span class="overview-unit">${c.unit}</span></div>
        ${c.spark ? overview_spark(c.spark) : `<div class="overview-metric-sub">${c.sub}</div>`}
        ${c.spark ? `<div class="overview-metric-sub">${c.sub}</div>` : ""}
      </article>`
    )
    .join("");

  // ---- 8090 Software Factory native strip -----------------------------
  // The six native Factory modules ship the software; CAPSULE's Knowledge
  // Graph is the highlighted capture + feedback (RL) layer wrapped around them.
  const stripMeta = {
    refinery:  { sub: "Requirements", sc: "var(--c-requirement)" },
    foundry:   { sub: "Blueprints",   sc: "var(--c-skill)" },
    planner:   { sub: "Work Orders",  sc: "var(--c-workorder)" },
    assembler: { sub: "Agents",       sc: "var(--c-agent)" },
    tests:     { sub: "Verification", sc: "var(--ok)" },
    validator: { sub: "Feedback",     sc: "var(--c-model)" }
  };
  const factorySteps = (DATA.factoryModules || []).map((fm) => {
    const meta = stripMeta[fm.id] || { sub: fm.blurb, sc: "var(--accent)" };
    return { name: fm.label || fm.name, kind: meta.sub, sc: meta.sc };
  });
  factorySteps.push({
    name: "Knowledge Graph",
    kind: "capture + feedback · RL",
    sc: "var(--c-capsule)",
    kg: true
  });
  const stripHTML = factorySteps
    .map((s, i) => {
      const step = `
        <div class="overview-step${s.kg ? " overview-kg" : ""}">
          <span class="overview-step-dot" style="--sc:${s.sc}"></span>
          <span class="overview-step-name">${s.name}</span>
          <span class="overview-step-kind">${s.kind}</span>
        </div>`;
      const arrow = i < factorySteps.length - 1
        ? `<div class="overview-step-arrow">&rarr;</div>`
        : "";
      return step + arrow;
    })
    .join("");

  // ---- the RL loop (geometry generated in JS) -------------------------
  const loopHTML = overview_buildLoop();

/* ---- helper: format a large integer with thousands separators -------- */
function overview_fmt(n) {
  return Number(n).toLocaleString("en-US");
}

/* ---- helper: tiny inline sparkline svg from a number series ---------- */
function overview_spark(values) {
  const w = 240, h = 34, pad = 3;
  const max = Math.max.apply(null, values);
  const min = Math.min.apply(null, values);
  const span = max - min || 1;
  const n = values.length;
  const pts = values.map((v, i) => {
    const x = (i / (n - 1)) * (w - pad * 2) + pad;
    const y = h - pad - ((v - min) / span) * (h - pad * 2);
    return [x, y];
  });
  const line = pts.map((p, i) => `${i ? "L" : "M"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const area = `M${pts[0][0].toFixed(1)} ${h} ` +
               pts.map((p) => `L${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ") +
               ` L${pts[n - 1][0].toFixed(1)} ${h} Z`;
  const last = pts[n - 1];
  return `
    <svg class="overview-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
      <path class="overview-spark-area" d="${area}"></path>
      <path class="overview-spark-line" d="${line}"></path>
      <circle class="overview-spark-dot" cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.6"></circle>
    </svg>`;
}

/* ---- helper: polar -> cartesian on the loop canvas ------------------- */
function overview_polar(r, deg) {
  const a = (deg * Math.PI) / 180;
  return { x: 300 + r * Math.cos(a), y: 300 + r * Math.sin(a) };
}

/* ---- helper: build the animated 6-stage RL loop --------------------- */
function overview_buildLoop() {
  const R = 210;
  const stages = [
    { a: -90, name: "CAPTURE",  desc: "every session",     sc: "var(--c-capsule)", i: 0 },
    { a: -30, name: "DISTILL",  desc: "Cerebras",          sc: "var(--c-model)",   i: 1 },
    { a: 30,  name: "SCORE",    desc: "transfer + reward", sc: "var(--c-agent)",   i: 2 },
    { a: 90,  name: "VERSION",  desc: "semver",            sc: "var(--c-skill)",   i: 3 },
    { a: 150, name: "ADOPT",    desc: "at selection",      sc: "var(--c-workorder)", i: 4 },
    { a: 210, name: "COMPOUND", desc: "across tenant",     sc: "var(--c-memory)",  i: 5 }
  ];

  // connecting arcs along the ring (clockwise, gapped so arrowheads clear nodes)
  const gap = 14;
  const arcs = stages
    .map((s) => {
      const p1 = overview_polar(R, s.a + gap);
      const p2 = overview_polar(R, s.a + 60 - gap);
      return `<path class="overview-ring-arc"
        d="M${p1.x.toFixed(1)} ${p1.y.toFixed(1)} A ${R} ${R} 0 0 1 ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}"
        marker-end="url(#overview-ah)"></path>`;
    })
    .join("");

  // node chips, absolutely positioned by percentage of the square canvas
  const nodes = stages
    .map((s) => {
      const p = overview_polar(R, s.a);
      const left = ((p.x / 600) * 100).toFixed(2);
      const top = ((p.y / 600) * 100).toFixed(2);
      return `
        <div class="overview-loop-stage" style="left:${left}%;top:${top}%;--sc:${s.sc};--i:${s.i}">
          <span class="overview-stage-num">${s.i + 1}</span>
          <span class="overview-stage-name">${s.name}</span>
          <span class="overview-stage-desc">${s.desc}</span>
        </div>`;
    })
    .join("");

  // full ring path (motion track for travelling dots), starts at top, clockwise
  const ringPath = `M 300 ${300 - R} A ${R} ${R} 0 1 1 300 ${300 + R} A ${R} ${R} 0 1 1 300 ${300 - R}`;

  // reward arc: COMPOUND -> (over Backboard) -> DISTILL, with arrowhead
  const rs = overview_polar(150, 210);
  const re = overview_polar(150, -30);
  const rewardPath =
    `M${rs.x.toFixed(1)} ${rs.y.toFixed(1)} C 250 252, 350 252, ${re.x.toFixed(1)} ${re.y.toFixed(1)}`;

  return `
    <div class="overview-loop">
      <svg class="overview-loop-svg" viewBox="0 0 600 600" aria-hidden="true">
        <defs>
          <marker id="overview-ah" markerWidth="10" markerHeight="10" refX="6.5" refY="5" orient="auto">
            <path d="M1 1 L8 5 L1 9" fill="none" stroke="#38bdf8" stroke-width="1.6"/>
          </marker>
          <marker id="overview-ah-rw" markerWidth="10" markerHeight="10" refX="6.5" refY="5" orient="auto">
            <path d="M1 1 L8 5 L1 9" fill="none" stroke="#f59e0b" stroke-width="1.8"/>
          </marker>
        </defs>

        <path id="overview-ringpath" class="overview-ring" d="${ringPath}"></path>
        ${arcs}

        <path id="overview-rewardpath" class="overview-reward" d="${rewardPath}" marker-end="url(#overview-ah-rw)"></path>

        <circle class="overview-dot" r="5">
          <animateMotion dur="10s" repeatCount="indefinite" begin="0s">
            <mpath href="#overview-ringpath" xlink:href="#overview-ringpath"/>
          </animateMotion>
        </circle>
        <circle class="overview-dot" r="5">
          <animateMotion dur="10s" repeatCount="indefinite" begin="-3.33s">
            <mpath href="#overview-ringpath" xlink:href="#overview-ringpath"/>
          </animateMotion>
        </circle>
        <circle class="overview-dot" r="5">
          <animateMotion dur="10s" repeatCount="indefinite" begin="-6.66s">
            <mpath href="#overview-ringpath" xlink:href="#overview-ringpath"/>
          </animateMotion>
        </circle>
        <circle class="overview-reward-dot" r="4">
          <animateMotion dur="2.6s" repeatCount="indefinite">
            <mpath href="#overview-rewardpath" xlink:href="#overview-rewardpath"/>
          </animateMotion>
        </circle>
      </svg>

      <span class="overview-reward-label">token reward</span>
      ${nodes}

      <div class="overview-hub">
        <span class="k" style="color:var(--c-memory)">Backboard</span>
        <span class="overview-hub-title">Memory hub</span>
        <span class="overview-hub-rank">#1 LoCoMo &middot; LongMemEval</span>
      </div>
    </div>`;
}

/* ---- helper: CTA -> switch to the Knowledge Graph view --------------- */
function overview_gotoGraph() {
  const rail = document.querySelector(".rail");

  // Preferred path: dispatch a click on the rail's Knowledge Graph item so the
  // app router renders the view and sets the active state itself.
  if (rail) {
    let item =
      rail.querySelector('[data-view="Knowledge Graph"]') ||
      rail.querySelector('[href="#knowledge-graph"]') ||
      Array.prototype.find.call(
        rail.querySelectorAll("a, button, [role='button']"),
        (el) => /knowledge\s*graph|^\s*graph\s*$/i.test(el.textContent || "")
      );
    if (item) {
      item.click();
      return;
    }
  }

  // Fallback: render the graph view directly and set rail active state.
  const viewRoot = document.getElementById("view-root");
  if (viewRoot && typeof renderGraph === "function") {
    if (rail) {
      rail.querySelectorAll(".active").forEach((el) => el.classList.remove("active"));
      const guess = Array.prototype.find.call(
        rail.querySelectorAll("a, button"),
        (el) => /graph/i.test(el.textContent || "")
      );
      if (guess) guess.classList.add("active");
    }
    renderGraph(viewRoot);
  }
}

/* ============================================================================
   CAPSULE — Knowledge Graph view
   20-view-graph.js : hand-rolled force-directed graph over DATA.graph.
   Exactly one top-level render function: renderGraph(root).
   Helpers are top-level FUNCTION DECLARATIONS prefixed "graph_".
   No external libraries. Physics written by hand.
   ============================================================================ */

const GRAPH_W = 1000;
const GRAPH_H = 680;
const GRAPH_SVGNS = "http://www.w3.org/2000/svg";

/* Node visual weight (radius) + simulation gravity multiplier by type. */
const GRAPH_SPEC = {
  memory:      { r: 30, grav: 3.0 },   // Backboard hub — largest, holds centre
  capsule:     { r: 16, grav: 1.0 },
  skill:       { r: 16, grav: 1.0 },
  agent:       { r: 15, grav: 1.1 },
  model:       { r: 14, grav: 1.2 },
  requirement: { r: 13, grav: 1.0 },
  workorder:   { r: 12, grav: 1.0 },
  mcp:         { r: 13, grav: 1.0 }
};

const GRAPH_TYPE_LABEL = {
  capsule: "Capsule", skill: "Skill", agent: "Agent", workorder: "Work Order",
  requirement: "Requirement", model: "Model / Session", mcp: "MCP", memory: "Memory (Backboard)"
};

function renderGraph(root) {
  const src = DATA.graph;

  /* ---- build live node objects (copy so we never mutate DATA) ---- */
  const cx = GRAPH_W / 2, cy = GRAPH_H / 2;
  const nodes = src.nodes.map((n, i) => {
    const spec = GRAPH_SPEC[n.type] || { r: 12, grav: 1 };
    const isHub = n.type === "memory";
    const ang = (i / src.nodes.length) * Math.PI * 2;
    const rad = isHub ? 0 : 150 + (i % 5) * 26;
    return {
      id: n.id, type: n.type, label: n.label, sub: n.sub, refId: n.refId,
      r: spec.r, grav: spec.grav,
      x: cx + Math.cos(ang) * rad + (Math.random() - 0.5) * 30,
      y: cy + Math.sin(ang) * rad + (Math.random() - 0.5) * 30,
      vx: 0, vy: 0, pinned: isHub, hidden: false
    };
  });
  const byId = {};
  nodes.forEach(n => { byId[n.id] = n; });

  const links = src.links
    .map(l => ({ source: byId[l.source], target: byId[l.target], kind: l.kind }))
    .filter(l => l.source && l.target);

  /* adjacency for hover-neighbor highlight */
  const adj = {};
  nodes.forEach(n => { adj[n.id] = new Set([n.id]); });
  links.forEach(l => { adj[l.source.id].add(l.target.id); adj[l.target.id].add(l.source.id); });

  /* type -> count for legend */
  const counts = {};
  nodes.forEach(n => { counts[n.type] = (counts[n.type] || 0) + 1; });
  const order = ["capsule", "skill", "agent", "workorder", "requirement", "model", "mcp", "memory"];
  const types = order.filter(t => counts[t]);

  /* ---- shell ---- */
  root.innerHTML = `
    <div class="graph-head">
      <div class="graph-head-l">
        <div class="graph-title">
          Knowledge Graph
          <span class="pill ok">${nodes.length} entities · ${links.length} links</span>
        </div>
        <div class="graph-caption">
          <b>CAPSULE extends 8090's Knowledge Graph</b> with the capture + feedback layer —
          every session mints a capsule that compounds into versioned skills, all persisted in
          Backboard and routed back to the agents that need them.
        </div>
      </div>
      <div class="graph-legend" id="graphLegend">
        ${types.map(t => `
          <button class="graph-chip" data-type="${t}" aria-pressed="true">
            <span class="graph-dot"></span>${GRAPH_TYPE_LABEL[t]}
            <span class="graph-chip-n">${counts[t]}</span>
          </button>`).join("")}
      </div>
    </div>

    <div class="graph-stage">
      <div>
        <div class="graph-canvas" id="graphCanvas">
          <svg class="graph-svg" id="graphSvg" viewBox="0 0 ${GRAPH_W} ${GRAPH_H}"
               preserveAspectRatio="xMidYMid meet" role="img"
               aria-label="Force-directed knowledge graph of capsules, skills, agents and Backboard memory">
            <g class="graph-grid" id="graphGrid"></g>
            <g id="graphLinks"></g>
            <g id="graphNodes"></g>
          </svg>
          <div class="graph-tip" id="graphTip"></div>
        </div>
        <div class="graph-foot">
          <span><kbd>drag</kbd> reposition &amp; pin a node</span>
          <span><kbd>hover</kbd> isolate neighbours</span>
          <span><kbd>click</kbd> open inspector · <kbd>click bg</kbd> deselect</span>
        </div>
      </div>

      <aside class="graph-inspector">
        <div class="graph-insp-head">
          <span class="k">Inspector</span>
          <button class="graph-insp-x" id="graphInspX" title="Deselect" aria-label="Deselect" hidden>✕</button>
        </div>
        <div class="graph-insp-body" id="graphInsp"></div>
      </aside>
    </div>
  `;

  /* ---- backdrop grid ---- */
  const gGrid = root.querySelector("#graphGrid");
  for (let x = 0; x <= GRAPH_W; x += 50) gGrid.appendChild(graph_svg("line", { x1: x, y1: 0, x2: x, y2: GRAPH_H }));
  for (let y = 0; y <= GRAPH_H; y += 50) gGrid.appendChild(graph_svg("line", { x1: 0, y1: y, x2: GRAPH_W, y2: y }));

  /* ---- draw links ---- */
  const gLinks = root.querySelector("#graphLinks");
  links.forEach(l => {
    const line = graph_svg("line", { class: "graph-link", "data-kind": l.kind || "" });
    l.el = line;
    gLinks.appendChild(line);
  });

  /* ---- draw nodes ---- */
  const gNodes = root.querySelector("#graphNodes");
  nodes.forEach(n => {
    const g = graph_svg("g", {
      class: "graph-node", "data-type": n.type, "data-id": n.id,
      tabindex: "0", role: "button",
      "aria-label": (GRAPH_TYPE_LABEL[n.type] || n.type) + ": " + n.label
    });
    const ring = graph_svg("circle", { class: "graph-ring", r: n.r + 5 });
    const disc = graph_svg("circle", { class: "graph-disc", r: n.r });
    const core = graph_svg("circle", { class: "graph-core", r: Math.max(2.5, n.r * 0.32) });
    const text = graph_svg("text", { class: "graph-label", y: n.r + 14 });
    text.textContent = n.label;
    g.append(ring, disc, core, text);
    n.el = g; n.discEl = disc; n.textEl = text;
    gNodes.appendChild(g);
  });

  /* ---- simulation state ---- */
  const state = {
    nodes, links, byId, adj, root,
    svg: root.querySelector("#graphSvg"),
    canvas: root.querySelector("#graphCanvas"),
    tip: root.querySelector("#graphTip"),
    insp: root.querySelector("#graphInsp"),
    inspX: root.querySelector("#graphInspX"),
    hidden: new Set(),
    selected: null,
    hover: null,
    drag: null,
    alpha: 1,
    raf: null,
    // physics constants (tuned for ~26 nodes in 1000x680)
    repulsion: 26000,
    spring: 0.045,
    rest: 140,
    gravity: 0.022,
    damping: 0.86,
    cooling: 0.985,
    maxV: 16
  };

  graph_draw(state);
  graph_renderInspectorEmpty(state);
  graph_reheat(state);

  /* ---- interactions ---- */
  // hover (delegated)
  gNodes.addEventListener("pointerover", e => {
    const g = e.target.closest(".graph-node");
    if (!g) return;
    const n = byId[g.getAttribute("data-id")];
    if (!n || n.hidden) return;
    state.hover = n.id;
    graph_applyHighlight(state);
    graph_showTip(state, n, e);
  });
  gNodes.addEventListener("pointermove", e => {
    if (state.hover && !state.drag) graph_moveTip(state, e);
  });
  gNodes.addEventListener("pointerout", e => {
    const g = e.target.closest(".graph-node");
    if (!g) return;
    if (e.relatedTarget && g.contains(e.relatedTarget)) return;
    state.hover = null;
    graph_applyHighlight(state);
    graph_hideTip(state);
  });

  // keyboard: focus a node (tabindex) + Enter/Space to open the inspector
  gNodes.addEventListener("keydown", e => {
    const g = e.target.closest(".graph-node");
    if (!g) return;
    if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
      e.preventDefault();
      const n = byId[g.getAttribute("data-id")];
      if (n && !n.hidden) graph_select(state, n.id);
    }
  });

  // drag (pointer events) + click-to-select
  state.svg.addEventListener("pointerdown", e => {
    const g = e.target.closest(".graph-node");
    if (!g) return;
    const n = byId[g.getAttribute("data-id")];
    if (!n || n.hidden) return;
    e.preventDefault();
    const p = graph_toSvg(state, e.clientX, e.clientY);
    state.drag = { node: n, moved: false, dx: n.x - p.x, dy: n.y - p.y };
    state.svg.classList.add("dragging");
    state.svg.setPointerCapture(e.pointerId);
    graph_hideTip(state);
  });
  state.svg.addEventListener("pointermove", e => {
    if (!state.drag) return;
    const p = graph_toSvg(state, e.clientX, e.clientY);
    const n = state.drag.node;
    n.x = Math.max(n.r + 6, Math.min(GRAPH_W - n.r - 6, p.x + state.drag.dx));
    n.y = Math.max(n.r + 6, Math.min(GRAPH_H - n.r - 6, p.y + state.drag.dy));
    n.vx = 0; n.vy = 0;
    n.pinned = true;          // dropped node stays put until re-dragged
    state.drag.moved = true;
    graph_reheat(state);
  });
  state.svg.addEventListener("pointerup", e => {
    if (!state.drag) return;
    const n = state.drag.node;
    const wasMove = state.drag.moved;
    state.drag = null;
    state.svg.classList.remove("dragging");
    try { state.svg.releasePointerCapture(e.pointerId); } catch (_) {}
    if (!wasMove) graph_select(state, n.id);   // a click, not a drag
  });

  // click on background -> deselect
  state.svg.addEventListener("click", e => {
    if (!e.target.closest(".graph-node")) graph_select(state, null);
  });
  state.inspX.addEventListener("click", () => graph_select(state, null));

  // legend filter toggles
  root.querySelector("#graphLegend").addEventListener("click", e => {
    const chip = e.target.closest(".graph-chip");
    if (!chip) return;
    const t = chip.getAttribute("data-type");
    if (state.hidden.has(t)) state.hidden.delete(t); else state.hidden.add(t);
    chip.classList.toggle("off", state.hidden.has(t));
    chip.setAttribute("aria-pressed", String(!state.hidden.has(t)));
    graph_applyFilters(state);
    graph_reheat(state);
  });

  // inspector -> jump to a connected entity by clicking its tag
  state.insp.addEventListener("click", e => {
    const j = e.target.closest("[data-jump]");
    if (j) { graph_select(state, j.getAttribute("data-jump")); return; }
    const act = e.target.closest("[data-act]");
    if (act) graph_action(state, act);
  });
}

/* -------------------------------------------------------------------------
   SVG element factory
   ------------------------------------------------------------------------- */
function graph_svg(tag, attrs) {
  const el = document.createElementNS(GRAPH_SVGNS, tag);
  if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

/* -------------------------------------------------------------------------
   Physics — one integration step. Returns peak speed (for settling check).
   pairwise repulsion + link springs + centring gravity + velocity damping.
   ------------------------------------------------------------------------- */
function graph_step(s) {
  const { nodes, links } = s;
  const cx = GRAPH_W / 2, cy = GRAPH_H / 2;

  for (const n of nodes) { n.fx = 0; n.fy = 0; }

  // repulsion (Coulomb-style, only between visible nodes)
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i]; if (a.hidden) continue;
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j]; if (b.hidden) continue;
      let dx = a.x - b.x, dy = a.y - b.y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 0.01) { dx = Math.random() - 0.5; dy = Math.random() - 0.5; d2 = 0.01; }
      const d = Math.sqrt(d2);
      const f = s.repulsion / d2;
      const ux = dx / d, uy = dy / d;
      a.fx += ux * f; a.fy += uy * f;
      b.fx -= ux * f; b.fy -= uy * f;
    }
  }

  // link springs (Hooke toward rest length)
  for (const l of links) {
    if (l.source.hidden || l.target.hidden) continue;
    let dx = l.target.x - l.source.x, dy = l.target.y - l.source.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
    const f = (d - s.rest) * s.spring;
    const ux = dx / d, uy = dy / d;
    l.source.fx += ux * f; l.source.fy += uy * f;
    l.target.fx -= ux * f; l.target.fy -= uy * f;
  }

  // centring gravity + integrate
  let peak = 0;
  for (const n of nodes) {
    if (n.hidden) continue;
    n.fx += (cx - n.x) * s.gravity * n.grav;
    n.fy += (cy - n.y) * s.gravity * n.grav;
    if (n.pinned) { n.vx = 0; n.vy = 0; continue; }

    n.vx = (n.vx + n.fx * s.alpha) * s.damping;
    n.vy = (n.vy + n.fy * s.alpha) * s.damping;

    // clamp velocity for stability
    const sp = Math.hypot(n.vx, n.vy);
    if (sp > s.maxV) { n.vx = n.vx / sp * s.maxV; n.vy = n.vy / sp * s.maxV; }

    n.x += n.vx; n.y += n.vy;

    // keep inside bounds
    const pad = n.r + 8;
    if (n.x < pad) { n.x = pad; n.vx *= -0.4; }
    if (n.x > GRAPH_W - pad) { n.x = GRAPH_W - pad; n.vx *= -0.4; }
    if (n.y < pad) { n.y = pad; n.vy *= -0.4; }
    if (n.y > GRAPH_H - pad) { n.y = GRAPH_H - pad; n.vy *= -0.4; }

    if (sp > peak) peak = sp;
  }

  s.alpha *= s.cooling;
  return peak;
}

/* paint current positions to the DOM */
function graph_draw(s) {
  for (const n of s.nodes) {
    if (n.hidden) continue;
    n.el.setAttribute("transform", `translate(${n.x.toFixed(2)} ${n.y.toFixed(2)})`);
  }
  for (const l of s.links) {
    if (l.source.hidden || l.target.hidden) continue;
    l.el.setAttribute("x1", l.source.x.toFixed(2));
    l.el.setAttribute("y1", l.source.y.toFixed(2));
    l.el.setAttribute("x2", l.target.x.toFixed(2));
    l.el.setAttribute("y2", l.target.y.toFixed(2));
  }
}

/* rAF loop until settled; re-heat restarts it */
function graph_reheat(s) {
  s.alpha = Math.max(s.alpha, 0.7);
  if (s.raf) return;
  const loop = () => {
    const peak = graph_step(s);
    graph_draw(s);
    if (s.drag || s.alpha > 0.02 || peak > 0.35) {
      s.raf = requestAnimationFrame(loop);
    } else {
      s.raf = null;
    }
  };
  s.raf = requestAnimationFrame(loop);
}

/* -------------------------------------------------------------------------
   Pointer (client) -> SVG user coordinates
   ------------------------------------------------------------------------- */
function graph_toSvg(s, clientX, clientY) {
  const r = s.svg.getBoundingClientRect();
  return {
    x: (clientX - r.left) / r.width * GRAPH_W,
    y: (clientY - r.top) / r.height * GRAPH_H
  };
}

/* -------------------------------------------------------------------------
   Highlight: hovered/selected node + neighbours bright, rest dim
   ------------------------------------------------------------------------- */
function graph_applyHighlight(s) {
  const focus = s.hover || s.selected;
  if (!focus) {
    s.svg.classList.remove("focusing");
    s.nodes.forEach(n => n.el.classList.remove("dim"));
    s.links.forEach(l => l.el.classList.remove("dim", "hot"));
    return;
  }
  s.svg.classList.add("focusing");
  const near = s.adj[focus] || new Set([focus]);
  s.nodes.forEach(n => {
    if (n.hidden) return;
    n.el.classList.toggle("dim", !near.has(n.id));
  });
  s.links.forEach(l => {
    if (l.source.hidden || l.target.hidden) return;
    const hot = l.source.id === focus || l.target.id === focus;
    l.el.classList.toggle("hot", hot);
    l.el.classList.toggle("dim", !hot);
  });
}

/* -------------------------------------------------------------------------
   Type filters: show/hide node types + their links, live
   ------------------------------------------------------------------------- */
function graph_applyFilters(s) {
  s.nodes.forEach(n => {
    n.hidden = s.hidden.has(n.type);
    n.el.classList.toggle("hidden", n.hidden);
  });
  s.links.forEach(l => {
    const hide = l.source.hidden || l.target.hidden;
    l.el.classList.toggle("hidden", hide);
  });
  // deselect if the selected node was hidden
  if (s.selected && s.byId[s.selected] && s.byId[s.selected].hidden) graph_select(s, null);
  graph_applyHighlight(s);
}

/* -------------------------------------------------------------------------
   Tooltip
   ------------------------------------------------------------------------- */
function graph_showTip(s, n, e) {
  s.tip.innerHTML = `
    <div class="graph-tip-type" style="--c:var(--c-${n.type})">${GRAPH_TYPE_LABEL[n.type]}</div>
    <div class="graph-tip-title">${graph_esc(n.label)}</div>
    <div class="graph-tip-sub mono">${graph_esc(n.sub || n.id)}</div>
    <div class="graph-tip-hint">Click to inspect</div>`;
  s.tip.classList.add("show");
  graph_moveTip(s, e);
}
function graph_moveTip(s, e) {
  const r = s.canvas.getBoundingClientRect();
  let x = e.clientX - r.left + 14;
  let y = e.clientY - r.top + 14;
  const tw = s.tip.offsetWidth || 180, th = s.tip.offsetHeight || 80;
  if (x + tw > r.width) x = e.clientX - r.left - tw - 14;
  if (y + th > r.height) y = e.clientY - r.top - th - 14;
  s.tip.style.left = Math.max(6, x) + "px";
  s.tip.style.top = Math.max(6, y) + "px";
}
function graph_hideTip(s) { s.tip.classList.remove("show"); }

/* -------------------------------------------------------------------------
   Selection + inspector orchestration
   ------------------------------------------------------------------------- */
function graph_select(s, id) {
  // ignore jumps to entities that exist in DATA but aren't graph nodes
  if (id && !s.byId[id]) return;
  s.selected = id;
  s.nodes.forEach(n => n.el.classList.toggle("sel", n.id === id));
  s.inspX.hidden = !id;
  graph_applyHighlight(s);
  if (!id) { graph_renderInspectorEmpty(s); return; }
  graph_renderInspector(s, s.byId[id]);
}

function graph_renderInspectorEmpty(s) {
  s.insp.innerHTML = `
    <div class="graph-insp-empty">
      <div class="graph-orbit"></div>
      <div class="graph-insp-title" style="color:var(--muted)">Select a node</div>
      <p style="font-size:var(--fs-sm);max-width:30ch;">
        Hover to isolate a neighbourhood. Click any entity to inspect its detail,
        token economics and Backboard lineage.
      </p>
    </div>`;
}

/* lookup the source record for a node from the matching DATA collection */
function graph_lookup(n) {
  switch (n.type) {
    case "capsule":     return (DATA.capsules || []).find(c => c.id === n.refId);
    case "skill":       return (DATA.skills || []).find(c => c.id === n.refId);
    case "agent":       return (DATA.agents || []).find(c => c.id === n.refId);
    case "workorder":   return (DATA.workOrders || []).find(c => c.id === n.refId);
    case "requirement": return (DATA.requirements || []).find(c => c.id === n.refId);
    case "model":       return (DATA.models || []).find(c => c.id === n.refId);
    case "mcp":         return (DATA.mcps || []).find(c => c.id === n.refId);
    default:            return null;
  }
}

function graph_renderInspector(s, n) {
  const rec = graph_lookup(n);
  let html = `
    <div class="graph-insp-row" style="--c:var(--c-${n.type})">
      <span class="tag ${n.type}">${GRAPH_TYPE_LABEL[n.type]}</span>
      <span class="mono dim">${graph_esc(n.refId)}</span>
    </div>
    <div class="graph-insp-title">${graph_esc(n.label)}</div>`;

  if (n.type === "capsule" && rec)          html += graph_capsuleBody(s, rec);
  else if (n.type === "skill" && rec)       html += graph_skillBody(s, rec);
  else if (n.type === "agent" && rec)       html += graph_agentBody(s, rec);
  else if (n.type === "workorder" && rec)   html += graph_workorderBody(rec);
  else if (n.type === "requirement" && rec) html += graph_requirementBody(rec);
  else if (n.type === "model" && rec)       html += graph_modelBody(s, rec);
  else if (n.type === "mcp" && rec)         html += graph_mcpBody(rec);
  else if (n.type === "memory")             html += graph_memoryBody(s);

  // connected entities (jump links), excludes hidden types
  html += graph_neighbours(s, n);

  s.insp.innerHTML = html;
  s.insp.scrollTop = 0;
}

/* a tag chip that is clickable (jump) only when the id is a real graph node */
function graph_ref(s, id, type, label) {
  const live = !!s.byId[id];
  return `<span class="tag ${type}${live ? " graph-jump" : ""}"${live ? ` data-jump="${graph_esc(id)}"` : ` title="not in current graph view"`}>${graph_esc(label)}</span>`;
}

/* ---- per-type inspector bodies ---- */
function graph_capsuleBody(s, c) {
  const net = c.reuses * c.tokensSavedPerReuse;
  return `
    <div class="graph-summary" style="--c:var(--c-capsule)">${graph_esc(c.summary)}</div>
    ${c.intent ? `
      <div class="graph-sec"><span class="k">Intent</span></div>
      <p style="font-size:var(--fs-sm);color:var(--muted);line-height:1.5;margin:0 0 var(--s-2)">${graph_esc(c.intent)}</p>` : ""}
    ${c.mentalModel ? `
      <div class="graph-sec"><span class="k">Mental model</span></div>
      <p style="font-size:var(--fs-sm);color:var(--text);line-height:1.5;margin:0 0 var(--s-2);padding:var(--s-2) var(--s-3);background:var(--inset);border:1px solid var(--border-soft);border-left:2px solid var(--c-capsule);border-radius:var(--r-sm)">${graph_esc(c.mentalModel)}</p>` : ""}
    ${graph_scoreBar("Novelty", c.novelty)}
    ${graph_scoreBar("Importance", c.importance)}
    ${graph_scoreBar("Transfer score", c.transferScore)}
    <div class="graph-metrics">
      <div class="graph-metric"><span class="graph-metric-v">${graph_kt(c.tokensSpent)}</span><span class="graph-metric-k">Tokens spent</span></div>
      <div class="graph-metric"><span class="graph-metric-v">${graph_kt(c.tokensSavedPerReuse)}</span><span class="graph-metric-k">Saved / reuse</span></div>
      <div class="graph-metric"><span class="graph-metric-v pos">${c.reuses}×</span><span class="graph-metric-k">Reuses</span></div>
    </div>
    <div class="graph-metrics" style="grid-template-columns:1fr 1fr">
      <div class="graph-metric"><span class="graph-metric-v pos">${graph_kt(net)}</span><span class="graph-metric-k">Net tokens saved</span></div>
      <div class="graph-metric"><span class="graph-metric-v mono" style="font-size:var(--fs-sm)">${graph_esc(c.model)}</span><span class="graph-metric-k">Session model</span></div>
    </div>
    ${c.learnings && c.learnings.length ? `
      <div class="graph-sec"><span class="k">Learnings</span></div>
      <ul class="graph-list" style="--c:var(--c-capsule)">${c.learnings.map(x => `<li>${graph_esc(x)}</li>`).join("")}</ul>` : ""}
    ${c.gotchas && c.gotchas.length ? `
      <div class="graph-sec"><span class="k">Gotchas</span></div>
      <ul class="graph-list warn">${c.gotchas.map(x => `<li>${graph_esc(x)}</li>`).join("")}</ul>` : ""}
    <div class="graph-store">
      <span class="graph-store-dot"></span>
      Stored in <b>${graph_esc(c.storedIn)}</b> · thread <span class="mono">${graph_esc(c.threadId)}</span>
    </div>
    ${c.producedVersion ? `
      <div class="graph-sec"><span class="k">Produced</span></div>
      ${graph_ref(s, c.producedVersion.split("@")[0], "skill", c.producedVersion)}` : ""}`;
}

function graph_skillBody(s, sk) {
  const latest = sk.versions[sk.versions.length - 1];
  const saved = Math.abs(latest.tokenDeltaPerUse || 0);
  const proposed = latest.status === "proposed";
  return `
    <div class="graph-insp-row" style="margin-top:8px">
      <span class="pill">v${graph_esc(sk.currentVersion)} current</span>
      <span class="pill ${proposed ? "warn" : "ok"}">${proposed ? "latest proposed" : "latest published"}</span>
    </div>
    <p style="font-size:var(--fs-sm);margin:var(--s-2) 0 var(--s-3)">${graph_esc(sk.description)}</p>
    <div class="graph-metrics">
      <div class="graph-metric"><span class="graph-metric-v pos"><span class="graph-delta">${graph_kt(saved)}</span></span><span class="graph-metric-k">Token Δ / use</span></div>
      <div class="graph-metric"><span class="graph-metric-v pos">+${latest.scoreDelta}</span><span class="graph-metric-k">Transfer lift</span></div>
      <div class="graph-metric"><span class="graph-metric-v">${latest.adoptedBy}</span><span class="graph-metric-k">Adopted by</span></div>
    </div>
    <div class="graph-sec"><span class="k">Latest changelog</span></div>
    <div class="graph-changelog">
      <div class="graph-changelog-head">

      <p>${graph_esc(latest.changelog)}</p>

    <div class="muted" style="font-size:var(--fs-xs)">Derived from capsule

    <div class="graph-actions">
      <button class="btn alt" data-act="pin" data-ver="${graph_esc(sk.currentVersion)}" data-skill="${graph_esc(sk.id)}">Pin v${graph_esc(sk.currentVersion)}</button>
      <button class="btn" data-act="adopt" data-ver="${graph_esc(latest.version)}" data-skill="${graph_esc(sk.id)}" data-saved="${saved}">Adopt latest</button>
    </div>
    <div data-toast></div>`;
}

function graph_agentBody(s, a) {
  const latest = a.versions[a.versions.length - 1];
  return `
    <div class="graph-insp-row" style="margin-top:8px">
      <span class="pill ok">v${graph_esc(a.currentVersion)}</span>
      <span class="pill">${a.executes.length} work orders</span>
    </div>
    <div class="graph-sec"><span class="k">Uses skills</span></div>
    <div class="graph-tags">${a.usesSkills.map(id => graph_ref(s, id, "skill", graph_short(id))).join("")}</div>
    <div class="graph-sec"><span class="k">Executes</span></div>
    <div class="graph-tags">${a.executes.map(id => graph_ref(s, id, "workorder", id)).join("")}</div>
    <div class="graph-sec"><span class="k">Latest evolution</span></div>
    <div class="graph-changelog">
      <div class="graph-changelog-head">
        <span class="graph-ver mono">v${graph_esc(latest.version)}</span>
