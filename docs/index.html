<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAPSULE — the enterprise RL loop for 8090 Software Factory</title>
<style>
/* ============================================================================
   CAPSULE — Design System Foundation
   00-tokens.css : palette tokens, reset, base typography, component library
   8090-matched visual identity. Self-contained, no external assets.
   ============================================================================ */

/* ---------------------------------------------------------------------------
   (a) TOKENS — :root custom properties
   --------------------------------------------------------------------------- */
:root {
  /* --- Surfaces (near-black charcoal — 8090 product chrome) --- */
  --bg:            #0a0b0d;   /* app background */
  --bg-2:          #08090b;   /* deepest / behind-panels */
  --surface:       #0f1117;   /* lifted product surface (sidebar, bars) */
  --surface-2:     #13161d;   /* panels / cards */
  --surface-3:     #181c24;   /* hover / active fill */
  --inset:         #0c0e12;   /* sunken (inputs, bars) */

  /* --- Borders (hairline) --- */
  --border:        #1c2128;   /* hairline border */
  --border-soft:   #161a20;   /* subtler divider */
  --border-strong: #232a33;   /* emphasized edge */

  /* --- Text --- */
  --text:          #e8edf4;   /* near-white primary */
  --muted:         #93a0b4;   /* muted gray secondary */
  --dim:           #5e6b7e;   /* dim tertiary */
  --faint:         #3a4252;   /* faint / placeholder */

  /* --- Accents (brand) --- */
  --accent:        #38bdf8;   /* primary cyan */
  --accent-2:      #4d9fff;   /* blue */
  --accent-ink:    #04222e;   /* text on accent */
  --accent-glow:   rgba(56,189,248,.16);
  --accent-line:   rgba(56,189,248,.40);

  /* --- Entity-type colors --- */
  --c-capsule:     #38bdf8;   /* cyan */
  --c-skill:       #a78bfa;   /* violet */
  --c-agent:       #34d399;   /* green */
  --c-workorder:   #f59e0b;   /* amber */
  --c-requirement: #fb7185;   /* rose */
  --c-model:       #60a5fa;   /* blue */
  --c-mcp:         #2dd4bf;   /* teal */
  --c-memory:      #818cf8;   /* indigo (Backboard) */

  /* --- Semantic state --- */
  --ok:            #34d399;
  --warn:          #f59e0b;
  --err:           #fb7185;
  --info:          #60a5fa;

  /* --- Typography --- */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code",
               Consolas, "Liberation Mono", Menlo, monospace;

  --fs-xs:   11px;
  --fs-sm:   12px;
  --fs-base: 13.5px;
  --fs-md:   15px;
  --fs-lg:   18px;
  --fs-xl:   24px;
  --fs-2xl:  32px;

  --lh-tight: 1.25;
  --lh-base:  1.55;

  /* --- Spacing scale --- */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;

  /* --- Radius --- */
  --r-sm:   8px;
  --r-md:   12px;
  --r-lg:   14px;
  --r-pill: 999px;

  /* --- Elevation / shadow --- */
  --shadow-1: 0 1px 0 rgba(255,255,255,.02) inset, 0 1px 2px rgba(0,0,0,.45);
  --shadow-2: 0 8px 30px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.03) inset;
  --shadow-pop: 0 18px 60px rgba(0,0,0,.55);

  /* --- Layout --- */
  --rail-w:    216px;   /* legacy rail (kept for back-compat) */
  --sidebar-w: 232px;   /* 8090 module sidebar */
  --topbar-h:  52px;
  --view-pad:  28px;

  /* --- Motion --- */
  --ease: cubic-bezier(.2, .7, .2, 1);
  --dur:  .16s;

  color-scheme: dark;
}

/* ---------------------------------------------------------------------------
   (b) RESET + BASE
   --------------------------------------------------------------------------- */
*, *::before, *::after { box-sizing: border-box; }

* { margin: 0; padding: 0; }

html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

html, body { height: 100%; }

body {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  color: var(--text);
  background-color: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv02","cv03","cv04","cv11","ss01";
  text-rendering: optimizeLegibility;

  /* SUBTLE css-only noise + grid texture via layered gradients (no images) */
  background-image:
    /* faint accent aura, top-left */
    radial-gradient(900px 540px at 12% -8%, rgba(56,189,248,.045), transparent 60%),
    radial-gradient(760px 520px at 100% 0%, rgba(77,159,255,.035), transparent 55%),
    /* pseudo-noise: tiny offset radial dots at low opacity */
    radial-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,.010) 1px, transparent 1px),
    /* hairline grid */
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
    /* base vertical wash */
    linear-gradient(180deg, #0b0c0f 0%, var(--bg) 38%, var(--bg-2) 100%);
  background-size:
    100% 100%,
    100% 100%,
    3px 3px,
    7px 7px,
    32px 32px,
    32px 32px,
    100% 100%;
  background-position:
    0 0, 0 0,
    0 0, 2px 3px,
    0 0, 0 0,
    0 0;
  background-attachment: fixed;
}

img, svg, video, canvas { display: block; max-width: 100%; }

input, button, textarea, select { font: inherit; color: inherit; }

::selection { background: var(--accent-glow); color: var(--text); }

/* Scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: var(--r-pill);
  border: 2px solid transparent;
  background-clip: padding-box;
}
*::-webkit-scrollbar-thumb:hover { background: #364056; background-clip: padding-box; }
*::-webkit-scrollbar-track { background: transparent; }

/* Links */
a {
  color: var(--accent);
  text-decoration: none;
  transition: color var(--dur) var(--ease);
}
a:hover { color: #7fd3fb; }
a:focus-visible,
button:focus-visible,
[tabindex]:focus-visible {
  outline: 2px solid var(--accent-line);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Headings */
h1, h2, h3, h4 {
  font-weight: 600;
  line-height: var(--lh-tight);
  letter-spacing: -0.01em;
  color: var(--text);
}
h1 { font-size: var(--fs-2xl); letter-spacing: -0.02em; }
h2 { font-size: var(--fs-xl); }
h3 { font-size: var(--fs-lg); }
h4 { font-size: var(--fs-md); }

p { color: var(--muted); }

code, pre, kbd, samp { font-family: var(--font-mono); font-size: .92em; }

hr {
  border: 0;
  height: 1px;
  background: var(--border);
}

/* ---------------------------------------------------------------------------
   (c) COMPONENT LIBRARY — shared classes
   --------------------------------------------------------------------------- */

/* --- App grid shell (sidebar full-height left, topbar across content, main fills) --- */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
  height: 100vh;
  min-height: 100vh;
  overflow: hidden;
}

/* --- Topbar --- */
.topbar {
  grid-area: topbar;
  display: flex;
  align-items: center;
  gap: var(--s-3);
  height: var(--topbar-h);
  padding: 0 var(--view-pad);
  background: rgba(13,15,18,.72);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

/* --- Brand (top-left corner) --- */
.brand {
  grid-area: brand;
  display: flex;
  align-items: center;
  gap: var(--s-2);
  height: var(--topbar-h);
  padding: 0 var(--s-4);
  font-weight: 700;
  font-size: var(--fs-md);
  letter-spacing: -0.02em;
  color: var(--text);
  background: rgba(13,15,18,.72);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.brand::before {
  content: "";
  width: 14px; height: 14px;
  border-radius: 5px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: 0 0 0 1px rgba(56,189,248,.35), 0 0 14px var(--accent-glow);
  flex: none;
}

/* --- Left nav rail --- */
.rail {
  grid-area: rail;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: var(--s-3) var(--s-2);
  background: linear-gradient(180deg, var(--surface), var(--bg-2));
  border-right: 1px solid var(--border);
  overflow-y: auto;
}
.rail a {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: 8px 12px;
  border-radius: var(--r-sm);
  color: var(--muted);
  font-size: var(--fs-base);
  font-weight: 500;
  letter-spacing: -0.005em;
  border: 1px solid transparent;
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease);
}
.rail a:hover {
  background: var(--surface-3);
  color: var(--text);
}
.rail .active,
.rail a.active {
  background: linear-gradient(90deg, var(--accent-glow), rgba(56,189,248,.04));
  color: var(--text);
  border-color: var(--accent-line);
  box-shadow: inset 2px 0 0 var(--accent);
}
.rail .sep,
.rail-section {
  margin: var(--s-3) 12px var(--s-1);
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--dim);
}

/* --- Main view --- */
.view {
  grid-area: main;
  padding: var(--view-pad);
  overflow-y: auto;
  overflow-x: hidden;
}

/* --- Card --- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--s-5);
  box-shadow: var(--shadow-1);
  transition: border-color var(--dur) var(--ease),
              transform var(--dur) var(--ease),
              box-shadow var(--dur) var(--ease);
}
.card:hover { border-color: var(--border-strong); }
.card.hover:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }

/* --- Panel (lighter container) --- */
.panel {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--s-4);
}

/* --- K : small uppercase label --- */
.k {
  display: inline-block;
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--dim);
}

/* --- H2 utility (section heading) --- */
.h2 {
  font-size: var(--fs-lg);
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  margin-bottom: var(--s-3);
}

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s-2);
  padding: 8px 14px;
  font-size: var(--fs-base);
  font-weight: 600;
  line-height: 1;
  color: var(--accent-ink);
  background: linear-gradient(180deg, #4ec5fb, var(--accent));
  border: 1px solid var(--accent-line);
  border-radius: var(--r-sm);
  cursor: pointer;
  white-space: nowrap;
  transition: filter var(--dur) var(--ease),
              transform var(--dur) var(--ease),
              background var(--dur) var(--ease),
              border-color var(--dur) var(--ease);
  box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 6px 18px var(--accent-glow);
}
.btn:hover { filter: brightness(1.06); }
.btn:active { transform: translateY(1px); }

.btn.alt {
  color: var(--text);
  background: var(--surface-2);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-1);
}
.btn.alt:hover { background: var(--surface-3); border-color: var(--accent-line); filter: none; }

.btn.ghost {
  color: var(--muted);
  background: transparent;
  border-color: var(--border);
  box-shadow: none;
}
.btn.ghost:hover { color: var(--text); background: var(--surface-2); }

.btn:disabled,
.btn[disabled],
.btn.alt:disabled {
  opacity: .45;
  cursor: not-allowed;
  filter: none;
  transform: none;
  box-shadow: none;
}

/* --- Tag (entity-type chip with accent) --- */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 9px;
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .02em;
  border-radius: var(--r-sm);
  color: var(--c, var(--accent));
  background: color-mix(in srgb, var(--c, var(--accent)) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--c, var(--accent)) 36%, transparent);
}
.tag::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c, var(--accent));
  box-shadow: 0 0 8px color-mix(in srgb, var(--c, var(--accent)) 70%, transparent);
}
/* entity-type variants */
.tag.capsule     { --c: var(--c-capsule); }
.tag.skill       { --c: var(--c-skill); }
.tag.agent       { --c: var(--c-agent); }
.tag.workorder   { --c: var(--c-workorder); }
.tag.requirement { --c: var(--c-requirement); }
.tag.model       { --c: var(--c-model); }
.tag.mcp         { --c: var(--c-mcp); }
.tag.memory      { --c: var(--c-memory); }

/* --- Pill (rounded status) --- */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 11px;
  font-size: var(--fs-xs);
  font-weight: 600;
  border-radius: var(--r-pill);
  color: var(--muted);
  background: var(--surface-3);
  border: 1px solid var(--border);
}
.pill.ok   { color: var(--ok);   border-color: color-mix(in srgb, var(--ok) 40%, transparent);   background: color-mix(in srgb, var(--ok) 12%, transparent); }
.pill.warn { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, transparent); background: color-mix(in srgb, var(--warn) 12%, transparent); }
.pill.err  { color: var(--err);  border-color: color-mix(in srgb, var(--err) 40%, transparent);  background: color-mix(in srgb, var(--err) 12%, transparent); }

/* --- Badge (count / small marker) --- */
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 6px;
  font-size: var(--fs-xs);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  border-radius: var(--r-pill);
  color: var(--text);
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
}
.badge.accent { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }

/* --- Text helpers --- */
.muted { color: var(--muted); }
.dim   { color: var(--dim); }
.mono  {
  font-family: var(--font-mono);
  font-size: .92em;
  color: var(--muted);
  letter-spacing: -0.01em;
}

/* --- Responsive grids --- */
.grid { display: grid; gap: var(--s-4); }
.g2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.g3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.g4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

@media (max-width: 1100px) {
  .g4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .g3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 720px) {
  .g2, .g3, .g4 { grid-template-columns: minmax(0, 1fr); }
}

/* --- Progress bar --- */
.bar {
  position: relative;
  height: 6px;
  width: 100%;
  background: var(--inset);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-pill);
  overflow: hidden;
}
.bar .fill {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  box-shadow: 0 0 12px var(--accent-glow);
  transition: width .4s var(--ease);
}

/* --- Key/value rows --- */
.kv {
  display: grid;
  grid-template-columns: minmax(96px, max-content) 1fr;
  gap: 6px var(--s-4);
  align-items: baseline;
  font-size: var(--fs-base);
}
.kv > dt, .kv .key {
  color: var(--dim);
  font-size: var(--fs-sm);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.kv > dd, .kv .val { color: var(--text); }

/* --- Separator --- */
.sep {
  height: 1px;
  width: 100%;
  background: var(--border);
  border: 0;
  margin: var(--s-4) 0;
}
.sep.v {
  width: 1px;
  height: auto;
  align-self: stretch;
  margin: 0 var(--s-4);
}

/* --- Spinner (loading) --- */
.spin {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* --- Scroll container --- */
.scroll {
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
}

/* ---------------------------------------------------------------------------
   (d) 8090 PRODUCT CHROME — status pills, breadcrumbs, module nav, data rows
   --------------------------------------------------------------------------- */

/* --- Status pills (self-contained; usable standalone or with .pill) --- */
.pill-queued, .pill-progress, .pill-done, .pill-proposed, .pill-rejected {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 9px 2px 8px;
  font-size: var(--fs-xs);
  font-weight: 600;
  line-height: 1.45;
  letter-spacing: .01em;
  border-radius: var(--r-pill);
  border: 1px solid;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.pill-queued::before, .pill-progress::before, .pill-done::before,
.pill-proposed::before, .pill-rejected::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 7px currentColor;
  flex: none;
  opacity: .92;
}
.pill-queued   { color: #93a0b4; border-color: color-mix(in srgb, #93a0b4 34%, transparent); background: color-mix(in srgb, #93a0b4 12%, transparent); }
.pill-progress { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, transparent); background: color-mix(in srgb, var(--warn) 12%, transparent); }
.pill-done     { color: var(--ok);   border-color: color-mix(in srgb, var(--ok) 40%, transparent);   background: color-mix(in srgb, var(--ok) 12%, transparent); }
.pill-proposed { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 42%, transparent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.pill-rejected { color: var(--err);  border-color: color-mix(in srgb, var(--err) 40%, transparent);  background: color-mix(in srgb, var(--err) 12%, transparent); }

/* --- Breadcrumbs --- */
.crumbs {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: var(--fs-sm);
  min-width: 0;
}
.crumbs .crumb {
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.crumbs a.crumb:hover { color: var(--text); }
.crumbs .crumb-sep { color: var(--faint); flex: none; user-select: none; }
.crumbs .crumb.cur { color: var(--text); font-weight: 600; }

/* --- Environment pill --- */
.env-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 9px 2px 8px;
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: lowercase;
  border-radius: var(--r-sm);
  color: var(--ok);
  background: color-mix(in srgb, var(--ok) 11%, transparent);
  border: 1px solid color-mix(in srgb, var(--ok) 36%, transparent);
}
.env-pill::before {
  content: "";
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 8px color-mix(in srgb, var(--ok) 75%, transparent);
}

/* --- Sidebar / module-nav base (layout finished in shell.css) --- */
.sb-label {
  margin: var(--s-4) 12px var(--s-1);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .16em;
  color: var(--dim);
}
.module-nav { display: flex; flex-direction: column; gap: 1px; }
.module-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: var(--r-sm);
  color: var(--muted);
  font-size: var(--fs-base);
  font-weight: 500;
  letter-spacing: -0.003em;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background var(--dur) var(--ease),
              color var(--dur) var(--ease),
              border-color var(--dur) var(--ease);
}
.module-row .m-glyph {
  width: 16px; height: 16px;
  flex: none;
  color: var(--dim);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.module-row .m-label { flex: 1 1 auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.module-row:hover { background: var(--surface-3); color: var(--text); }
.module-row:hover .m-glyph { color: var(--muted); }
.module-row.active {
  background: linear-gradient(90deg, var(--accent-glow), rgba(56,189,248,.03));
  color: var(--text);
  border-color: var(--accent-line);
  box-shadow: inset 2px 0 0 var(--accent);
}
.module-row.active .m-glyph { color: var(--accent); }

/* count pill on a module row */
.m-count {
  min-width: 18px;
  height: 17px;
  padding: 0 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10.5px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  border-radius: var(--r-pill);
  color: var(--muted);
  background: var(--surface-3);
  border: 1px solid var(--border);
  flex: none;
}
.module-row.active .m-count { color: var(--accent); border-color: var(--accent-line); background: color-mix(in srgb, var(--accent) 10%, transparent); }

/* small cyan CAPSULE tag carried by the Knowledge Graph row */
.cap-tag {
  flex: none;
  padding: 1px 6px;
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: .12em;
  border-radius: 5px;
  color: var(--accent-ink);
  background: linear-gradient(180deg, #5cc8fb, var(--accent));
  box-shadow: 0 0 0 1px rgba(56,189,248,.30), 0 0 12px var(--accent-glow);
}

/* --- Module content header (title + desc + right actions) --- */
.mod-header {
  display: flex;
  align-items: flex-start;
  gap: var(--s-4);
  margin-bottom: var(--s-5);
}
.mod-header .mod-h-main { flex: 1 1 auto; min-width: 0; }
.mod-title {
  font-size: var(--fs-xl);
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1.1;
}
.mod-desc { margin-top: 5px; font-size: var(--fs-base); color: var(--muted); max-width: 64ch; }
.mod-actions { display: flex; align-items: center; gap: var(--s-2); flex: none; }

/* header stat strip */
.mod-stats {
  display: flex;
  flex-wrap: wrap;
  gap: var(--s-5);
  padding: var(--s-3) var(--s-4);
  margin-bottom: var(--s-4);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.mod-stat { display: flex; flex-direction: column; gap: 1px; }
.mod-stat .v {
  font-size: var(--fs-lg);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
  color: var(--text);
}
.mod-stat .l { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: .1em; color: var(--dim); }

/* --- Dense, auditable data rows --- */
.drow {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface-2);
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
}
.drow + .drow { margin-top: 8px; }
.drow:hover { border-color: var(--border-strong); background: var(--surface-3); }
.drow-id {
  flex: none;
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  color: var(--muted);
  letter-spacing: -0.01em;
  min-width: 64px;
}
.drow-main { flex: 1 1 auto; min-width: 0; }
.drow-title { font-size: var(--fs-base); font-weight: 600; color: var(--text); }
.drow-sub {
  margin-top: 2px;
  font-size: var(--fs-sm);
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.drow-meta { flex: none; display: flex; align-items: center; gap: var(--s-2); }
.drow-trace {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  color: var(--dim);
  white-space: nowrap;
}

/* --- Sub-tab bar (used by Knowledge Graph module) --- */
.subtabs {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 3px;
  margin-bottom: var(--s-4);
  background: var(--inset);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  width: max-content;
  max-width: 100%;
  overflow-x: auto;
}
.subtab {
  padding: 6px 14px;
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--muted);
  background: transparent;
  border: 0;
  border-radius: var(--r-sm);
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
}
.subtab:hover { color: var(--text); background: var(--surface-2); }
.subtab.active {
  color: var(--text);
  background: var(--surface-3);
  box-shadow: inset 0 0 0 1px var(--border-strong);
}

.kg-caption {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: var(--s-4);
  font-size: var(--fs-sm);
  color: var(--muted);
}
.kg-caption::before {
  content: "";
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--c-capsule);
  box-shadow: 0 0 9px color-mix(in srgb, var(--c-capsule) 75%, transparent);
  flex: none;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
  }
}

/* ============================================================================
   CAPSULE — shell.css
   8090 Software Factory control-plane chrome. Reuses tokens + component classes
   from 00-tokens.css (.app grid, .module-row, .crumbs, .env-pill, pills...).
   This file finishes the LAYOUT: sidebar shell, org/project chips, user chip,
   topbar widgets (tokens-saved meter + Backboard memory pill).
   ============================================================================ */

/* ---------------------------------------------------------------------------
   LEFT SIDEBAR
   --------------------------------------------------------------------------- */
.sidebar {
  grid-area: sidebar;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 12px 10px 12px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.012), transparent 120px),
    var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
}

/* --- org + project selectors pinned at top --- */
.sb-top {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-bottom: 4px;
}

.org-chip,
.proj-chip {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 8px 9px;
  font-size: var(--fs-base);
  color: var(--text);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  text-align: left;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.org-chip:hover,
.proj-chip:hover { background: var(--surface-3); border-color: var(--border-strong); }

.org-mark {
  flex: none;
  width: 24px; height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--accent-ink);
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 7px;
  box-shadow: 0 0 0 1px rgba(56,189,248,.30), 0 0 12px var(--accent-glow);
}
.org-name { flex: 1 1 auto; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.proj-chip { padding: 7px 9px; color: var(--muted); }
.proj-dot {
  flex: none;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--c-capsule);
  box-shadow: 0 0 8px color-mix(in srgb, var(--c-capsule) 70%, transparent);
}
.proj-name { flex: 1 1 auto; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.org-chip .chev,
.proj-chip .chev { flex: none; color: var(--dim); }

/* --- bottom: settings + user chip --- */
.sb-bottom {
  margin-top: auto;
  padding-top: var(--s-3);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sb-bottom::before {
  content: "";
  display: block;
  height: 1px;
  margin: 0 4px var(--s-2);
  background: var(--border);
}

.settings-row .m-count { display: none; }

.user-chip {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 7px 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  text-align: left;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.user-chip:hover { background: var(--surface-3); border-color: var(--border-strong); }
.user-avatar {
  flex: none;
  width: 26px; height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .02em;
  color: var(--text);
  background: linear-gradient(135deg, #2a3344, #161b24);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
}
.user-meta { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
.user-name { font-size: var(--fs-sm); font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 10.5px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ---------------------------------------------------------------------------
   TOP BAR
   --------------------------------------------------------------------------- */
.topbar-spacer { flex: 1 1 auto; min-width: 12px; }

/* --- Tokens-saved meter --- */
.tok-counter {
  display: inline-flex;
  align-items: baseline;
  gap: 7px;
  padding: 4px 11px;
  background: var(--inset);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.tok-num {
  font-size: var(--fs-md);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
  color: var(--accent);
  text-shadow: 0 0 16px var(--accent-glow);
}
.tok-label {
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--dim);
}

/* --- Memory status pill (Backboard = indigo) --- */
.mem-pill {
  color: var(--c-memory);
  border-color: color-mix(in srgb, var(--c-memory) 38%, transparent);
  background: color-mix(in srgb, var(--c-memory) 12%, transparent);
}
.mem-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-memory);
  box-shadow: 0 0 8px color-mix(in srgb, var(--c-memory) 75%, transparent);
}

/* ---------------------------------------------------------------------------
   RESPONSIVE
   --------------------------------------------------------------------------- */
@media (max-width: 880px) {
  .app { grid-template-columns: 64px 1fr; }
  .org-name, .proj-name, .proj-dot, .m-label, .m-count, .cap-tag,
  .sb-label, .user-meta, .org-chip .chev, .proj-chip .chev { display: none; }
  .module-row { justify-content: center; padding: 9px 0; }
  .org-chip, .proj-chip, .user-chip { justify-content: center; padding: 8px 0; }
  .tok-label { display: none; }
}

/* ============================================================================
   CAPSULE — view-overview.css
   OVERVIEW = the 8090 Factory PROJECT landing for "Payments Copilot":
   compact project header + native module strip + the 6-stage RL loop + metrics.
   All custom classes are prefixed "overview-". Shared classes (.card,.btn,.k,
   .tag,.pill,.env-pill,.mono,.grid,.g4 …) come from 00-tokens.css, reused as-is.
   ============================================================================ */

/* ---- Compact project header (aligned to the product chrome) ----------- */
.overview-projhead {
  position: relative;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-5);
  flex-wrap: wrap;
  padding: var(--s-5);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background:
    radial-gradient(560px 220px at 0% -40%, var(--accent-glow), transparent 70%),
    radial-gradient(460px 220px at 100% -30%, rgba(129,140,248,.09), transparent 65%),
    var(--surface);
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.overview-ph-main { min-width: 0; flex: 1 1 440px; position: relative; }
.overview-ph-eyebrow {
  display: flex; align-items: center; gap: var(--s-2);
  margin-bottom: var(--s-2);
}
.overview-ph-eyebrow .k { color: var(--accent); margin: 0; }
.overview-ph-sep { color: var(--faint); }
.overview-ph-org { font-size: var(--fs-xs); color: var(--muted); font-weight: 600; letter-spacing: .02em; }
.overview-ph-title {
  font-size: clamp(22px, 2.6vw, var(--fs-2xl));
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 6px;
}
.overview-ph-desc {
  font-size: var(--fs-base);
  line-height: 1.55;
  color: var(--muted);
  max-width: 66ch;
  margin-bottom: var(--s-4);
}
.overview-ph-desc b { color: var(--text); font-weight: 600; }
.overview-ph-desc .overview-cap { color: var(--accent); font-weight: 700; letter-spacing: .02em; }
.overview-ph-meta { display: flex; flex-wrap: wrap; align-items: center; gap: var(--s-2); }
.overview-ph-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: var(--s-3);
  flex: 0 0 auto;
}
.overview-ph-active { font-size: var(--fs-xs); color: var(--dim); white-space: nowrap; }
.overview-ph-active b { color: var(--accent); font-weight: 700; }
@media (max-width: 720px) {
  .overview-ph-actions { align-items: flex-start; width: 100%; }
}

/* ---- Section heading helper ------------------------------------------- */
.overview-section { margin-top: var(--s-7); }
.overview-section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--s-4);
  margin-bottom: var(--s-4);
}
.overview-section-head p { font-size: var(--fs-base); max-width: 560px; }

/* ---- Metric cards ------------------------------------------------------ */
.overview-metric { position: relative; overflow: hidden; }
.overview-metric::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--mc, var(--accent));
  box-shadow: 0 0 16px color-mix(in srgb, var(--mc, var(--accent)) 55%, transparent);
}
.overview-metric-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
}
.overview-metric-val {
  font-size: var(--fs-2xl);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.overview-metric-val .overview-unit {
  font-size: var(--fs-md);
  font-weight: 600;
  color: var(--muted);
  margin-left: 2px;
  letter-spacing: 0;
}
.overview-metric-sub { font-size: var(--fs-sm); color: var(--dim); margin-top: var(--s-2); }
.overview-spark { width: 100%; height: 34px; display: block; margin-top: var(--s-3); }
.overview-spark-line { fill: none; stroke: var(--mc, var(--accent)); stroke-width: 1.8; stroke-linejoin: round; stroke-linecap: round; }
.overview-spark-area { fill: color-mix(in srgb, var(--mc, var(--accent)) 14%, transparent); stroke: none; }
.overview-spark-dot  { fill: var(--mc, var(--accent)); filter: drop-shadow(0 0 5px color-mix(in srgb, var(--mc, var(--accent)) 70%, transparent)); }

/* ---- 8090 Software Factory strip + CAPSULE wrapper -------------------- */
.overview-factory-frame {
  position: relative;
  margin-top: var(--s-5);
  padding: calc(var(--s-6) + 4px) var(--s-5) var(--s-6);
  border: 1px dashed var(--accent-line);
  border-radius: var(--r-lg);
  background:
    repeating-linear-gradient(135deg, rgba(56,189,248,.025) 0 2px, transparent 2px 9px),
    var(--inset);
  box-shadow: inset 0 0 40px rgba(56,189,248,.04);
}
.overview-frame-label {
  position: absolute;
  top: -11px; left: var(--s-5);
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 3px 12px;
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent-ink);
  background: linear-gradient(180deg, #4ec5fb, var(--accent));
  border: 1px solid var(--accent-line);
  border-radius: var(--r-pill);
  box-shadow: 0 6px 18px var(--accent-glow);
}
.overview-frame-tag {
  position: absolute;
  top: -10px; right: var(--s-5);
  font-size: var(--fs-xs);
  color: var(--dim);
  background: var(--bg);
  padding: 0 var(--s-2);
}
.overview-steps {
  display: flex;
  align-items: stretch;
  gap: 0;
  flex-wrap: wrap;
}
.overview-step {
  position: relative;
  flex: 1 1 0;
  min-width: 120px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: var(--s-4) var(--s-3);
  text-align: center;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  color: var(--muted);
}
.overview-step .overview-step-name { font-weight: 600; color: var(--text); font-size: var(--fs-base); }
.overview-step .overview-step-kind { font-size: var(--fs-xs); color: var(--dim); }
.overview-step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  margin: 0 auto 2px;
  background: var(--sc, var(--accent));
  box-shadow: 0 0 10px var(--sc, var(--accent));
}
.overview-step-arrow {
  flex: 0 0 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--faint);
  font-size: var(--fs-md);
}
/* Knowledge-Graph step = where capsules surface -> highlighted */
.overview-step.overview-kg {
  border-color: var(--accent-line);
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 12%, var(--surface)), var(--surface));
  box-shadow: 0 0 0 1px var(--accent-line), 0 8px 30px var(--accent-glow);
}
.overview-step.overview-kg .overview-step-kind { color: var(--accent); }

/* feedback / reinforcement return arrow under the strip */
.overview-feedback { position: relative; margin-top: var(--s-4); height: 46px; }
.overview-feedback svg { width: 100%; height: 100%; display: block; overflow: visible; }
.overview-feedback-path { fill: none; stroke: var(--accent); stroke-width: 1.4; stroke-dasharray: 5 6; opacity: .5; animation: overview-feedpulse 4.5s var(--ease) infinite; }
.overview-feedback-label {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  padding: 2px 10px;
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--accent);
  background: var(--bg);
  border-radius: var(--r-pill);
  white-space: nowrap;
}

/* ---- The 6-stage RL loop ---------------------------------------------- */
.overview-loop-wrap {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(270px, .95fr);
  gap: var(--s-6);
  align-items: center;
}
.overview-loop {
  position: relative;
  width: 100%;
  max-width: 560px;
  aspect-ratio: 1 / 1;
  margin: 0 auto;
}
.overview-loop svg.overview-loop-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}
.overview-ring { fill: none; stroke: var(--border-strong); stroke-width: 1.2; opacity: .55; }
.overview-ring-arc { fill: none; stroke: var(--accent); stroke-width: 1.6; opacity: .65; }
.overview-dot { fill: var(--accent); filter: drop-shadow(0 0 6px var(--accent)); }
.overview-reward {
  fill: none;
  stroke: var(--c-workorder);
  stroke-width: 1.8;
  stroke-dasharray: 6 7;
  animation: overview-dash 1s linear infinite;
}
.overview-reward-dot { fill: var(--c-workorder); filter: drop-shadow(0 0 6px var(--c-workorder)); }

.overview-reward-label {
  position: absolute;
  left: 50%; top: 31.5%;
  transform: translate(-50%, -50%);
  padding: 2px 9px;
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--c-workorder);
  background: color-mix(in srgb, var(--c-workorder) 12%, var(--bg));
  border: 1px solid color-mix(in srgb, var(--c-workorder) 38%, transparent);
  border-radius: var(--r-pill);
  white-space: nowrap;
  pointer-events: none;
}

/* loop stage chips */
.overview-loop-stage {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  width: 124px;
  padding: 10px 8px;
  text-align: center;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-1);
  animation: overview-stage 9s var(--ease) infinite;
  animation-delay: calc(var(--i) * 1.5s);
}
.overview-stage-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px; height: 20px;
  font-size: var(--fs-xs);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  border-radius: 50%;
  color: var(--sc);
  background: color-mix(in srgb, var(--sc) 14%, transparent);
  border: 1px solid color-mix(in srgb, var(--sc) 45%, transparent);
}
.overview-stage-name {
  font-size: var(--fs-sm);
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--text);
}
.overview-stage-desc { font-size: var(--fs-xs); color: var(--dim); line-height: 1.2; }

/* center memory hub */
.overview-hub {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 150px;
  padding: var(--s-4) var(--s-3);
  text-align: center;
  background:
    radial-gradient(closest-side, color-mix(in srgb, var(--c-memory) 16%, var(--surface)), var(--surface));
  border: 1px solid color-mix(in srgb, var(--c-memory) 45%, transparent);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-2);
  animation: overview-pulse 5s var(--ease) infinite;
  z-index: 2;
}
.overview-hub-title { font-size: var(--fs-md); font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.overview-hub-rank { font-size: var(--fs-xs); color: var(--dim); }

/* loop legend */
.overview-legend { display: flex; flex-direction: column; gap: var(--s-3); }
.overview-legend-item {
  display: grid;
  grid-template-columns: 26px 1fr;
  gap: var(--s-3);
  align-items: start;
}
.overview-legend-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  font-size: var(--fs-xs);
  font-weight: 700;
  border-radius: var(--r-sm);
  color: var(--sc);
  background: color-mix(in srgb, var(--sc) 13%, transparent);
  border: 1px solid color-mix(in srgb, var(--sc) 40%, transparent);
}
.overview-legend-name { font-weight: 700; color: var(--text); font-size: var(--fs-base); letter-spacing: .02em; }
.overview-legend-name .overview-legend-meta { font-weight: 500; color: var(--dim); letter-spacing: 0; margin-left: 6px; }
.overview-legend-body { font-size: var(--fs-sm); color: var(--muted); line-height: 1.45; margin-top: 1px; }
.overview-reward-note {
  margin-top: var(--s-2);
  padding: var(--s-3) var(--s-4);
  border: 1px solid color-mix(in srgb, var(--c-workorder) 35%, transparent);
  border-radius: var(--r-md);
  background: color-mix(in srgb, var(--c-workorder) 8%, transparent);
  font-size: var(--fs-sm);
  color: var(--text);
  line-height: 1.5;
}
.overview-reward-note b { color: var(--c-workorder); }

/* ---- Closing CTA ------------------------------------------------------ */
.overview-cta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s-5);
  flex-wrap: wrap;
  margin-top: var(--s-7);
  background:
    radial-gradient(480px 200px at 0% 0%, var(--accent-glow), transparent 70%),
    var(--surface);
}
.overview-cta-text h3 { margin-bottom: 4px; }
.overview-cta-text p { font-size: var(--fs-base); max-width: 540px; }

/* ---- Keyframes -------------------------------------------------------- */
@keyframes overview-stage {
  0%, 17%, 100% {
    border-color: var(--border);
    box-shadow: var(--shadow-1);
    transform: translate(-50%, -50%) scale(1);
  }
  4%, 13% {
    border-color: var(--sc);
    box-shadow: 0 0 0 1px var(--sc), 0 10px 34px color-mix(in srgb, var(--sc) 34%, transparent);
    transform: translate(-50%, -50%) scale(1.03);
  }
}
/* hub: calm glow breathe rather than an expanding ring */
@keyframes overview-pulse {
  0%, 100% { box-shadow: 0 0 26px color-mix(in srgb, var(--c-memory) 20%, transparent), var(--shadow-2); }
  50%      { box-shadow: 0 0 42px color-mix(in srgb, var(--c-memory) 34%, transparent), var(--shadow-2); }
}
/* feedback path: static dashes with a single subtle opacity pulse */
@keyframes overview-feedpulse {
  0%, 100% { opacity: .4; }
  50%      { opacity: .68; }
}
@keyframes overview-dash {
  to { stroke-dashoffset: -22; }
}

/* ---- Responsive ------------------------------------------------------- */
@media (max-width: 980px) {
  .overview-loop-wrap { grid-template-columns: minmax(0, 1fr); }
  .overview-loop { max-width: 460px; }
}
/* switch the pipeline to vertical before the row can wrap an arrow into
   empty space (the ~704px min row width sits inside this range) */
@media (max-width: 1000px) {
  .overview-steps { flex-direction: column; }
  .overview-step-arrow { transform: rotate(90deg); flex-basis: 22px; }
}
@media (max-width: 720px) {
  .overview-loop-stage { width: 96px; padding: 7px 5px; }
  .overview-hub { width: 118px; }
}

/* ============================================================================
   CAPSULE — Knowledge Graph view
   view-graph.css : force-directed graph, legend, filters, inspector.
   All custom classes prefixed "graph-". Reuses tokens + shared component lib.
   ============================================================================ */

/* --- Header: title, caption, legend, filters ----------------------------- */
.graph-head {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--s-4);
  margin-bottom: var(--s-4);
}
.graph-head-l { min-width: 0; }
.graph-title {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  font-size: var(--fs-xl);
  font-weight: 600;
  letter-spacing: -0.01em;
}
.graph-caption {
  margin-top: 6px;
  max-width: 64ch;
  color: var(--muted);
  font-size: var(--fs-base);
}
.graph-caption b { color: var(--text); font-weight: 600; }

/* --- Legend + type filters ------------------------------------------------ */
.graph-legend {
  display: flex;
  flex-wrap: wrap;
  gap: var(--s-2);
  align-items: center;
}
.graph-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 11px 5px 9px;
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .02em;
  color: var(--text);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  cursor: pointer;
  user-select: none;
  transition: background var(--dur) var(--ease),
              border-color var(--dur) var(--ease),
              opacity var(--dur) var(--ease),
              filter var(--dur) var(--ease);
}
.graph-chip:hover { border-color: var(--border-strong); background: var(--surface-3); }
.graph-chip .graph-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--c, var(--accent));
  box-shadow: 0 0 9px color-mix(in srgb, var(--c, var(--accent)) 75%, transparent);
  flex: none;
}
.graph-chip .graph-chip-n {
  font-variant-numeric: tabular-nums;
  color: var(--dim);
  font-weight: 700;
}
.graph-chip.off {
  opacity: .42;
  filter: grayscale(.7);
}
.graph-chip.off .graph-dot { box-shadow: none; }

/* type accents for chip dots */
.graph-chip[data-type="capsule"]     { --c: var(--c-capsule); }
.graph-chip[data-type="skill"]       { --c: var(--c-skill); }
.graph-chip[data-type="agent"]       { --c: var(--c-agent); }
.graph-chip[data-type="workorder"]   { --c: var(--c-workorder); }
.graph-chip[data-type="requirement"] { --c: var(--c-requirement); }
.graph-chip[data-type="model"]       { --c: var(--c-model); }
.graph-chip[data-type="mcp"]         { --c: var(--c-mcp); }
.graph-chip[data-type="memory"]      { --c: var(--c-memory); }

/* --- Stage: canvas + inspector ------------------------------------------- */
.graph-stage {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 348px;
  gap: var(--s-4);
  align-items: stretch;
}
@media (max-width: 1100px) {
  .graph-stage { grid-template-columns: minmax(0, 1fr); }
}

/* --- Canvas --------------------------------------------------------------- */
.graph-canvas {
  position: relative;
  background:
    radial-gradient(120% 90% at 50% 0%, rgba(56,189,248,.05), transparent 60%),
    radial-gradient(80% 80% at 50% 100%, rgba(77,159,255,.04), transparent 62%),
    var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.graph-svg {
  width: 100%;
  height: auto;
  display: block;
  touch-action: none;
  cursor: grab;
}
.graph-svg.dragging { cursor: grabbing; }

/* hairline reference grid drawn inside the svg backdrop */
.graph-grid line { stroke: rgba(255,255,255,.025); stroke-width: 1; }

/* Links */
.graph-link {
  stroke: var(--border-strong);
  stroke-width: 1;
  stroke-opacity: .55;
  transition: stroke-opacity .18s var(--ease), stroke .18s var(--ease),
              stroke-width .18s var(--ease);
  pointer-events: none;
}
.graph-link.dim   { stroke-opacity: .08; }
.graph-link.hot   { stroke: var(--accent); stroke-opacity: .9; stroke-width: 2; }
/* subtle, at-rest encoding of link kind (overridden by .hot on hover) */
.graph-link[data-kind="produces"] { stroke: color-mix(in srgb, var(--c-capsule) 55%, var(--border-strong)); stroke-opacity: .5; }
.graph-link[data-kind="uses"]     { stroke: color-mix(in srgb, var(--c-agent) 50%, var(--border-strong)); stroke-opacity: .45; }
.graph-link[data-kind="stores"],
.graph-link[data-kind="reads"]    { stroke-dasharray: 2 4; }

/* Nodes */
.graph-node { cursor: pointer; }
.graph-node .graph-ring {
  fill: none;
  stroke: var(--c);
  stroke-opacity: 0;
  stroke-width: 2;
  transition: stroke-opacity .18s var(--ease);
}
.graph-node .graph-disc {
  fill: color-mix(in srgb, var(--c) 22%, var(--surface));
  stroke: var(--c);
  stroke-width: 1.5;
  transition: filter .18s var(--ease), fill .18s var(--ease),
              stroke-width .18s var(--ease), opacity .18s var(--ease);
}
.graph-node .graph-core {
  fill: var(--c);
  opacity: .9;
  transition: opacity .18s var(--ease);
}
.graph-node .graph-label {
  fill: var(--muted);
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  text-anchor: middle;
  paint-order: stroke;
  stroke: rgba(8,9,11,.85);
  stroke-width: 3px;
  stroke-linejoin: round;
  pointer-events: none;
  opacity: 0;                 /* at rest, only structural anchors are labelled */
  transition: fill .18s var(--ease), opacity .18s var(--ease);
}
/* structural anchors keep their labels at rest so the map stays readable */
.graph-node[data-type="memory"] .graph-label,
.graph-node[data-type="skill"]  .graph-label,
.graph-node[data-type="agent"]  .graph-label { opacity: 1; }
/* while a node is focused, reveal labels for it + its (non-dim) neighbours */
.graph-svg.focusing .graph-node:not(.dim) .graph-label { opacity: 1; }

.graph-node:hover .graph-disc,
.graph-node.sel .graph-disc {
  filter: drop-shadow(0 0 10px color-mix(in srgb, var(--c) 70%, transparent));
  stroke-width: 2.5;
}
.graph-node.sel .graph-ring { stroke-opacity: .85; }
.graph-node.sel .graph-label,
.graph-node:hover .graph-label { fill: var(--text); opacity: 1; }
/* keyboard focus mirrors the selected-node ring + label reveal */
.graph-node:focus { outline: none; }
.graph-node:focus-visible .graph-ring { stroke-opacity: .85; }
.graph-node:focus-visible .graph-label { fill: var(--text); opacity: 1; }

/* dim state for non-neighbors */
.graph-node.dim .graph-disc { opacity: .18; }
.graph-node.dim .graph-core { opacity: .15; }
.graph-node.dim .graph-label { opacity: .12; }

/* hidden by filter */
.graph-node.hidden, .graph-link.hidden { display: none; }

/* node type color binding */
.graph-node[data-type="capsule"]     { --c: var(--c-capsule); }
.graph-node[data-type="skill"]       { --c: var(--c-skill); }
.graph-node[data-type="agent"]       { --c: var(--c-agent); }
.graph-node[data-type="workorder"]   { --c: var(--c-workorder); }
.graph-node[data-type="requirement"] { --c: var(--c-requirement); }
.graph-node[data-type="model"]       { --c: var(--c-model); }
.graph-node[data-type="mcp"]         { --c: var(--c-mcp); }
.graph-node[data-type="memory"]      { --c: var(--c-memory); }

/* --- Tooltip -------------------------------------------------------------- */
.graph-tip {
  position: absolute;
  z-index: 5;
  min-width: 150px;
  max-width: 250px;
  padding: 9px 11px;
  background: rgba(13,15,18,.95);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-pop);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  pointer-events: none;
  opacity: 0;
  transform: translateY(2px);
  transition: opacity .12s var(--ease), transform .12s var(--ease);
}
.graph-tip.show { opacity: 1; transform: translateY(0); }
.graph-tip-type {
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--c, var(--accent));
}
.graph-tip-title { margin-top: 3px; font-size: var(--fs-base); font-weight: 600; color: var(--text); }
.graph-tip-sub { margin-top: 2px; font-size: var(--fs-xs); color: var(--dim); }
.graph-tip-hint { margin-top: 6px; font-size: 11px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }

/* --- Inspector ------------------------------------------------------------ */
.graph-inspector {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
  min-height: 0;
  overflow: hidden;
}
.graph-insp-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s-2);
  padding: 14px var(--s-4);
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
}
.graph-insp-head .graph-insp-x {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--muted);
  cursor: pointer;
  font-size: 14px; line-height: 1;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.graph-insp-head .graph-insp-x:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-3); }
.graph-insp-body {
  padding: var(--s-4);
  overflow-y: auto;
  overflow-x: hidden;
}

/* empty / placeholder state */
.graph-insp-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--s-3);
  text-align: center;
  height: 100%;
  min-height: 240px;
  padding: var(--s-6) var(--s-4);
  color: var(--dim);
}
.graph-insp-empty .graph-orbit {
  position: relative;
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 1px dashed var(--border-strong);
}
.graph-insp-empty .graph-orbit::before {
  content: "";
  position: absolute; inset: 22px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--c-memory), color-mix(in srgb, var(--c-memory) 10%, transparent));
  box-shadow: 0 0 18px color-mix(in srgb, var(--c-memory) 55%, transparent);
}

/* inspector content blocks */
.graph-insp-title {
  font-size: var(--fs-md);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.graph-insp-row {
  display: flex; align-items: center; gap: var(--s-2);
  flex-wrap: wrap;
  margin-bottom: var(--s-3);
}
.graph-summary {
  margin: var(--s-3) 0;
  padding: var(--s-3);
  font-size: var(--fs-base);
  line-height: var(--lh-base);
  color: var(--text);
  background: var(--inset);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--c, var(--accent));
  border-radius: var(--r-sm);
}

/* metric mini-grid */
.graph-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--s-2);
  margin: var(--s-3) 0;
}
.graph-metric {
  padding: 9px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.graph-metric .graph-metric-v {
  font-size: var(--fs-md);
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.graph-metric .graph-metric-v.pos { color: var(--ok); }
.graph-metric .graph-metric-k {
  display: block;
  margin-top: 1px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
}

/* score bars */
.graph-scorebar { margin: 10px 0; }
.graph-scorebar-top {
  display: flex; justify-content: space-between;
  font-size: var(--fs-xs); margin-bottom: 5px;
}
.graph-scorebar-top .k { letter-spacing: .1em; }
.graph-scorebar-top .v { color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }

/* list of learnings / gotchas */
.graph-list {
  margin: var(--s-2) 0 var(--s-3);
  padding-left: 0;
  list-style: none;
  display: flex; flex-direction: column; gap: 6px;
}
.graph-list li {
  position: relative;
  padding-left: 16px;
  font-size: var(--fs-sm);
  color: var(--muted);
  line-height: 1.5;
}
.graph-list li::before {
  content: "";
  position: absolute; left: 3px; top: 8px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--c, var(--accent));
  opacity: .8;
}
.graph-list.warn li::before { background: var(--warn); }

/* section label inside inspector */
.graph-sec {
  margin: var(--s-4) 0 var(--s-2);
  display: flex; align-items: center; gap: var(--s-2);
}

/* backboard callout */
.graph-store {
  display: flex; align-items: center; gap: var(--s-2);
  margin-top: var(--s-3);
  padding: 9px 11px;
  font-size: var(--fs-sm);
  color: var(--muted);
  background: color-mix(in srgb, var(--c-memory) 9%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-memory) 32%, transparent);
  border-radius: var(--r-sm);
}
.graph-store .graph-store-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c-memory);
  box-shadow: 0 0 9px color-mix(in srgb, var(--c-memory) 70%, transparent);
  flex: none;
}
.graph-store b { color: var(--text); font-weight: 600; }

/* changelog row */
.graph-changelog {
  margin: var(--s-2) 0;
  padding: 10px 11px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
}
.graph-changelog-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--s-2); margin-bottom: 5px;
}
.graph-changelog-head .graph-ver { color: var(--text); font-weight: 700; }
.graph-changelog p { font-size: var(--fs-sm); color: var(--muted); line-height: 1.5; }

/* bump tag */
.graph-bump {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase;
  padding: 2px 7px; border-radius: var(--r-pill);
  border: 1px solid var(--border-strong);
  color: var(--muted); background: var(--surface-3);
}
.graph-bump.major { color: var(--err);  border-color: color-mix(in srgb, var(--err) 45%, transparent);  background: color-mix(in srgb, var(--err) 12%, transparent); }
.graph-bump.minor { color: var(--info); border-color: color-mix(in srgb, var(--info) 45%, transparent); background: color-mix(in srgb, var(--info) 12%, transparent); }
.graph-bump.patch { color: var(--ok);   border-color: color-mix(in srgb, var(--ok) 45%, transparent);   background: color-mix(in srgb, var(--ok) 12%, transparent); }

/* adopt / pin action row */
.graph-actions {
  display: flex; gap: var(--s-2);
  margin-top: var(--s-4);
}
.graph-actions .btn { flex: 1; }

/* token delta highlight */
.graph-delta {
  display: inline-flex; align-items: center; gap: 6px;
  font-weight: 700; color: var(--ok);
  font-variant-numeric: tabular-nums;
}
.graph-delta::before {
  content: "▼"; font-size: 9px; transform: translateY(-1px);
}

/* toast confirmation after pin/adopt */
.graph-toast {
  margin-top: var(--s-3);
  padding: 9px 11px;
  font-size: var(--fs-sm);
  color: var(--ok);
  background: color-mix(in srgb, var(--ok) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--ok) 36%, transparent);
  border-radius: var(--r-sm);
}

/* generic link list (skills used, executes, etc.) */
.graph-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin: var(--s-2) 0 var(--s-3);
}
.graph-jump {
  cursor: pointer;
  transition: filter var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.graph-jump:hover { filter: brightness(1.15); transform: translateY(-1px); }

/* footer hint under canvas */
.graph-foot {
  display: flex; flex-wrap: wrap; gap: var(--s-4);
  margin-top: var(--s-3);
  font-size: var(--fs-xs);
  color: var(--dim);
}
.graph-foot kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 6px;
  border: 1px solid var(--border-strong);
  border-bottom-width: 2px;
  border-radius: 5px;
  color: var(--muted);
  background: var(--surface-2);
}

/* ============================================================================
   CAPSULE — view-capsules.css
   The capsule feed: rich session-learning cards, token self-value emphasized.
   All custom classes prefixed "capsules-". Shared classes reused from tokens.
   ============================================================================ */

/* --- View header strip with totals --- */
.capsules-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--s-5);
  flex-wrap: wrap;
  margin-bottom: var(--s-5);
}
.capsules-head-titles { display: flex; flex-direction: column; gap: 6px; }
.capsules-head-titles .h2 { margin: 0; }
.capsules-lede { color: var(--muted); font-size: var(--fs-base); max-width: 62ch; }

.capsules-totals {
  display: grid;
  grid-auto-flow: column;
  gap: var(--s-1);
  align-items: stretch;
  padding: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-1);
}
.capsules-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 8px 16px;
  border-radius: var(--r-sm);
  min-width: 96px;
}
.capsules-stat + .capsules-stat { border-left: 1px solid var(--border-soft); }
.capsules-stat-v {
  font-size: var(--fs-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.capsules-stat-v.accent { color: var(--accent); }
.capsules-stat-v.green  { color: var(--ok); }
.capsules-stat-k {
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--dim);
}

/* --- Feed list --- */
.capsules-feed { display: flex; flex-direction: column; gap: var(--s-4); }

/* --- Capsule card --- */
.capsules-card { position: relative; padding: 0; overflow: hidden; }
.capsules-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--c-capsule), transparent 85%);
  opacity: .85;
}
.capsules-card.superseded { opacity: .82; }
.capsules-card.superseded::before { background: linear-gradient(180deg, var(--dim), transparent 85%); }
.capsules-card.proposed::before { background: linear-gradient(180deg, var(--c-skill), transparent 85%); }

.capsules-body { padding: var(--s-5); }

/* --- Card top row: identity + transfer --- */
.capsules-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--s-4);
  margin-bottom: var(--s-3);
}
.capsules-ident { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.capsules-idrow { display: flex; align-items: center; gap: var(--s-2); flex-wrap: wrap; }
.capsules-id {
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}
.capsules-meta {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
  font-size: var(--fs-sm);
  color: var(--dim);
}
.capsules-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--faint); }
.capsules-author { color: var(--muted); }

/* --- Transfer score badge --- */
.capsules-transfer {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex: none;
}
.capsules-tscore {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  padding: 5px 12px;
  border-radius: var(--r-sm);
  font-variant-numeric: tabular-nums;
  color: var(--c-capsule);
  background: color-mix(in srgb, var(--c-capsule) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-capsule) 36%, transparent);
}
.capsules-tscore.warn { color: var(--warn); background: color-mix(in srgb, var(--warn) 12%, transparent); border-color: color-mix(in srgb, var(--warn) 36%, transparent); }
.capsules-tscore.low  { color: var(--dim);  background: var(--surface-3); border-color: var(--border); }
.capsules-tscore b { font-size: var(--fs-lg); font-weight: 700; letter-spacing: -0.02em; }
.capsules-tscore span { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: .08em; }

/* --- Mini metric bars (novelty / importance) --- */
.capsules-metrics {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--s-3) var(--s-5);
  margin: var(--s-3) 0 var(--s-4);
}
.capsules-metric { display: flex; flex-direction: column; gap: 5px; }
.capsules-metric-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  font-size: var(--fs-xs);
}
.capsules-metric-top .lbl { text-transform: uppercase; letter-spacing: .1em; color: var(--dim); }
.capsules-metric-top .num { font-family: var(--font-mono); color: var(--muted); font-variant-numeric: tabular-nums; }
.capsules-metric .bar { height: 5px; }
.capsules-metric .fill.violet { background: linear-gradient(90deg, color-mix(in srgb, var(--c-skill) 65%, var(--accent-2)), var(--c-skill)); box-shadow: 0 0 12px color-mix(in srgb, var(--c-skill) 30%, transparent); }
.capsules-metric .fill.rose   { background: linear-gradient(90deg, color-mix(in srgb, var(--c-requirement) 65%, var(--warn)), var(--c-requirement)); box-shadow: 0 0 12px color-mix(in srgb, var(--c-requirement) 30%, transparent); }

/* --- Summary --- */
.capsules-summary {
  color: var(--text);
  font-size: var(--fs-md);
  line-height: var(--lh-base);
  letter-spacing: -0.005em;
  margin-bottom: var(--s-4);
}

/* --- Intent (one-line goal) + Mental model (durable abstraction) --- */
.capsules-intent {
  font-size: var(--fs-base);
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: var(--s-4);
}
.capsules-intent .capsules-intent-k {
  display: inline-block;
  margin-right: 8px;
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--accent);
}
.capsules-mm {
  margin-bottom: var(--s-4);
  padding: var(--s-3) var(--s-4);
  background: var(--inset);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--c-skill);
  border-radius: var(--r-sm);
}
.capsules-mm .capsules-mm-k {
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--dim);
  margin-bottom: 5px;
}
.capsules-mm p { font-size: var(--fs-base); color: var(--text); line-height: 1.5; }

/* --- Learnings + gotchas two-column --- */
.capsules-insights {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--s-4);
  margin-bottom: var(--s-4);
}
.capsules-col { display: flex; flex-direction: column; gap: var(--s-2); }
.capsules-col-head {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--dim);
}
.capsules-col-head .marker { width: 6px; height: 6px; border-radius: 2px; flex: none; }
.capsules-col.learn  .marker { background: var(--ok);  box-shadow: 0 0 8px color-mix(in srgb, var(--ok) 60%, transparent); }
.capsules-col.gotcha .marker { background: var(--warn); box-shadow: 0 0 8px color-mix(in srgb, var(--warn) 60%, transparent); }
.capsules-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.capsules-list li {
  position: relative;
  padding-left: 16px;
  font-size: var(--fs-base);
  color: var(--muted);
  line-height: 1.45;
}
.capsules-list li::before {
  content: "";
  position: absolute;
  left: 2px; top: 8px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--faint);
}
.capsules-col.learn  .capsules-list li::before { background: color-mix(in srgb, var(--ok) 70%, transparent); }
.capsules-col.gotcha .capsules-list li::before { background: color-mix(in srgb, var(--warn) 70%, transparent); }

/* --- Learning flow: finding -> skill/agent that learns it -> version --- */
.capsules-flow {
  margin-bottom: var(--s-4);
  padding: var(--s-3) var(--s-4) var(--s-4);
  background: var(--inset);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--c-capsule);
  border-radius: var(--r-md);
}
.capsules-flow-head {
  display: flex;
  align-items: center;
  gap: 9px;
  flex-wrap: wrap;
  margin-bottom: var(--s-3);
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--dim);
}
.capsules-flow-step { white-space: nowrap; }
.capsules-flow-sep {
  width: 14px; height: 6px;
  flex: none;
  border-right: 1.5px solid var(--faint);
  border-bottom: 1.5px solid var(--faint);
  transform: skewX(0) rotate(-45deg) translateY(-2px);
  border-radius: 0 0 2px 0;
}
.capsules-flow-body {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) 20px minmax(0, 1.5fr);
  align-items: stretch;
  gap: var(--s-3);
}
.capsules-flow-finding {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: var(--s-3);
  background: color-mix(in srgb, var(--c-capsule) 7%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-capsule) 26%, transparent);
  border-radius: var(--r-sm);
}
.capsules-flow-finding .tag { align-self: flex-start; }
.capsules-flow-text {
  font-size: var(--fs-base);
  color: var(--text);
  line-height: 1.5;
  letter-spacing: -0.005em;
}
.capsules-flow-arrow {
  align-self: center;
  justify-self: center;
  width: 12px; height: 12px;
  border-right: 2px solid var(--c-capsule);
  border-bottom: 2px solid var(--c-capsule);
  transform: rotate(-45deg);
  opacity: .8;
}
.capsules-flow-routes { display: flex; flex-direction: column; gap: var(--s-2); }
.capsules-flow-empty { font-size: var(--fs-base); padding: var(--s-2); }

/* --- One routed target row --- */
.capsules-route {
  display: grid;
  grid-template-columns: minmax(140px, 0.8fr) 1fr auto auto;
  align-items: center;
  gap: var(--s-2) var(--s-3);
  padding: 9px var(--s-3);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.capsules-route.proposed { border-color: color-mix(in srgb, var(--c-capsule) 38%, transparent); background: color-mix(in srgb, var(--c-capsule) 6%, transparent); }
.capsules-route.rejected { opacity: .72; }
.capsules-route-target { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
.capsules-route-name {
  font-size: var(--fs-base);
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.capsules-route-learns { min-width: 0; font-size: var(--fs-sm); line-height: 1.45; color: var(--muted); }
.capsules-route-learns-k {
  margin-right: 7px;
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--dim);
}
.capsules-route-to {
  width: 11px; height: 11px;
  flex: none;
  border-right: 1.5px solid var(--faint);
  border-bottom: 1.5px solid var(--faint);
  transform: rotate(-45deg);
}
.capsules-route-ver { display: inline-flex; align-items: center; gap: 7px; flex: none; }
.capsules-bump {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--r-pill);
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--muted);
  background: var(--surface-3);
  border: 1px solid var(--border);
}
.capsules-bump.major { color: var(--c-requirement); border-color: color-mix(in srgb, var(--c-requirement) 42%, transparent); background: color-mix(in srgb, var(--c-requirement) 12%, transparent); }
.capsules-bump.minor { color: var(--accent);        border-color: color-mix(in srgb, var(--accent) 42%, transparent);        background: color-mix(in srgb, var(--accent) 12%, transparent); }
.capsules-bump.patch { color: var(--c-agent);       border-color: color-mix(in srgb, var(--c-agent) 42%, transparent);       background: color-mix(in srgb, var(--c-agent) 12%, transparent); }
.capsules-ver {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.capsules-rstatus {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: var(--r-pill);
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: capitalize;
  color: var(--muted);
  background: var(--surface-3);
  border: 1px solid var(--border);
}
.capsules-rstatus::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 7px color-mix(in srgb, currentColor 70%, transparent);
}
.capsules-rstatus.adopted  { color: var(--c-agent);       border-color: color-mix(in srgb, var(--c-agent) 40%, transparent);       background: color-mix(in srgb, var(--c-agent) 12%, transparent); }
.capsules-rstatus.proposed { color: var(--c-capsule);     border-color: color-mix(in srgb, var(--c-capsule) 40%, transparent);     background: color-mix(in srgb, var(--c-capsule) 12%, transparent); }
.capsules-rstatus.rejected { color: var(--c-requirement); border-color: color-mix(in srgb, var(--c-requirement) 40%, transparent); background: color-mix(in srgb, var(--c-requirement) 12%, transparent); }

/* --- Token self-value row (the RL reward) --- */
.capsules-tokens {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--s-2) var(--s-3);
  padding: var(--s-3) var(--s-4);
  background: var(--inset);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  margin-bottom: var(--s-4);
  font-size: var(--fs-sm);
}
.capsules-tk { display: inline-flex; align-items: baseline; gap: 6px; }
.capsules-tk .tk-k { color: var(--dim); text-transform: uppercase; letter-spacing: .06em; font-size: var(--fs-xs); }
.capsules-tk .tk-v { font-family: var(--font-mono); color: var(--muted); font-variant-numeric: tabular-nums; }
.capsules-tk .tk-v.spent { color: var(--c-requirement); }
.capsules-tk .tk-v.save  { color: var(--accent); }
.capsules-tdiv { color: var(--faint); }
.capsules-net {
  margin-left: auto;
  display: inline-flex;
  align-items: baseline;
  gap: 7px;
  padding: 4px 12px;
  border-radius: var(--r-pill);
  font-variant-numeric: tabular-nums;
}
.capsules-net .net-k { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: .1em; color: var(--dim); }
.capsules-net .net-v { font-family: var(--font-mono); font-weight: 700; font-size: var(--fs-base); letter-spacing: -0.01em; }
.capsules-net.pos { background: color-mix(in srgb, var(--ok) 12%, transparent); border: 1px solid color-mix(in srgb, var(--ok) 34%, transparent); }
.capsules-net.pos .net-v { color: var(--ok); }
.capsules-net.neg { background: color-mix(in srgb, var(--err) 10%, transparent); border: 1px solid color-mix(in srgb, var(--err) 30%, transparent); }
.capsules-net.neg .net-v { color: var(--err); }

/* --- Footer: provenance pills + expand --- */
.capsules-foot {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  flex-wrap: wrap;
}
.capsules-produced {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
}
.capsules-expand {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  user-select: none;
  padding: 6px 12px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--muted);
  font-size: var(--fs-sm);
  font-weight: 600;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.capsules-expand:hover { background: var(--surface-3); color: var(--text); border-color: var(--accent-line); }
.capsules-chev {
  width: 8px; height: 8px;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  transform: rotate(45deg);
  transition: transform var(--dur) var(--ease);
  margin-top: -2px;
}
.capsules-card.open .capsules-chev { transform: rotate(-135deg); margin-top: 2px; }

/* --- Decisions drawer (expandable) --- */
.capsules-decisions {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .26s var(--ease);
  border-top: 1px solid transparent;
}
.capsules-card.open .capsules-decisions {
  grid-template-rows: 1fr;
  border-top-color: var(--border);
}
.capsules-decisions-inner { overflow: hidden; min-height: 0; }
.capsules-decisions-pad { padding: var(--s-4) var(--s-5) var(--s-5); display: flex; flex-direction: column; gap: var(--s-3); }
.capsules-dec-title {
  font-size: var(--fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--dim);
}
.capsules-dec {
  display: grid;
  grid-template-columns: 18px 1fr;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-4);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.capsules-dec-no {
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--c-capsule);
  font-variant-numeric: tabular-nums;
}
.capsules-dec-grid { display: flex; flex-direction: column; gap: 6px; }
.capsules-dec-what { color: var(--text); font-size: var(--fs-base); font-weight: 600; letter-spacing: -0.005em; }
.capsules-dec-why  { color: var(--muted); font-size: var(--fs-base); line-height: 1.5; }
.capsules-dec-file {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  align-self: flex-start;
  margin-top: 2px;
  padding: 3px 9px;
  border-radius: var(--r-sm);
  background: var(--inset);
  border: 1px solid var(--border-soft);
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  color: var(--accent);
}
.capsules-dec-file::before {
  content: "";
  width: 6px; height: 8px;
  border: 1px solid currentColor;
  border-radius: 1px;
  opacity: .7;
  flex: none;
}

@media (max-width: 720px) {
  .capsules-insights { grid-template-columns: minmax(0, 1fr); }
  .capsules-totals { grid-auto-flow: row; grid-template-columns: repeat(2, 1fr); }
  .capsules-net { margin-left: 0; }
  .capsules-flow-body { grid-template-columns: minmax(0, 1fr); }
  .capsules-flow-arrow { transform: rotate(45deg); justify-self: start; margin-left: var(--s-3); }
  .capsules-route {
    grid-template-columns: minmax(0, 1fr) auto;
    grid-template-areas: "target ver" "learns learns";
  }
  .capsules-route-target { grid-area: target; }
  .capsules-route-ver { grid-area: ver; justify-self: end; }
  .capsules-route-learns { grid-area: learns; }
  .capsules-route-to { display: none; }
}

/* ============================================================================
   CAPSULE — view-skills.css
   Enterprise skill / agent registry with semantic versioning.
   View-specific styles only. All custom classes are "skills-" prefixed.
   Shared classes (.card .panel .k .btn .tag .pill .mono .grid .g2 etc.) come
   from 00-tokens.css and are reused, not restated.
   ============================================================================ */

/* --- view header ---------------------------------------------------------- */
.skills-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--s-4);
  margin-bottom: var(--s-5);
  flex-wrap: wrap;
}
.skills-head h2 { letter-spacing: -0.02em; }
.skills-sub {
  max-width: 60ch;
  margin-top: var(--s-2);
  color: var(--muted);
  font-size: var(--fs-base);
}
.skills-cadence {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  margin-top: var(--s-3);
  font-size: var(--fs-xs);
}
.skills-stats {
  display: flex;
  gap: var(--s-2);
  flex-wrap: wrap;
}
.skills-stat {
