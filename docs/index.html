      <p>${graph_esc(latest.changelog)}</p>
    </div>
    <div class="muted" style="font-size:var(--fs-xs)">Evolved from capsule
      ${graph_capRef(s, latest.derivedFromCapsule)}</div>`;
}

/* monospace capsule reference; clickable only when the capsule is a graph node */
function graph_capRef(s, id) {
  const live = !!s.byId[id];
  return `<span class="mono${live ? " graph-jump" : ""}"${live ? ` data-jump="${graph_esc(id)}"` : ` title="not in current graph view"`} style="color:var(--c-capsule)${live ? ";cursor:pointer" : ""}">${graph_esc(id)}</span>`;
}

function graph_workorderBody(w) {
  const st = w.status === "done" ? "ok" : w.status === "queued" ? "warn" : "";
  return `
    <div class="graph-insp-row" style="margin-top:8px">
      <span class="pill ${st}">${graph_esc(w.status.replace("_", " "))}</span>
    </div>
    <div class="graph-summary" style="--c:var(--c-workorder)">${graph_esc(w.title)}</div>
    <div class="kv" style="margin-top:var(--s-3)">
      <div class="key">Implements</div>
      <div class="val"><span class="tag requirement graph-jump" data-jump="${graph_esc(w.requirementId)}">${graph_esc(w.requirementId)}</span></div>
      <div class="key">Agent</div>
      <div class="val"><span class="tag agent graph-jump" data-jump="${graph_esc(w.agentId)}">${graph_esc(graph_short(w.agentId))}</span></div>
    </div>`;
}

function graph_requirementBody(r) {
  const st = r.status === "active" ? "ok" : r.status === "in_review" ? "warn" : "";
  return `
    <div class="graph-insp-row" style="margin-top:8px">
      <span class="pill ${st}">${graph_esc(r.status.replace("_", " "))}</span>
    </div>
    <div class="graph-summary" style="--c:var(--c-requirement)">${graph_esc(r.plainEnglish)}</div>
    <div class="muted" style="font-size:var(--fs-xs)">Business intent · ${graph_esc(r.title)}</div>`;
}

function graph_modelBody(s, m) {
  // capsules authored in sessions on this model
  const caps = (DATA.capsules || []).filter(c => c.model === m.id);
  const spent = caps.reduce((a, c) => a + c.tokensSpent, 0);
  const saved = caps.reduce((a, c) => a + c.reuses * c.tokensSavedPerReuse, 0);
  return `
    <div class="graph-insp-row" style="margin-top:8px">
      <span class="pill">${graph_esc(m.provider)}</span>
      <span class="pill ok">${m.contextK.toLocaleString()}K context</span>
    </div>
    <p style="font-size:var(--fs-sm);margin:var(--s-2) 0 var(--s-3)">
      Session backend. Memory follows the <b style="color:var(--text)">assistant</b>, not the model —
      capsules written here persist in Backboard and survive a model switch.
    </p>
    <div class="graph-metrics">
      <div class="graph-metric"><span class="graph-metric-v">${caps.length}</span><span class="graph-metric-k">Capsules authored</span></div>
      <div class="graph-metric"><span class="graph-metric-v">${graph_kt(spent)}</span><span class="graph-metric-k">Tokens spent</span></div>
      <div class="graph-metric"><span class="graph-metric-v pos">${graph_kt(saved)}</span><span class="graph-metric-k">Saved downstream</span></div>
    </div>`;
}

function graph_mcpBody(m) {
  const ok = m.status === "connected";
  return `
    <div class="graph-insp-row" style="margin-top:8px">
      <span class="pill ${ok ? "ok" : "warn"}">${graph_esc(m.status)}</span>
      <span class="pill">${graph_esc(m.kind)}</span>
    </div>
    <p style="font-size:var(--fs-sm);margin-top:var(--s-2)">
      MCP connection. At MCP-selection time you choose whether to adopt the latest
      capsule-backed skill versions this server exposes.
    </p>`;
}

function graph_memoryBody(s) {
  const w = DATA.workspace;
  const m = DATA.metrics;
  return `
    <p style="font-size:var(--fs-sm);margin:var(--s-2) 0 var(--s-3)">
      <b style="color:var(--text)">Backboard</b> is the memory hub. Every capsule is written here
      with <span class="mono">send_to_llm=false</span> — context is stored, no generation —
      and ranked back into sessions. Memory is bound to the
      <b style="color:var(--text)">assistant</b>, so switching models keeps the capsule.
    </p>
    <div class="kv">
      <div class="key">Tenant</div><div class="val mono">${graph_esc(w.tenantAssistantId)}</div>
      <div class="key">Enterprise</div><div class="val">${graph_esc(w.enterprise)}</div>
      <div class="key">Tier</div><div class="val">${graph_esc(w.memoryTier)}</div>
      <div class="key">Isolation</div><div class="val">per <span class="mono">assistant_id</span></div>
    </div>
    <div class="graph-metrics" style="margin-top:var(--s-4)">
      <div class="graph-metric"><span class="graph-metric-v">${m.capsules}</span><span class="graph-metric-k">Capsules</span></div>
      <div class="graph-metric"><span class="graph-metric-v">${m.sessionsCaptured}</span><span class="graph-metric-k">Sessions</span></div>
      <div class="graph-metric"><span class="graph-metric-v pos">${graph_kt(m.tokensSavedTotal)}</span><span class="graph-metric-k">Tokens saved</span></div>
    </div>
    <div class="graph-store"><span class="graph-store-dot"></span>Ranked #1 on LoCoMo &amp; LongMemEval</div>`;
}

/* connected-entity jump chips (respect active type filters) */
function graph_neighbours(s, n) {
  const near = [...(s.adj[n.id] || [])]
    .filter(id => id !== n.id)
    .map(id => s.byId[id])
    .filter(x => x && !x.hidden);
  if (!near.length) return "";
  near.sort((a, b) => a.type.localeCompare(b.type));
  return `
    <div class="graph-sec"><span class="k">Connected · ${near.length}</span></div>
    <div class="graph-tags">
      ${near.map(x => `<span class="tag ${x.type} graph-jump" data-jump="${graph_esc(x.id)}">${graph_esc(x.label)}</span>`).join("")}
    </div>`;
}

/* pin / adopt actions -> inline confirmation toast */
function graph_action(s, btn) {
  const act = btn.getAttribute("data-act");
  const toast = s.insp.querySelector("[data-toast]");
  if (!toast) return;
  if (act === "pin") {
    const ver = btn.getAttribute("data-ver");
    const sk = btn.getAttribute("data-skill");
    toast.innerHTML = `<div class="graph-toast">Pinned <span class="mono">${graph_esc(sk)}@${graph_esc(ver)}</span> into this repo — version is frozen until you bump it.</div>`;
  } else if (act === "adopt") {
    const ver = btn.getAttribute("data-ver");
    const saved = +btn.getAttribute("data-saved") || 0;
    toast.innerHTML = `<div class="graph-toast">Adopted latest <span class="mono">v${graph_esc(ver)}</span> — projected <b>${graph_kt(saved)} tokens</b> saved per use going forward.</div>`;
  }
}

/* ---- small formatting helpers ---- */
function graph_scoreBar(label, v) {
  return `
    <div class="graph-scorebar">
      <div class="graph-scorebar-top"><span class="k">${label}</span><span class="v">${v}</span></div>
      <div class="bar"><span class="fill" style="width:${Math.max(0, Math.min(100, v))}%"></span></div>
    </div>`;
}
function graph_kt(n) {
  if (n == null) return "0";
  if (Math.abs(n) >= 1000) return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + "k";
  return String(n);
}
function graph_short(id) {
  const slash = id.indexOf("/");
  return slash >= 0 ? id.slice(slash + 1) : id;
}
function graph_esc(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

/* ============================================================================
   CAPSULE — 20-view-capsules.js
   The capsule feed. Renders DATA.capsules as rich cards (newest first) with the
   token self-value (RL reward) emphasized. Click a card to expand its decisions.
   Single top-level render function: renderCapsules. Helpers prefixed capsules_.
   ============================================================================ */

function renderCapsules(root) {
  const caps = (DATA.capsules || [])
    .slice()
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  const m = DATA.metrics || {};
  const totalSpent = caps.reduce((s, c) => s + (c.tokensSpent || 0), 0);
  const totalNet = caps.reduce(
    (s, c) => s + ((c.tokensSavedPerReuse || 0) * (c.reuses || 0) - (c.tokensSpent || 0)),
    0
  );
  const totalReuses = caps.reduce((s, c) => s + (c.reuses || 0), 0);

  const head = `
    <div class="capsules-head">
      <div class="capsules-head-titles">
        <h2 class="h2">Capsules</h2>
        <div class="capsules-lede">
          Compressed session learnings captured from every agent run, stored in
          ${capsules_esc(DATA.workspace ? DATA.workspace.memoryStore : "Backboard")} and fed back
          to mint new skill versions. Each capsule's token delta is the reinforcement reward.
        </div>
      </div>
      <div class="capsules-totals" role="group" aria-label="Capsule feed totals">
        <div class="capsules-stat">
          <span class="capsules-stat-v">${caps.length}</span>
          <span class="capsules-stat-k">Capsules</span>
        </div>
        <div class="capsules-stat">
          <span class="capsules-stat-v">${capsules_num(m.sessionsCaptured || 0)}</span>
          <span class="capsules-stat-k">Sessions</span>
        </div>
        <div class="capsules-stat">
          <span class="capsules-stat-v green">${capsules_num(m.tokensSavedTotal || 0)}</span>
          <span class="capsules-stat-k">Tokens saved</span>
        </div>
        <div class="capsules-stat">
          <span class="capsules-stat-v accent">${m.avgTransfer != null ? m.avgTransfer : "—"}</span>
          <span class="capsules-stat-k">Avg transfer</span>
        </div>
        <div class="capsules-stat">
          <span class="capsules-stat-v">${totalReuses}</span>
          <span class="capsules-stat-k">Reuses</span>
        </div>
      </div>
    </div>`;

  const feed = `<div class="capsules-feed">${caps.map(capsules_card).join("")}</div>`;

  root.innerHTML = head + feed;

  // Wire expand/collapse on each card's toggle.
  root.querySelectorAll(".capsules-card").forEach((cardEl) => {
    const toggle = cardEl.querySelector("[data-toggle]");
    if (!toggle) return;
    const handler = () => {
      const open = cardEl.classList.toggle("open");
      toggle.setAttribute("aria-expanded", open ? "true" : "false");
      const lbl = toggle.querySelector("[data-label]");
      if (lbl) lbl.textContent = open ? "Hide decisions" : "Decisions";
    };
    toggle.addEventListener("click", handler);
    toggle.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        handler();
      }
    });
  });
}

/* --- One capsule card --------------------------------------------------- */
function capsules_card(c) {
  const reuses = c.reuses || 0;
  const perReuse = c.tokensSavedPerReuse || 0;
  const spent = c.tokensSpent || 0;
  const grossSaved = perReuse * reuses;
  const net = grossSaved - spent;
  const netPos = net >= 0;

  const superseded = /superseded by/i.test(c.summary || "");
  const proposed = /^proposed[:\s]/i.test(c.summary || "") || reuses === 0;
  let stateClass = "";
  if (superseded) stateClass = " superseded";
  else if (proposed) stateClass = " proposed";

  const tCls = c.transferScore >= 70 ? "" : c.transferScore >= 50 ? " warn" : " low";

  const model = capsules_model(c.model);
  const decisions = c.decisions || [];

  return `
  <article class="card capsules-card${stateClass}">
    <div class="capsules-body">
      <div class="capsules-top">
        <div class="capsules-ident">
          <div class="capsules-idrow">
            <span class="tag capsule">capsule</span>
            <span class="capsules-id">${capsules_esc(c.id)}</span>
            ${superseded ? `<span class="pill warn">superseded</span>` : ""}
            ${proposed && !superseded ? `<span class="pill">proposed</span>` : ""}
          </div>
          <div class="capsules-meta">
            <span>${capsules_esc(c.project || "")}</span>
            <span class="dot"></span>
            <span class="mono">${capsules_esc(c.session || "")}</span>
            <span class="dot"></span>
            <span class="capsules-author">${capsules_esc(capsules_shortAuthor(c.author))}</span>
            <span class="dot"></span>
            <span class="tag model" style="padding:1px 8px">${capsules_esc(model)}</span>
            <span class="dot"></span>
            <span>${capsules_date(c.createdAt)}</span>
          </div>
        </div>
        <div class="capsules-transfer">
          <span class="capsules-tscore${tCls}" title="Transfer score — how reusable this capsule is across sessions">
            <b>${c.transferScore != null ? c.transferScore : "—"}</b><span>transfer</span>
          </span>
        </div>
      </div>

      <div class="capsules-metrics">
        ${capsules_metric("Novelty", c.novelty, "violet")}
        ${capsules_metric("Importance", c.importance, "rose")}
      </div>

      <p class="capsules-summary">${capsules_esc(c.summary)}</p>

      ${c.intent ? `<p class="capsules-intent"><span class="capsules-intent-k">Intent</span>${capsules_esc(c.intent)}</p>` : ""}

      <div class="capsules-insights">
        ${capsules_insightCol("learn", "Learnings", c.learnings)}
        ${capsules_insightCol("gotcha", "Gotchas", c.gotchas)}
      </div>

      ${c.mentalModel ? `<div class="capsules-mm"><div class="capsules-mm-k">Mental model</div><p>${capsules_esc(c.mentalModel)}</p></div>` : ""}

      ${capsules_flow(c)}

      <div class="capsules-tokens">
        <span class="capsules-tk"><span class="tk-k">spent</span><span class="tk-v spent">${capsules_num(spent)}</span></span>
        <span class="capsules-tdiv">·</span>
        <span class="capsules-tk"><span class="tk-k">saves</span><span class="tk-v save">${capsules_num(perReuse)}</span><span class="tk-k">/ reuse</span></span>
        <span class="capsules-tdiv">·</span>
        <span class="capsules-tk"><span class="tk-v">${reuses}</span><span class="tk-k">reuses</span></span>
        <span class="capsules-net ${netPos ? "pos" : "neg"}" title="Net reward = saves/reuse × reuses − tokens spent">
          <span class="net-k">net saved</span>
          <span class="net-v">${netPos ? "+" : "−"}${capsules_num(Math.abs(net))}</span>
        </span>
      </div>

      <div class="capsules-foot">
        <span class="pill memory" style="color:var(--c-memory);border-color:color-mix(in srgb,var(--c-memory) 40%,transparent);background:color-mix(in srgb,var(--c-memory) 12%,transparent)">
          stored in ${capsules_esc(c.storedIn || "Backboard")}
          <span class="mono" style="color:inherit;opacity:.85">· ${capsules_esc(c.threadId || "")}</span>
        </span>
        ${
          c.producedVersion
            ? `<span class="capsules-produced muted">produced <a href="#skills" class="tag skill" style="padding:1px 8px">${capsules_esc(c.producedVersion)}</a></span>`
            : ""
        }
        ${
          decisions.length
            ? `<button type="button" class="capsules-expand" data-toggle aria-expanded="false">
                 <span data-label>Decisions</span>
                 <span class="badge">${decisions.length}</span>
                 <span class="capsules-chev" aria-hidden="true"></span>
               </button>`
            : ""
        }
      </div>
    </div>

    ${
      decisions.length
        ? `<div class="capsules-decisions">
             <div class="capsules-decisions-inner">
               <div class="capsules-decisions-pad">
                 <div class="capsules-dec-title">Decisions · what / why / where</div>
                 ${decisions.map(capsules_decision).join("")}
               </div>
             </div>
           </div>`
        : ""
    }
  </article>`;
}

/* --- Learning flow: finding -> skill/agent that learns it -> new version */
function capsules_flow(c) {
  const finding = c.finding || c.summary || "";
  const targets = c.routedTo || [];
  if (!finding && !targets.length) return "";
  return `
    <div class="capsules-flow">
      <div class="capsules-flow-head">
        <span class="capsules-flow-step">finding</span>
        <span class="capsules-flow-sep" aria-hidden="true"></span>
        <span class="capsules-flow-step">learned by skill / agent</span>
        <span class="capsules-flow-sep" aria-hidden="true"></span>
        <span class="capsules-flow-step">proposed version</span>
      </div>
      <div class="capsules-flow-body">
        <div class="capsules-flow-finding">
          <span class="tag capsule">finding</span>
          <p class="capsules-flow-text">${capsules_esc(finding)}</p>
        </div>
        <div class="capsules-flow-arrow" aria-hidden="true"></div>
        <div class="capsules-flow-routes">
          ${
            targets.length
              ? targets.map(capsules_route).join("")
              : `<div class="capsules-flow-empty dim">no targets routed</div>`
          }
        </div>
      </div>
    </div>`;
}

/* --- One routed target: skill/agent that learns the finding -> version --- */
function capsules_route(t) {
  const type = String(t.entity || "").split("/")[0] || "skill";
  const tagCls = type === "agent" ? "agent" : "skill";
  const status = String(t.status || "proposed").toLowerCase();
  const bump = String(t.proposes || "").toLowerCase();
  return `
    <div class="capsules-route ${status}">
      <div class="capsules-route-target">
        <span class="tag ${tagCls}">${capsules_esc(type)}</span>
        <span class="capsules-route-name">${capsules_esc(t.entityName || t.entity)}</span>
      </div>
      <div class="capsules-route-learns">
        <span class="capsules-route-learns-k">learns</span>
        <span class="capsules-route-learns-v">${capsules_esc(t.learns || "")}</span>
      </div>
      <span class="capsules-route-to" aria-hidden="true"></span>
      <div class="capsules-route-ver">
        ${bump ? `<span class="capsules-bump ${bump}">${capsules_esc(bump)}</span>` : ""}
        <span class="capsules-ver">${capsules_esc(t.proposedVersion || "")}</span>
        <span class="capsules-rstatus ${status}">${capsules_esc(status)}</span>
      </div>
    </div>`;
}

/* --- Mini metric bar ---------------------------------------------------- */
function capsules_metric(label, value, color) {
  const v = Math.max(0, Math.min(100, value || 0));
  return `
    <div class="capsules-metric">
      <div class="capsules-metric-top">
        <span class="lbl">${capsules_esc(label)}</span>
        <span class="num">${v}<span class="dim">/100</span></span>
      </div>
      <div class="bar"><span class="fill ${color}" style="width:${v}%"></span></div>
    </div>`;
}

/* --- Learnings / gotchas column ----------------------------------------- */
function capsules_insightCol(kind, title, items) {
  const list = (items || [])
    .map((t) => `<li>${capsules_esc(t)}</li>`)
    .join("");
  return `
    <div class="capsules-col ${kind}">
      <div class="capsules-col-head"><span class="marker"></span>${capsules_esc(title)}</div>
      <ul class="capsules-list">${list || `<li class="dim">none recorded</li>`}</ul>
    </div>`;
}

/* --- One decision row --------------------------------------------------- */
function capsules_decision(d, i) {
  return `
    <div class="capsules-dec">
      <div class="capsules-dec-no">${i + 1}</div>
      <div class="capsules-dec-grid">
        <div class="capsules-dec-what">${capsules_esc(d.what)}</div>
        <div class="capsules-dec-why">${capsules_esc(d.why)}</div>
        ${d.file ? `<span class="capsules-dec-file">${capsules_esc(d.file)}</span>` : ""}
      </div>
    </div>`;
}

/* --- Helpers ------------------------------------------------------------ */
function capsules_model(id) {
  const found = (DATA.models || []).find((x) => x.id === id);
  return found ? found.name : id || "";
}

function capsules_shortAuthor(a) {
  if (!a) return "";
  return a.indexOf("/") >= 0 ? a.split("/").pop() : a;
}

function capsules_num(n) {
  return (n || 0).toLocaleString("en-US");
}

function capsules_date(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return capsules_esc(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function capsules_esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

/* ============================================================================
   CAPSULE — 20-view-skills.js
   Enterprise skill / agent registry with semantic versioning.
   Renders the capsule -> new version -> adoption story.
   Single top-level render function: renderSkills(root).
   Helpers are "skills_" prefixed. Dataset is the global DATA.
   ============================================================================ */

function renderSkills(root) {
  const skills = DATA.skills || [];
  const agents = DATA.agents || [];

  // roll-up: total versions and how many are adopted/proposed
  const allVersions = skills.reduce((n, s) => n + s.versions.length, 0);
  const proposedCount = skills.reduce(
    (n, s) => n + s.versions.filter((v) => v.status === "proposed").length,
    0
  );
  const totalAdoptions = skills.reduce(
    (n, s) => n + s.versions.reduce((m, v) => m + (v.adoptedBy || 0), 0),
    0
  );

  const skillsHtml = skills.map(skills_skillCard).join("");
  const agentsHtml = agents.map(skills_agentCard).join("");

  root.innerHTML = `
    <header class="skills-head">
      <div>
        <h2>Skill Registry</h2>
        <p class="skills-sub">
          Enterprise-scoped, versioned capabilities. Every capsule learned in a session
          mints a new semantic version &mdash; teams pin a version into their repo or adopt
          the latest org-wide. Each bump shows the token it saves per use, the reward signal of the RL loop.
        </p>
        <p class="skills-cadence">
          <span class="pill ok">Daily distillation</span>
          <span class="mono" style="color:var(--muted)">last minted today &middot; 06:00</span>
        </p>
      </div>
      <div class="skills-stats">
        <div class="skills-stat"><b>${skills.length}</b><span>Skills</span></div>
        <div class="skills-stat"><b>${allVersions}</b><span>Versions</span></div>
        <div class="skills-stat"><b>${proposedCount}</b><span>Proposed</span></div>
        <div class="skills-stat"><b>${totalAdoptions}</b><span>Adoptions</span></div>
      </div>
    </header>

    <div class="skills-section">
      <span class="tag skill">skill</span>
      <span class="k">Enterprise skills</span>
      <span class="skills-line"></span>
      <span class="badge">${skills.length}</span>
    </div>
    <div class="skills-list">
      ${skillsHtml}
    </div>

    <div class="skills-section">
      <span class="tag agent">agent</span>
      <span class="k">Agents &mdash; evolve from the same capsules</span>
      <span class="skills-line"></span>
      <span class="badge">${agents.length}</span>
    </div>
    <div class="grid g3">
      ${agentsHtml}
    </div>
  `;

  skills_wire(root);
}

/* --- one skill card ------------------------------------------------------- */
function skills_skillCard(skill) {
  // oldest -> newest already in dataset order
  const versions = skill.versions;
  const last = versions[versions.length - 1];

  const rowsHtml = versions
    .map((v, i) => {
      const isCurrent = v.version === skill.currentVersion;
      const isNewest = i === versions.length - 1;
      const prev = i > 0 ? versions[i - 1] : null;
      return skills_versionRow(skill, v, { isCurrent, isNewest, prev });
    })
    .join("");

  const usedBy = (skill.usedByAgents || [])
    .map((a) => `<span class="mono">${skills_short(a)}</span>`)
    .join(", ");

  return `
    <article class="card skills-card">
      <div class="skills-card-head">
        <div>
          <div class="skills-id-row">
            <span class="skills-name">${skill.name}</span>
            <span class="tag skill">${skill.scope}</span>
          </div>
          <div class="skills-id-row">
            <span class="mono">${skill.id}</span>
          </div>
          <p class="skills-desc">${skill.description}</p>
        </div>
        <div class="skills-headmeta">
          <span class="skills-curver">
            <span class="skills-curlbl">current</span> v${skill.currentVersion}
          </span>
          <span class="skills-repo">${skill.repoPath}</span>
          <span class="skills-usedby">used by ${usedBy || "&mdash;"}</span>
        </div>
      </div>

      <div class="skills-timeline">
        <div class="skills-tl-title">
          <span class="k">Version timeline</span>
          <span class="muted" style="font-size:var(--fs-sm)">capsule &rarr; version &rarr; adoption</span>
        </div>
        ${rowsHtml}
      </div>
    </article>
  `;
}

/* --- one version row ------------------------------------------------------ */
function skills_versionRow(skill, v, ctx) {
  const { isCurrent, isNewest, prev } = ctx;
  const proposed = v.status === "proposed";

  const delta = v.tokenDeltaPerUse;
  const deltaHtml =
    delta < 0
      ? `<span class="skills-save">saves ${Math.abs(delta).toLocaleString()} tokens/use</span>`
      : `<span class="skills-cost">+${delta.toLocaleString()} tokens/use</span>`;

  const cap = skills_capsule(v.derivedFromCapsule);
  const capLabel = cap ? `${cap.id} &middot; ${skills_capShort(cap)}` : v.derivedFromCapsule;

  const statusPill = proposed
    ? `<span class="pill warn">proposed</span>`
    : `<span class="pill ok">published</span>`;

  const currentTag = isCurrent ? `<span class="skills-current-tag">&bull; current</span>` : "";

  const pinCmd = `capsule pull ${skill.id}@${v.version}`;
  const pinId = skills_uid();
  const diffId = skills_uid();

  // adopt button only for a proposed newest version
  const adoptBtn =
    proposed && isNewest
      ? `<button class="btn skills-adopt" data-version="${v.version}" data-skill="${skill.id}">Adopt v${v.version} (org-wide)</button>`
      : "";

  // diff toggle for proposed newest (before = current published guidance, after = proposed)
  const diffBtn =
    proposed && isNewest
      ? `<button class="btn ghost skills-difftoggle" data-target="${diffId}">Diff vs current</button>`
      : "";

  const before = prev ? prev.changelog : "No prior guidance &mdash; first published version.";
  const after = v.changelog;
  const rationale = cap
    ? `Learned in ${cap.id}: ${cap.summary}`
    : "Derived from a captured session capsule.";

  const diffPanel =
    proposed && isNewest
      ? `
      <div class="skills-reveal" id="${diffId}">
        <div class="skills-diff">
          <div class="skills-diffcol before">
            <h5>Current &mdash; v${skill.currentVersion}</h5>
            <p>${before}</p>
          </div>
          <div class="skills-diffcol after">
            <h5>Proposed &mdash; v${v.version}</h5>
            <p>${after}</p>
            <div class="skills-diff-rationale">${rationale}</div>
          </div>
        </div>
      </div>`
      : "";

  return `
    <div class="skills-ver ${proposed ? "is-proposed" : ""}" style="--bump:${skills_bumpColor(v.bump)}">
      <div class="skills-ver-top">
        <span class="skills-semver ${v.bump}">
          v${v.version} <span class="skills-bump">${v.bump}</span>
        </span>
        ${statusPill}
        ${currentTag}
      </div>

      <div class="skills-changelog">${v.changelog}</div>

      <div class="skills-vermeta">
        <span class="skills-mchip"><span class="skills-mk">from</span>
          <span class="skills-derived">${capLabel}</span></span>
        <span class="skills-mchip"><span class="skills-mk">tokens</span> ${deltaHtml}</span>
        <span class="skills-mchip"><span class="skills-mk">score</span>
          <span class="skills-score">+${v.scoreDelta}</span></span>
        <span class="skills-mchip"><span class="skills-mk">adopted by</span>
          <span class="skills-teams">${v.adoptedBy}</span> teams</span>
      </div>

      <div class="skills-actions">
        ${adoptBtn}
        ${diffBtn}
        <button class="btn alt skills-pintoggle" data-target="${pinId}">Pin into my repo</button>
      </div>

      <div class="skills-reveal" id="${pinId}">
        <div class="skills-pinbox">
          <span class="skills-prompt mono">$</span>
          <code class="skills-pincmd">${pinCmd}</code>
          <button class="btn alt skills-copy" data-copy="${pinCmd}">Copy</button>
        </div>
      </div>
      ${diffPanel}
    </div>
  `;
}

/* --- compact agent card --------------------------------------------------- */
function skills_agentCard(agent) {
  const latest = agent.versions[agent.versions.length - 1];
  const skillTags = (agent.usesSkills || [])
    .map((s) => `<span class="tag skill">${skills_short(s)}</span>`)
    .join("");

  const tl = agent.versions
    .map((v) => {
      const cap = skills_capsule(v.derivedFromCapsule);
      return `
        <div class="skills-arow">
          <span class="skills-semver ${v.bump}" style="--bump:${skills_bumpColor(v.bump)}">
            v${v.version} <span class="skills-bump">${v.bump}</span>
          </span>
          <span class="skills-changelog">${v.changelog}
            <span class="skills-derived">${cap ? cap.id : v.derivedFromCapsule}</span>
          </span>
        </div>`;
    })
    .join("");

  return `
    <article class="card skills-agent">
      <div class="skills-agent-head">
        <div>
          <div class="skills-agent-name">${agent.name}</div>
          <div class="mono" style="font-size:var(--fs-sm)">${agent.id}</div>
        </div>
        <span class="skills-agent-ver">v${agent.currentVersion}</span>
      </div>
      <div class="skills-agent-skills">${skillTags}</div>
      <div class="skills-agent-tl">${tl}</div>
    </article>
  `;
}

/* --- events --------------------------------------------------------------- */
function skills_wire(root) {
  root.addEventListener("click", (e) => {
    const toggle = e.target.closest(".skills-pintoggle, .skills-difftoggle");
    if (toggle) {
      const panel = root.querySelector("#" + toggle.dataset.target);
      if (panel) {
        const open = panel.classList.toggle("open");
        if (toggle.classList.contains("skills-difftoggle")) {
          toggle.textContent = open ? "Hide diff" : "Diff vs current";
        }
      }
      return;
    }

    const copyBtn = e.target.closest(".skills-copy");
    if (copyBtn) {
      skills_copy(copyBtn.dataset.copy);
      const old = copyBtn.textContent;
      copyBtn.textContent = "Copied";
      copyBtn.disabled = true;
      setTimeout(() => {
        copyBtn.textContent = old;
        copyBtn.disabled = false;
      }, 1400);
      return;
    }

    const adopt = e.target.closest(".skills-adopt");
    if (adopt) {
      skills_adopt(adopt);
      return;
    }
  });
}

function skills_adopt(btn) {
  const ver = btn.dataset.version;
  const row = btn.closest(".skills-ver");
  // flip the proposed pill to published, settle the pulsing node, lock the button
  row.classList.remove("is-proposed");
  const pill = row.querySelector(".pill.warn");
  if (pill) {
    pill.classList.remove("warn");
    pill.classList.add("ok");
    pill.textContent = "adopted";
  }
  // bump adopted-by count
  const teams = row.querySelector(".skills-teams");
  if (teams) {
    const n = parseInt(teams.textContent, 10) || 0;
    teams.textContent = n + 1;
  }
  btn.textContent = `Adopted v${ver} org-wide`;
  btn.disabled = true;
}

/* --- helpers -------------------------------------------------------------- */
function skills_bumpColor(bump) {
  if (bump === "major") return "var(--c-requirement)"; // rose
  if (bump === "minor") return "var(--c-capsule)"; // cyan
  return "var(--c-skill)"; // patch -> violet
}

function skills_capsule(id) {
  return (DATA.capsules || []).find((c) => c.id === id) || null;
}

function skills_capShort(cap) {
  const g = (DATA.graph && DATA.graph.nodes) || [];
  const node = g.find((n) => n.id === cap.id);
  return node ? node.label : cap.session;
}

function skills_short(id) {
  const i = id.indexOf("/");
  return i >= 0 ? id.slice(i + 1) : id;
}

let skills_seq = 0;
function skills_uid() {
  skills_seq += 1;
  return "skills-r-" + skills_seq;
}

function skills_copy(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => skills_copyFallback(text));
  } else {
    skills_copyFallback(text);
  }
}

function skills_copyFallback(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch (_) { /* no-op */ }
  document.body.removeChild(ta);
}

/* ============================================================================
   CAPSULE — 20-view-selection.js
   The MODEL + MCP selection screen: the decision moment.
   One top-level render function (renderSelection) + selection_* helpers.
   Reads the global DATA. No imports, no IIFE.
   ============================================================================ */

function renderSelection(root) {
  // -- local UI state (kept in this closure; not a top-level declaration) ----
  const defaultMcps = DATA.mcps
    .filter(function (m) { return m.status === "connected"; })
    .map(function (m) { return m.id; });

  const state = {
    model: (DATA.models[0] && DATA.models[0].id) || "",
    task: (DATA.workOrders[0] && DATA.workOrders[0].id) || "",
    mcps: new Set(defaultMcps),
    useLatest: true,
    started: false
  };

  // -- static shell ----------------------------------------------------------
  root.innerHTML =
    '<div class="selection-head">' +
      '<div class="selection-title">' +
        '<span class="k">Software Factory · New Session</span>' +
        '<h1>Configure session</h1>' +
        '<div class="selection-sub">' +
          '<span>' + selection_esc(DATA.workspace.enterprise) + '</span>' +
          '<span class="selection-dot"></span>' +
          '<span>' + selection_esc(DATA.workspace.project) + '</span>' +
          '<span class="selection-dot"></span>' +
          '<span class="mono">' + selection_esc(DATA.workspace.tenantAssistantId) + '</span>' +
          '<span class="selection-dot"></span>' +
          '<span class="tag memory">' + selection_esc(DATA.workspace.memoryStore) + ' · ' + selection_esc(DATA.workspace.memoryTier) + '</span>' +
        '</div>' +
      '</div>' +
      '<span class="pill ok">RL capture loop active</span>' +
    '</div>' +

    // task picker
    '<div class="selection-task">' +
      '<span class="k">Task</span>' +
      '<div class="selection-chips" id="selection-tasks"></div>' +
    '</div>' +

    // two-column model + mcp
    '<div class="grid g2" style="margin-bottom:var(--s-5)">' +
      '<div class="card">' +
        '<div class="selection-step"><span class="selection-num">1</span><span class="h2" style="margin:0">Model</span></div>' +
        '<p class="muted" style="margin-bottom:var(--s-4);font-size:var(--fs-sm)">Pick the session backend. The capsule is portable across all of them.</p>' +
        '<div class="selection-list" id="selection-models"></div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="selection-step"><span class="selection-num">2</span><span class="h2" style="margin:0">Connections · MCP</span></div>' +
        '<p class="muted" style="margin-bottom:var(--s-4);font-size:var(--fs-sm)">Multi-select. Backboard memory is required to load capsules into the session.</p>' +
        '<div class="selection-list" id="selection-mcps"></div>' +
      '</div>' +
    '</div>' +

    // recommendation
    '<div class="selection-step"><span class="selection-num">3</span><span class="h2" style="margin:0">Capsule recommendation</span></div>' +
    '<div class="card selection-rec" id="selection-rec" style="margin-bottom:var(--s-4)"></div>' +

    // memory note + estimate
    '<div class="grid g2" style="margin-bottom:var(--s-5)">' +
      '<div class="card selection-mem" id="selection-mem"></div>' +
      '<div class="card" id="selection-est"></div>' +
    '</div>' +

    // footer
    '<div class="selection-foot" id="selection-foot"></div>';

  // -- mount dynamic regions -------------------------------------------------
  selection_renderTasks(root, state, refresh, paintModels, paintMcps);
  selection_renderModels(root, state, refresh, paintModels);
  selection_renderMcps(root, state, refresh, paintMcps);
  selection_renderMem(root, state);
  refresh();

  // re-paint helpers for in-place class toggles (no rebind needed)
  function paintModels() {
    const rows = root.querySelectorAll("#selection-models .selection-opt");
    rows.forEach(function (el) {
      el.classList.toggle("is-sel", el.getAttribute("data-id") === state.model);
    });
  }
  function paintMcps() {
    const rows = root.querySelectorAll("#selection-mcps .selection-opt");
    rows.forEach(function (el) {
      el.classList.toggle("is-sel", state.mcps.has(el.getAttribute("data-id")));
    });
  }

  // -- recompute + repaint recommendation / estimate / footer ----------------
  function refresh() {
    const model = selection_byId(DATA.models, state.model);
    const wo = selection_byId(DATA.workOrders, state.task);
    const skill = selection_skillForWO(state.task);
    const latest = selection_latestPublished(skill);
    const prev = selection_prevPublished(skill);
    const proposed = selection_proposed(skill);
    const backboardOn = state.mcps.has("backboard-memory");

    // pin falls back to latest if there is no prior published version
    const active = state.useLatest ? latest : (prev || latest);
    const activeCap = active ? selection_byId(DATA.capsules, active.derivedFromCapsule) : null;
    const latestCap = latest ? selection_byId(DATA.capsules, latest.derivedFromCapsule) : null;

    // token math — the RL reward signal
    const baseline = selection_baseline(state.model);
    const perSessionSave = backboardOn && active ? Math.abs(active.tokenDeltaPerUse) : 0;
    const estWith = baseline - perSessionSave;
    const pct = baseline > 0 ? Math.round((estWith / baseline) * 100) : 100;
    const lift = backboardOn && active ? active.scoreDelta : 0;
    const cumulative = latestCap ? latestCap.reuses * latestCap.tokensSavedPerReuse : 0;

    selection_paintRec(root, state, {
      skill: skill, latest: latest, prev: prev, proposed: proposed,
      active: active, activeCap: activeCap, latestCap: latestCap,
      wo: wo, backboardOn: backboardOn, perSessionSave: perSessionSave, lift: lift
    }, function (which) { state.useLatest = which; refresh(); });

    selection_paintEst(root, {
      baseline: baseline, estWith: estWith, save: perSessionSave, pct: pct,
      cumulative: cumulative, latestCap: latestCap, backboardOn: backboardOn,
      useLatest: state.useLatest
    });

    selection_paintFoot(root, state, {
      model: model, wo: wo, skill: skill, active: active,
      save: perSessionSave, backboardOn: backboardOn
    }, refresh);
  }
}

/* ---------------------------------------------------------------------------
   Pure / DOM helpers (top-level, prefixed selection_)
   --------------------------------------------------------------------------- */

function selection_byId(list, id) {
  for (let i = 0; i < list.length; i++) { if (list[i].id === id) return list[i]; }
  return null;
}

function selection_fmt(n) {
  return Number(n).toLocaleString("en-US");
}

function selection_esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// rough per-session baseline token cost by model (used for WITH/WITHOUT)
function selection_baseline(modelId) {
  const map = {
    "claude-opus-4-8": 46000,
    "claude-sonnet-4-6": 38000,
    "claude-haiku-4-2": 24000,
    "llama-4-maverick": 30000
  };
  return map[modelId] || 36000;
}

// map a work order to its primary enterprise skill via its executing agent
function selection_skillForWO(woId) {
  const map = {
    "WO-101": "skill/payment-idempotency",
    "WO-102": "skill/iso20022-mapper",
    "WO-103": "skill/pci-redaction",
    "WO-104": "skill/sca-challenge",
    "WO-105": "skill/reconciliation-ledger",
    "WO-106": "skill/reconciliation-ledger"
  };
  let skill = selection_byId(DATA.skills, map[woId]);
  if (skill) return skill;
  // fallback: first skill used by the work order's agent
  const wo = selection_byId(DATA.workOrders, woId);
  const agent = wo ? selection_byId(DATA.agents, wo.agentId) : null;
  if (agent && agent.usesSkills.length) return selection_byId(DATA.skills, agent.usesSkills[0]);
  return DATA.skills[0];
}

function selection_publishedVersions(skill) {
  if (!skill) return [];
  return skill.versions.filter(function (v) { return v.status === "published"; });
}
function selection_latestPublished(skill) {
  const pub = selection_publishedVersions(skill);
  return pub.length ? pub[pub.length - 1] : null;
}
function selection_prevPublished(skill) {
  const pub = selection_publishedVersions(skill);
  return pub.length > 1 ? pub[pub.length - 2] : null;
}
function selection_proposed(skill) {
  if (!skill) return null;
  for (let i = skill.versions.length - 1; i >= 0; i--) {
    if (skill.versions[i].status === "proposed") return skill.versions[i];
  }
  return null;
}

// kind -> shared .tag entity class
function selection_mcpTagClass(kind) {
  if (kind === "memory") return "memory";
  if (kind === "workorder") return "workorder";
  return "mcp";
}

/* ---- Task chips ---------------------------------------------------------- */
function selection_renderTasks(root, state, refresh, paintModels, paintMcps) {
  const host = root.querySelector("#selection-tasks");
  host.innerHTML = DATA.workOrders.map(function (wo) {
    const sel = wo.id === state.task ? " is-sel" : "";
    return '<button type="button" class="selection-chip' + sel + '" data-id="' + wo.id + '">' +
      '<span class="selection-chip-id">' + selection_esc(wo.id) + '</span>' +
      '<span>' + selection_esc(wo.title) + '</span>' +
    '</button>';
  }).join("");
  host.querySelectorAll(".selection-chip").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.task = btn.getAttribute("data-id");
      host.querySelectorAll(".selection-chip").forEach(function (b) {
        b.classList.toggle("is-sel", b === btn);
      });
      refresh();
    });
  });
}

/* ---- Model picker -------------------------------------------------------- */
function selection_renderModels(root, state, refresh, paintModels) {
  const host = root.querySelector("#selection-models");
  host.innerHTML = DATA.models.map(function (m) {
    const sel = m.id === state.model ? " is-sel" : "";
    return '<div class="selection-opt' + sel + '" role="radio" tabindex="0" aria-checked="' + (m.id === state.model) + '" data-id="' + m.id + '">' +
      '<span class="selection-mark radio"></span>' +
      '<div class="selection-opt-body">' +
        '<div class="selection-opt-row">' +
          '<span class="selection-opt-name">' + selection_esc(m.name) + '</span>' +
          '<span class="tag model">model</span>' +
        '</div>' +
        '<div class="selection-opt-meta">' +
          '<span>' + selection_esc(m.provider) + '</span>' +
          '<span class="selection-dot"></span>' +
          '<span>memory stays in Backboard</span>' +
          '<span class="selection-dot"></span>' +
          '<span style="color:var(--accent)">capsule portable &mdash; same learnings load</span>' +
        '</div>' +
      '</div>' +
      '<span class="selection-opt-ctx">' + selection_fmt(m.contextK) + 'K ctx</span>' +
    '</div>';
  }).join("");

  function pick(el) {
    state.model = el.getAttribute("data-id");
    host.querySelectorAll(".selection-opt").forEach(function (o) {
      const on = o === el;
      o.classList.toggle("is-sel", on);
      o.setAttribute("aria-checked", on ? "true" : "false");
    });
    refresh();
  }
  host.querySelectorAll(".selection-opt").forEach(function (el) {
    el.addEventListener("click", function () { pick(el); });
    el.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(el); }
    });
  });
}

/* ---- MCP picker ---------------------------------------------------------- */
function selection_renderMcps(root, state, refresh, paintMcps) {
  const host = root.querySelector("#selection-mcps");
  host.innerHTML = DATA.mcps.map(function (mcp) {
    const on = state.mcps.has(mcp.id);
    const tagCls = selection_mcpTagClass(mcp.kind);
    const statusCls = mcp.status === "connected" ? "ok" : "";
    return '<div class="selection-opt' + (on ? " is-sel" : "") + '" role="checkbox" tabindex="0" aria-checked="' + on + '" data-id="' + mcp.id + '">' +
      '<span class="selection-mark check"></span>' +
      '<div class="selection-opt-body">' +
        '<div class="selection-opt-row">' +
          '<span class="selection-opt-name">' + selection_esc(mcp.name) + '</span>' +
          '<span class="tag ' + tagCls + '">' + selection_esc(mcp.kind) + '</span>' +
        '</div>' +
        '<div class="selection-opt-meta"><span class="mono">' + selection_esc(mcp.id) + '</span>' +
          (mcp.kind === "memory" ? '<span class="selection-dot"></span><span style="color:var(--accent)">loads capsule context on connect</span>' : "") +
        '</div>' +
      '</div>' +
      '<span class="pill ' + statusCls + '">' + selection_esc(mcp.status) + '</span>' +
    '</div>';
  }).join("");

  function toggle(el) {
    const id = el.getAttribute("data-id");
    if (state.mcps.has(id)) state.mcps.delete(id); else state.mcps.add(id);
    const on = state.mcps.has(id);
    el.classList.toggle("is-sel", on);
    el.setAttribute("aria-checked", on ? "true" : "false");
    refresh();
  }
  host.querySelectorAll(".selection-opt").forEach(function (el) {
    el.addEventListener("click", function () { toggle(el); });
    el.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(el); }
    });
  });
}

/* ---- Memory-follows-the-entity note ------------------------------------- */
function selection_renderMem(root, state) {
  const host = root.querySelector("#selection-mem");
  host.innerHTML =
    '<div class="selection-mem-head">' +
      '<span class="tag memory">Backboard</span>' +
      '<span class="selection-mem-title">Memory follows the entity, not the model</span>' +
    '</div>' +
    '<p>Capsules live in <strong>' + selection_esc(DATA.workspace.memoryStore) + '</strong> against the tenant assistant ' +
      '<span class="mono">' + selection_esc(DATA.workspace.tenantAssistantId) + '</span>. ' +
      'Switching the model above does <strong>not</strong> drop the capsule — context is bound to the assistant, ' +
      'so the same learnings load whichever backend runs the session. Writes use ' +
      '<span class="mono">send_to_llm=false</span> (store context, no generation), with tenant isolation by assistant id.</p>' +
    '<div class="selection-mem-flow">' +
      '<span class="selection-mem-node">model</span>' +
      '<span class="selection-mem-arrow">→ reads →</span>' +
      '<span class="selection-mem-node hub">' + selection_esc(DATA.workspace.memoryStore) + '</span>' +
      '<span class="selection-mem-arrow">← stores ←</span>' +
      '<span class="selection-mem-node">capsule</span>' +
    '</div>';
}

/* ---- Recommendation card body ------------------------------------------- */
function selection_paintRec(root, state, ctx, onToggle) {
  const host = root.querySelector("#selection-rec");
  const skill = ctx.skill, latest = ctx.latest, prev = ctx.prev, proposed = ctx.proposed;
  const active = ctx.active, activeCap = ctx.activeCap, latestCap = ctx.latestCap, wo = ctx.wo;

  if (!skill || !latest) {
    host.innerHTML = '<p class="muted">No capsule recommendation for this task yet.</p>';
    return;
  }

  const latestSave = Math.abs(latest.tokenDeltaPerUse);
  const transfer = latestCap ? latestCap.transferScore : 0;
  const noBackboard = !ctx.backboardOn;
  const pinDisabled = !prev;

  const pinNote = prev
    ? "v" + prev.version + " · saves " + selection_fmt(Math.abs(prev.tokenDeltaPerUse)) + " tok/session"
    : "only one published version";

  host.innerHTML =
    '<div class="selection-rec-head">' +
      '<div class="selection-rec-title">' +
        '<span class="tag capsule">Latest capsule available</span>' +
        '<span class="selection-skill-name">' + selection_esc(skill.name) + '</span>' +
        '<span class="selection-ver">v' + selection_esc(latest.version) + '</span>' +
        '<span class="selection-bump ' + selection_esc(latest.bump) + '">' + selection_esc(latest.bump) + '</span>' +
      '</div>' +
      '<span class="pill">' + selection_esc(wo ? wo.id : "") + ' · ' + selection_esc(wo ? (selection_byId(DATA.agents, wo.agentId) || {}).name || wo.agentId : "") + '</span>' +
    '</div>' +

    '<div class="selection-summary">' +
      (latestCap ? selection_esc(latestCap.summary) : selection_esc(latest.changelog)) +
    '</div>' +

    '<div class="selection-metrics">' +
      '<div class="selection-metric good"><div class="selection-metric-k">Token savings / reuse</div>' +
        '<div class="selection-metric-v">−' + selection_fmt(latestSave) + '</div>' +
        '<div class="selection-metric-sub">vs solving from scratch</div></div>' +
      '<div class="selection-metric"><div class="selection-metric-k">Transfer-score lift</div>' +
        '<div class="selection-metric-v">+' + selection_fmt(latest.scoreDelta) + '</div>' +
        '<div class="selection-metric-sub">capsule transfer ' + selection_fmt(transfer) + '</div></div>' +
      '<div class="selection-metric"><div class="selection-metric-k">Adopted by</div>' +
        '<div class="selection-metric-v">' + selection_fmt(latest.adoptedBy) + '</div>' +
        '<div class="selection-metric-sub">of ' + selection_fmt(DATA.workspace.seats) + ' seats · from ' + selection_esc(latest.derivedFromCapsule) + '</div></div>' +
    '</div>' +

    '<div class="selection-seg">' +
      '<button type="button" class="selection-seg-btn' + (state.useLatest ? " is-on" : "") + '" data-which="latest">' +
        '<span class="selection-seg-top"><span class="selection-seg-led"></span>Use latest capsule (v' + selection_esc(latest.version) + ')</span>' +
        '<span class="selection-seg-note">' + selection_esc(latest.changelog) + '</span>' +
      '</button>' +
      '<button type="button" class="selection-seg-btn' + (!state.useLatest ? " is-on" : "") + '" data-which="pin"' + (pinDisabled ? " disabled" : "") + '>' +
        '<span class="selection-seg-top"><span class="selection-seg-led"></span>Pin current' + (prev ? " (v" + selection_esc(prev.version) + ")" : "") + '</span>' +
        '<span class="selection-seg-note">' + selection_esc(pinNote) + '</span>' +
      '</button>' +
    '</div>' +

    (proposed
      ? '<div class="selection-proposed"><span class="pill warn">proposed</span>' +
        '<span>v' + selection_esc(proposed.version) + ' is awaiting human adoption — ' + selection_esc(proposed.changelog) + '</span></div>'
      : "") +

    (noBackboard
      ? '<div class="selection-proposed"><span class="pill err">memory off</span>' +
        '<span>Backboard Memory is disconnected — the capsule cannot load and this session starts cold. Re-enable it under Connections.</span></div>'
      : "");

  // wire the segmented toggle
  host.querySelectorAll(".selection-seg-btn").forEach(function (btn) {
    if (btn.disabled) return;
    btn.addEventListener("click", function () {
      onToggle(btn.getAttribute("data-which") === "latest");
    });
  });
}

/* ---- Token estimate body ------------------------------------------------- */

  const host = root.querySelector("#selection-est");
  host.innerHTML =
    '<div class="selection-step"><span class="selection-num">4</span><span class="h2" style="margin:0">Estimated session cost</span></div>' +
    '<p class="muted" style="margin-bottom:var(--s-4);font-size:var(--fs-sm)">Projected tokens for this session — the capsule delta is the RL reward signal.</p>' +
    '<div class="selection-est-grid">' +
      '<div class="selection-est-col">' +
        '<span class="k">Without capsule</span>' +
        '<span class="selection-est-num">' + selection_fmt(e.baseline) + '</span>' +
        '<span class="selection-est-unit">tokens · cold start</span>' +
      '</div>' +
      '<div class="selection-est-vs">' +
        '<span>saves</span>' +
        '<span class="selection-save">' + (e.save > 0 ? "−" + selection_fmt(e.save) : "0") + '</span>' +
      '</div>' +
      '<div class="selection-est-col with">' +
        '<span class="k">With capsule</span>' +
        '<span class="selection-est-num">' + selection_fmt(e.estWith) + '</span>' +
        '<span class="selection-est-unit">tokens · ' + (e.useLatest ? "latest" : "pinned") + ' loaded</span>' +
      '</div>' +
    '</div>' +
    '<div class="selection-est-bar">' +
      '<div class="selection-bar-labels"><span>with capsule</span><span>' + e.pct + '% of cold-start cost</span></div>' +
      '<div class="bar"><span class="fill" style="width:' + e.pct + '%"></span></div>' +
    '</div>' +
    (e.backboardOn && e.latestCap
      ? '<div class="selection-reward">Compounding so far: <strong>' + selection_fmt(e.cumulative) +
        '</strong> tokens already saved across <strong>' + selection_fmt(e.latestCap.reuses) +
        '</strong> reuses of this capsule.</div>'
      : '<div class="selection-reward">Connect Backboard Memory to load the capsule and start saving.</div>');
}

/* ---- Footer / start bar -------------------------------------------------- */
function selection_paintFoot(root, state, ctx, refresh) {
  const host = root.querySelector("#selection-foot");

  if (state.started) {
    const modelName = ctx.model ? ctx.model.name : state.model;
    host.innerHTML =
      '<div class="selection-confirm">' +
        '<span class="pill ok">Session started</span>' +
        '<span>Running ' + selection_esc(ctx.wo ? ctx.wo.id : "") + ' on <span class="mono" style="color:var(--text)">' + selection_esc(modelName) + '</span></span>' +
        '<span class="selection-confirm-detail">' +
          (ctx.backboardOn && ctx.active
            ? 'Capsule <span class="mono">' + selection_esc(ctx.skill.id) + '@' + selection_esc(ctx.active.version) + '</span> loaded · −' + selection_fmt(ctx.save) + ' tokens'
            : 'No capsule loaded (Backboard off)') +
        '</span>' +
        '<button type="button" class="btn ghost" id="selection-reconfigure" style="margin-left:auto">Reconfigure</button>' +
      '</div>';
    host.querySelector("#selection-reconfigure").addEventListener("click", function () {
      state.started = false;
      refresh();
    });
    return;
  }

  const mcpCount = state.mcps.size;
  const verLabel = ctx.active ? "@" + ctx.active.version : "";
  host.innerHTML =
    '<div class="selection-foot-sum">' +
      '<span class="k">Selection</span>' +
      '<span class="mono">' + selection_esc(ctx.model ? ctx.model.name : state.model) + '</span>' +
      '<span class="selection-dot"></span>' +
      '<span>' + selection_fmt(mcpCount) + ' MCP' + (mcpCount === 1 ? "" : "s") + '</span>' +
      '<span class="selection-dot"></span>' +
      '<span class="mono">' + selection_esc(ctx.skill ? ctx.skill.id : "") + selection_esc(verLabel) + '</span>' +
      (ctx.backboardOn && ctx.save > 0
        ? '<span class="selection-dot"></span><span style="color:var(--ok);font-weight:600">−' + selection_fmt(ctx.save) + ' tok</span>'
        : '') +
    '</div>' +
    '<div class="selection-foot-actions">' +
      '<button type="button" class="btn alt" id="selection-reset">Reset</button>' +
      '<button type="button" class="btn" id="selection-start">Start session</button>' +
    '</div>';

  host.querySelector("#selection-start").addEventListener("click", function () {
    state.started = true;
    refresh();
  });
  host.querySelector("#selection-reset").addEventListener("click", function () {
    state.model = (DATA.models[0] && DATA.models[0].id) || "";
    state.task = (DATA.workOrders[0] && DATA.workOrders[0].id) || "";
    state.mcps = new Set(DATA.mcps.filter(function (m) { return m.status === "connected"; }).map(function (m) { return m.id; }));
    state.useLatest = true;
    state.started = false;
    // full re-mount keeps everything in sync
    renderSelection(root);
  });
}

/* ============================================================================
   CAPSULE — 20-view-value.js
   Enterprise value dashboard: headline KPIs, an inline-SVG compounding chart
   (the RL reward, in tokens, over 8 weeks) and a value-ranked skill leaderboard.
   Single top-level render function: renderValue(root). Helpers prefixed value_.
   Consumes the global DATA. No libraries, no network.
   ============================================================================ */

function renderValue(root) {
  const m = DATA.metrics;
  const series = m.compounding;

  // --- Build the value-ranked skill leaderboard (token savings * adoption) --
  const board = value_leaderboard();

  // --- KPI definitions ------------------------------------------------------
  const kpis = [
    {
      hero: true, key: "Tokens saved — total", value: m.tokensSavedTotal,
      unit: "tokens", foot: "the RL reward signal, compounded across every session"
    },
    { key: "Sessions captured", value: m.sessionsCaptured, foot: "turned into reusable context" },
    { key: "Capsules", value: m.capsules, foot: "compressed learnings in Backboard" },
    { key: "Skills evolved", value: m.skillsEvolved, foot: "new semantic versions minted" },
    { key: "Avg transfer", value: m.avgTransfer, unit: "%", ring: m.avgTransfer, foot: "mean capsule transfer score" },
    { key: "Adoption rate", value: m.adoptionRate, unit: "%", ring: m.adoptionRate, foot: "of proposed versions adopted" }
  ];

  const chart = value_chart(series);

  root.innerHTML = `
    <section class="value-head">
      <div>
        <span class="k">Enterprise value · ${value_esc(DATA.workspace.enterprise)}</span>
        <h1 class="value-title">The reinforcement loop, in tokens</h1>
        <p class="value-sub">Every session makes the next one
          <em>cheaper and better</em> — capture once, reuse everywhere.
          This is the enterprise RL reward, measured in tokens saved.</p>
      </div>
      <span class="value-loop">
        <span class="value-dot"></span>
        <span class="mono">capture → capsule → skill → reuse</span>
      </span>
    </section>

    <section class="value-kpis">
      ${kpis.map(value_kpiCard).join("")}
    </section>

    <section class="value-main">
      <div class="card">
        <div class="value-card-head">
          <div>
            <div class="value-cardtitle">Compounding savings</div>
            <div class="value-cardnote">Cumulative tokens saved · 8-week reinforcement curve</div>
          </div>
          <span class="tag capsule">RL reward</span>
        </div>
        <div class="value-chartwrap">
          ${chart.svg}
          <div class="value-tip" id="value-tip">
            <div class="value-tip-k" id="value-tip-k"></div>
            <div class="value-tip-v" id="value-tip-v"></div>
          </div>
        </div>
        <div class="value-legend">
          <span class="value-lg"><span class="value-swatch"></span> cumulative tokens saved</span>
          <span class="value-lg">latest: <span class="value-mono">${value_fmt(series[series.length-1].tokensSaved)}</span></span>
          <span class="value-lg">slope: <span class="value-mono">+${value_fmt(chart.avgWeekly)}/wk</span></span>
        </div>
      </div>

      <div class="card">
        <div class="value-card-head">
          <div>
            <div class="value-cardtitle">Highest-value skills</div>
            <div class="value-cardnote">Ranked by tokens saved × adoption</div>
          </div>
          <span class="pill ok">${board.length} live</span>
        </div>
        <div class="value-board">
          ${board.map((s, i) => value_boardRow(s, i, board[0].value)).join("")}
        </div>
      </div>
    </section>

    <section class="value-strip">
      <span class="value-stat"><b>${value_fmt(m.tokensSavedTotal)}</b> tokens saved</span>
      <span class="value-vsep"></span>
      <span class="value-stat">across <b>${m.sessionsCaptured}</b> sessions</span>
      <span class="value-vsep"></span>
      <span class="value-stat">from <b>${m.capsules}</b> capsules</span>
      <span class="value-vsep"></span>
      <span class="value-stat">stored in <b>${value_esc(DATA.workspace.memoryStore)}</b> · ${value_esc(DATA.workspace.memoryTier)}</span>
      <span class="value-vsep"></span>
      <span class="value-stat">tenant <span class="mono">${value_esc(DATA.workspace.tenantAssistantId)}</span></span>
    </section>
  `;

  // --- Wire: count-up numbers ----------------------------------------------
  root.querySelectorAll("[data-count]").forEach((el) => {
    value_countUp(el, Number(el.getAttribute("data-count")), 950);
  });

  // --- Wire: percentage rings ----------------------------------------------
  requestAnimationFrame(() => {
    root.querySelectorAll(".value-ring").forEach((r) => {
      r.style.setProperty("--p", r.getAttribute("data-p"));
    });
    root.querySelectorAll(".value-rbar > i").forEach((b) => {
      b.style.width = b.getAttribute("data-w") + "%";
    });
  });

  // --- Wire: animate the chart line draw + reveal area/points --------------
  const svg = root.querySelector(".value-chart");
  const line = svg.querySelector(".value-line");
  if (line) {
    const len = line.getTotalLength();
    line.style.strokeDasharray = len;
    line.style.strokeDashoffset = len;
    // force layout, then transition to drawn
    void line.getBoundingClientRect();
    requestAnimationFrame(() => {
      line.style.transition = "stroke-dashoffset 1.1s cubic-bezier(.2,.7,.2,1)";
      line.style.strokeDashoffset = "0";
      svg.classList.add("value-in");
    });
  }

  // --- Wire: chart point hover tooltips ------------------------------------
  const tip = root.querySelector("#value-tip");
  const tipK = root.querySelector("#value-tip-k");
  const tipV = root.querySelector("#value-tip-v");
  const wrap = root.querySelector(".value-chartwrap");
  svg.querySelectorAll(".value-pt-hit").forEach((hit) => {
    hit.addEventListener("mouseenter", () => {
      const pt = hit.nextElementSibling;
      pt && pt.classList.add("value-on");
      tipK.textContent = hit.getAttribute("data-week");
      tipV.textContent = value_fmt(Number(hit.getAttribute("data-val"))) + " tokens saved";
      const wr = wrap.getBoundingClientRect();
      const hr = hit.getBoundingClientRect();
      tip.style.left = (hr.left - wr.left + hr.width / 2) + "px";
      tip.style.top = (hr.top - wr.top) + "px";
      tip.classList.add("value-show");
    });
    hit.addEventListener("mouseleave", () => {
      const pt = hit.nextElementSibling;
      pt && pt.classList.remove("value-on");
      tip.classList.remove("value-show");
    });
  });
}

/* --------------------------------------------------------------------------
   Helpers (all prefixed value_)
   -------------------------------------------------------------------------- */

// Rank enterprise skills by total tokens-saved across adopters of every version.
function value_leaderboard() {
  return DATA.skills.map((sk) => {
    let saved = 0, adopters = 0;
    sk.versions.forEach((v) => {
      const perUse = Math.abs(v.tokenDeltaPerUse || 0);
      saved += perUse * (v.adoptedBy || 0);
      adopters += v.adoptedBy || 0;
    });
    return {
      id: sk.id,
      name: sk.name,
      version: sk.currentVersion,
      agents: sk.usedByAgents.length,
      adopters,
      value: saved
    };
  }).sort((a, b) => b.value - a.value);
}

function value_kpiCard(k) {
  const ring = k.ring != null
    ? `<span class="value-ring" data-p="${k.ring}"></span>` : "";
  const spark = k.hero
    ? `<svg class="value-spark" viewBox="0 0 200 46" preserveAspectRatio="none" aria-hidden="true">
         <polyline points="${value_sparkPts()}" fill="none"
           stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
       </svg>` : "";
  const reward = k.hero
    ? `<span class="value-reward">▲ reward signal</span>` : "";
  const unit = k.unit ? `<span class="value-unit">${k.unit}</span>` : "";
  return `
    <div class="card value-kpi${k.hero ? " value-hero" : ""}">
      ${ring}
      <span class="k">${value_esc(k.key)}</span>
      <div class="value-num"><span data-count="${k.value}">0</span>${unit}</div>
      <div class="value-foot">${reward}<span>${value_esc(k.foot)}</span></div>
      ${spark}
    </div>`;
}

function value_boardRow(s, i, max) {
  const pct = max > 0 ? Math.round((s.value / max) * 100) : 0;
  return `
    <div class="value-row">
      <div class="value-rank">${i + 1}</div>
      <div class="value-rmeta">
        <div class="value-rname">
          ${value_esc(s.name)}
          <span class="value-ver">v${value_esc(s.version)}</span>
        </div>
        <div class="value-rsub">
          <span class="tag skill" style="padding:1px 7px">skill</span>
          ${s.adopters} adopters · ${s.agents} agent${s.agents === 1 ? "" : "s"}
        </div>
        <div class="value-rbar"><i data-w="${pct}"></i></div>
      </div>
      <div class="value-rval">
        <div class="value-big">${value_fmt(s.value)}</div>
        <div class="value-small">tokens saved</div>
      </div>
    </div>`;
}

// Build the compounding-savings SVG (area + line + hover hit targets).
function value_chart(series) {
  const W = 760, H = 280;
  const pad = { t: 22, r: 18, b: 30, l: 52 };
  const iw = W - pad.l - pad.r;
  const ih = H - pad.t - pad.b;
  const max = Math.max(...series.map((d) => d.tokensSaved));
  const niceMax = Math.ceil(max / 15000) * 15000; // round up for clean grid
  const n = series.length;

  const x = (i) => pad.l + (n === 1 ? iw / 2 : (i / (n - 1)) * iw);
  const y = (v) => pad.t + ih - (v / niceMax) * ih;

  // gridlines + y labels
  const ticks = 5;
  let grid = "";
  for (let g = 0; g <= ticks; g++) {
    const val = (niceMax / ticks) * g;
    const gy = y(val);
    grid += `<line class="value-grid-l" x1="${pad.l}" y1="${gy.toFixed(1)}" x2="${W - pad.r}" y2="${gy.toFixed(1)}"/>`;
    grid += `<text class="value-axis-t" x="${pad.l - 8}" y="${(gy + 3).toFixed(1)}" text-anchor="end">${value_fmtK(val)}</text>`;
  }

  // x labels (week numbers)
  let xlab = "";
  series.forEach((d, i) => {
    const wk = d.week.split("-")[1] || d.week;
    xlab += `<text class="value-axis-t" x="${x(i).toFixed(1)}" y="${H - 10}" text-anchor="middle">${value_esc(wk)}</text>`;
  });

  const linePts = series.map((d, i) => `${x(i).toFixed(1)},${y(d.tokensSaved).toFixed(1)}`).join(" ");
  const areaPts = `${pad.l},${(pad.t + ih).toFixed(1)} ${linePts} ${(W - pad.r)},${(pad.t + ih).toFixed(1)}`;

  // points + invisible wide hit targets
  let pts = "";
  series.forEach((d, i) => {
    const cx = x(i).toFixed(1), cy = y(d.tokensSaved).toFixed(1);
    pts += `<rect class="value-pt-hit" x="${(x(i) - iw / (2 * (n - 1))).toFixed(1)}" y="${pad.t}" width="${(iw / (n - 1)).toFixed(1)}" height="${ih}"
              data-week="${value_esc(d.week)}" data-val="${d.tokensSaved}"></rect>`;
    pts += `<circle class="value-pt" cx="${cx}" cy="${cy}" r="4"></circle>`;
  });

  const avgWeekly = Math.round(
    (series[n - 1].tokensSaved - series[0].tokensSaved) / (n - 1)
  );

  const svg = `
    <svg class="value-chart" viewBox="0 0 ${W} ${H}" role="img"
         aria-label="Cumulative tokens saved compounding across 8 weeks">
      <defs>
        <linearGradient id="valueAreaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="var(--accent)" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="valueLineGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="var(--accent-2)"/>
          <stop offset="100%" stop-color="var(--accent)"/>
        </linearGradient>
      </defs>
      ${grid}
      <polygon class="value-area" points="${areaPts}"></polygon>
      <polyline class="value-line" points="${linePts}"></polyline>
      ${pts}
      ${xlab}
    </svg>`;

  return { svg, avgWeekly };
}

// A tiny decorative sparkline for the hero card (mirrors the compounding shape).
function value_sparkPts() {
  const s = DATA.metrics.compounding;
  const max = Math.max(...s.map((d) => d.tokensSaved));
  const n = s.length;
  return s.map((d, i) => {
    const x = (i / (n - 1)) * 200;
    const y = 44 - (d.tokensSaved / max) * 40;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
}

// Animate a number from 0 to target.
function value_countUp(el, target, dur) {
  const start = performance.now();
  const step = (now) => {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = value_fmt(Math.round(target * eased));
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = value_fmt(target);
  };
  requestAnimationFrame(step);
}

function value_fmt(n) {
  return Number(n).toLocaleString("en-US");
}

function value_fmtK(n) {
  if (n >= 1000) return (n / 1000) + "k";
  return String(n);
}

function value_esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

/* ============================================================================
   CAPSULE — 10-shell.js
   8090 Software Factory control-plane shell.

   bootCapsule(): wires the left module-nav, keeps the breadcrumb in sync,
   animates the tokens-saved meter, and DEFAULTS to the Knowledge Graph module
   (where CAPSULE lives). Each module clears #view-root and calls its render fn.

   Also defines, in THIS file (so the assembler file list is unchanged):
     - renderKnowledgeGraph(root)  — the CAPSULE module: a sub-tab bar that
       delegates to the existing globals renderGraph / renderCapsules /
       renderSkills / renderSelection / renderValue.
     - native Factory module renderers: renderRefinery, renderFoundry,
       renderPlanner, renderAssembler, renderTests, renderValidator.

   renderOverview / renderGraph / renderCapsules / renderSkills /
   renderSelection / renderValue are assumed global (other view modules).
   No IIFE; the assembler calls bootCapsule() last. Reads the global DATA.
   ============================================================================ */

function bootCapsule() {
  "use strict";

  // Module label -> global render function name.
  var RENDERERS = {
    "Overview":        "renderOverview",
    "Refinery":        "renderRefinery",
    "Foundry":         "renderFoundry",
    "Planner":         "renderPlanner",
    "Assembler":       "renderAssembler",
    "Tests":           "renderTests",
    "Validator":       "renderValidator",
    "Knowledge Graph": "renderKnowledgeGraph"
  };

  var root    = document.getElementById("view-root");
  var sidebar = document.querySelector(".sidebar");
  var crumb   = document.getElementById("crumb-module");
  var links   = sidebar
    ? Array.prototype.slice.call(sidebar.querySelectorAll("[data-view]"))
    : [];
  var settings = sidebar ? sidebar.querySelector("[data-settings]") : null;

  function setActive(target) {
    links.forEach(function (a) { a.classList.toggle("active", a === target); });
    if (settings) settings.classList.toggle("active", target === settings);
  }

  function renderView(label) {
    if (crumb) crumb.textContent = label;
    if (root) root.innerHTML = "";
    var fn = RENDERERS[label] ? window[RENDERERS[label]] : null;
    if (typeof fn === "function") {
      fn(root);
    } else if (root) {
      root.innerHTML =
        '<div class="card"><span class="k">module</span>' +
        '<h3 style="margin-top:8px">' + _capEsc(label) + '</h3>' +
        '<p class="muted">This module is not available yet.</p></div>';
    }
    if (root) root.scrollTop = 0;
  }

  links.forEach(function (link) {
    link.addEventListener("click", function (e) {
      e.preventDefault();
      setActive(link);
      renderView(link.getAttribute("data-view"));
    });
  });

  if (settings) {
    settings.addEventListener("click", function (e) {
      e.preventDefault();
      setActive(settings);
      if (crumb) crumb.textContent = "Settings";
      if (root) { root.innerHTML = _capRenderSettings(); root.scrollTop = 0; }
    });
  }

  // Animate the topbar tokens-saved meter to DATA.metrics.tokensSavedTotal.
  animateTokenCounter();

  // Default to the Knowledge Graph module on boot (the active row in markup).
  var first =
    links.filter(function (a) { return a.classList.contains("active"); })[0] ||
    links.filter(function (a) { return a.getAttribute("data-view") === "Knowledge Graph"; })[0] ||
    links[0];

  if (first) {
    setActive(first);
    renderView(first.getAttribute("data-view"));
  } else {
    renderView("Knowledge Graph");
  }
}

function animateTokenCounter() {
  var el = document.getElementById("tok-saved");
  if (!el) return;

  var target = 0;
  try {
    target = (window.DATA && DATA.metrics && DATA.metrics.tokensSavedTotal) || 0;
  } catch (err) {
    target = 0;
  }
  target = Math.max(0, Math.round(target));

  var fmt = function (n) {
    try { return Number(n).toLocaleString("en-US"); }
    catch (e) { return String(n); }
  };

  if (target === 0) { el.textContent = fmt(0); return; }

  var reduce = window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduce) { el.textContent = fmt(target); return; }

  var duration = 1100;
  var start = null;
  var ease = function (t) { return 1 - Math.pow(1 - t, 3); }; // easeOutCubic

  function step(ts) {
    if (start === null) start = ts;
    var p = Math.min(1, (ts - start) / duration);
    el.textContent = fmt(Math.round(target * ease(p)));
    if (p < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = fmt(target);
    }
  }
  requestAnimationFrame(step);
}

/* ============================================================================
   SHARED HELPERS (prefixed _cap* to avoid colliding with view globals)
   ============================================================================ */

function _capData() { try { return window.DATA || {}; } catch (e) { return {}; } }

function _capEsc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];

}

/* Status string -> styled status pill (the 8090 pill-* classes). */
function _capPill(status) {
  var s = String(status || "").toLowerCase();
  var map = {
    "queued":      ["pill-queued",   "Queued"],
    "available":   ["pill-queued",   "Available"],
    "in_progress": ["pill-progress", "In progress"],
    "in-progress": ["pill-progress", "In progress"],
    "in_review":   ["pill-progress", "In review"],
    "running":     ["pill-progress", "Running"],
    "done":        ["pill-done",     "Done"],
    "published":   ["pill-done",     "Published"],
    "active":      ["pill-done",     "Active"],
    "passing":     ["pill-done",     "Passing"],
    "connected":   ["pill-done",     "Connected"],
    "proposed":    ["pill-proposed", "Proposed"],
    "rejected":    ["pill-rejected", "Rejected"],
    "failing":     ["pill-rejected", "Failing"]
  };
  var e = map[s] || ["pill-queued", status || "—"];
  return '<span class="' + e[0] + '">' + _capEsc(e[1]) + "</span>";

/* Optional pre-baked header stats from DATA.factoryModules[key] if present. */
